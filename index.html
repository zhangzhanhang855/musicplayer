<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID PRO-AUDIO | REFERENCE DECK</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --panel-bg: #0d0d0d;
            --accent: #00f2ff;
            --warning: #ff3c00;
            --metal-gradient: linear-gradient(180deg, #222 0%, #111 100%);
            --lcd-glow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* 碳纤维纹理 */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(20,20,20,1) 0%, rgba(5,5,5,1) 100%),
                repeating-linear-gradient(45deg, #0a0a0a 0px, #0a0a0a 1px, transparent 1px, transparent 2px);
        }

        /* --- 工业级外壳 --- */
        .pro-console {
            width: 96vw;
            height: 860px;
            background: #151515;
            border: 6px solid #222;
            border-radius: 12px;
            display: grid;
            grid-template-columns: 1fr 320px 420px;
            padding: 10px;
            gap: 10px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.5);
        }

        /* --- DECK 部分 (左) --- */
        .deck-core {
            background: var(--metal-gradient);
            border-radius: 8px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #333;
        }

        /* LCD 仪表盘 */
        .lcd-display {
            background: #050a05;
            border: 2px solid #222;
            border-radius: 4px;
            padding: 20px;
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent);
            box-shadow: inset 0 0 20px #000;
            margin-bottom: 20px;
        }

        /* 模拟波形图 */
        .waveform-view {
            height: 60px;
            display: flex;
            align-items: center;
            gap: 2px;
            margin: 15px 0;
            opacity: 0.8;
        }
        .wave-bar {
            flex: 1;
            background: var(--accent);
            height: 20%;
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        /* 慢轮 Jog Wheel */
        .jog-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .jog-wheel {
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #111 70%, #000 100%);
            border: 10px solid #080808;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            position: relative;
            transition: transform 0.1s linear;
        }
        /* 黑胶纹理 */
        .jog-wheel::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent 0, transparent 2px, rgba(255,255,255,0.03) 3px);
        }
        .is-playing .jog-wheel { animation: rotate-jog 4s linear infinite; }
        @keyframes rotate-jog { to { transform: rotate(360deg); } }

        /* --- MIXER 部分 (中) --- */
        .mixer-section {
            background: #111;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #222;
        }
        .eq-knob {
            width: 50px; height: 50px;
            background: radial-gradient(circle, #444, #222);
            border-radius: 50%;
            margin-bottom: 20px;
            position: relative;
            border: 2px solid #000;
        }
        .eq-knob::before {
            content: '';
            position: absolute;
            top: 5px; left: 50%; width: 3px; height: 12px;
            background: var(--warning); transform: translateX(-50%);
        }
        .fader-slot {
            width: 12px; height: 250px;
            background: #000;
            border-radius: 6px;
            position: relative;
            margin: 40px 0;
        }
        .fader-handle {
            width: 40px; height: 60px;
            background: linear-gradient(90deg, #333, #555, #333);
            border-radius: 4px;
            position: absolute;
            left: -14px; bottom: 70%;
            cursor: pointer;
            border: 1px solid #000;
        }

        /* --- CRATE 部分 (右) --- */
        .crate-section {
            background: #0f0f0f;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            border: 1px solid #222;
            overflow: hidden;
        }
        .track-list {
            flex: 1;
            overflow-y: auto;
        }
        .track-item {
            padding: 15px 20px;
            border-bottom: 1px solid #1a1a1a;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .track-item:hover { background: #1a1a1a; }
        .track-item.active { background: #003333; color: var(--accent); border-left: 4px solid var(--accent); }

        /* 电平表 VU Meter */
        .vu-meter {
            display: flex; gap: 3px; height: 100px; padding: 10px; background: #000;
        }
        .vu-bar { flex: 1; display: flex; flex-direction: column-reverse; gap: 2px; }
        .vu-dot { height: 4px; width: 100%; background: #1a1a1a; }
        .vu-dot.active-green { background: var(--neon-green); }
        .vu-dot.active-cyan { background: var(--accent); }

        /* 系统启动屏 */
        .boot-screen {
            position: fixed; inset: 0; z-index: 100;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }
    </style>
</head>
<body class="is-paused">

    <div id="login-screen" class="boot-screen">
        <div class="text-[10px] font-mono text-cyan-900 mb-10 tracking-[1em]">SYSTEM INITIALIZING</div>
        <button onclick="bootSystem()" class="group relative">
            <div class="absolute -inset-4 bg-cyan-500/20 rounded-full blur-xl group-hover:bg-cyan-500/40 transition"></div>
            <div class="relative w-24 h-24 border-2 border-cyan-500 rounded-full flex items-center justify-center text-cyan-500 group-hover:scale-110 transition">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
        </button>
        <input type="password" id="pwd-input" class="hidden">
    </div>

    <main id="main-app" class="pro-console opacity-0 transition-opacity duration-1000">
        
        <!-- DECK A -->
        <section class="deck-core">
            <div class="lcd-display">
                <div class="flex justify-between text-[9px] opacity-50 mb-2">
                    <span>MQA / REF 192kHz</span>
                    <span id="track-type">MASTER</span>
                </div>
                <div class="text-2xl truncate mb-1" id="title">NO TRACK LOADED</div>
                <div class="text-[10px] opacity-40 mb-4" id="artist-name">DECK READY</div>
                
                <div class="waveform-view" id="waveform">
                    <!-- 波形条由JS生成 -->
                </div>

                <div class="flex justify-between font-bold text-2xl mt-2 tracking-tighter">
                    <span id="cur-time" class="text-white">00:00:00</span>
                    <span class="text-cyan-900">|</span>
                    <span id="dur-time" class="text-cyan-800">00:00:00</span>
                </div>
            </div>

            <div class="jog-container">
                <div class="jog-wheel" id="jog-wheel" onclick="playToggle()">
                    <div class="absolute inset-[30%] rounded-full bg-black border-4 border-cyan-500/20 flex items-center justify-center">
                        <div id="cover-art" class="w-full h-full rounded-full bg-cover"></div>
                        <span id="cover-emoji" class="text-4xl">💿</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-end mt-6">
                <div class="flex gap-4">
                    <button onclick="playToggle()" class="w-16 h-16 rounded bg-black border border-white/10 flex items-center justify-center hover:bg-white/5">
                        <div id="play-btn-icon" class="w-0 h-0 border-y-[10px] border-y-transparent border-l-[16px] border-l-white"></div>
                    </button>
                    <button onclick="step(1)" class="px-6 rounded bg-black border border-white/10 hover:bg-white/5 text-[10px] font-bold">NEXT</button>
                </div>
                <div class="text-right">
                    <div class="text-[9px] opacity-30 mb-1 uppercase">Sync / BPM</div>
                    <div class="text-xl font-bold italic text-cyan-400">128.00</div>
                </div>
            </div>
        </section>

        <!-- MIXER -->
        <section class="mixer-section">
            <div class="text-[9px] mb-8 opacity-20 font-bold">CHANNEL MIXER</div>
            
            <div class="eq-knob"></div>
            <div class="text-[8px] mb-4 opacity-40">HI</div>
            <div class="eq-knob"></div>
            <div class="text-[8px] mb-4 opacity-40">MID</div>
            <div class="eq-knob"></div>
            <div class="text-[8px] mb-4 opacity-40">LOW</div>

            <div class="fader-slot">
                <div class="fader-handle"></div>
            </div>

            <div class="vu-meter" id="vu-meter">
                <!-- VU表由JS生成 -->
            </div>
        </section>

        <!-- 曲库 -->
        <aside class="crate-section">
            <div class="p-6 bg-black/40">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-[10px] font-bold tracking-[0.3em] opacity-40 uppercase">Crate Browser</h2>
                    <span id="folder-name" class="text-[9px] bg-cyan-900/30 px-2 py-1 rounded text-cyan-400">ROOT</span>
                </div>
                <div id="playlist-nav" class="flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
                <input type="text" id="q" oninput="doSearch()" placeholder="FILTER TRACKS..." class="w-full bg-black border border-white/10 p-3 mt-2 text-[10px] outline-none focus:border-cyan-500/50">
            </div>

            <ul id="list" class="track-list no-scrollbar"></ul>

            <div class="p-6 border-t border-white/5">
                <p id="ai-text" class="text-[9px] text-cyan-600/50 font-mono italic leading-relaxed">READY TO BROADCAST...</p>
            </div>
        </aside>

    </main>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const G = { user: 'zhangzhanhang855', repo: 'musiconly', ver: 'main' };
        let playlists = {}; 
        let filtered = [], curIdx = 0, isPlaying = false;
        
        const audio = document.getElementById('player');

        // 初始化背景与VU表
        (function initVisuals() {
            const wave = document.getElementById('waveform');
            for(let i=0; i<40; i++) {
                const bar = document.createElement('div');
                bar.className = 'wave-bar';
                wave.appendChild(bar);
            }
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<2; i++) {
                const bar = document.createElement('div');
                bar.className = 'vu-bar';
                for(let j=0; j<15; j++) {
                    const dot = document.createElement('div');
                    dot.className = 'vu-dot';
                    bar.appendChild(dot);
                }
                vu.appendChild(bar);
            }
        })();

        function bootSystem() {
            document.getElementById('login-screen').style.transform = 'scale(2)';
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
                loadData();
            }, 800);
        }

        async function loadData() {
            try {
                const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const items = await res.json();
                
                const rootSongs = filterSongs(items);
                if (rootSongs.length > 0) playlists["Root"] = rootSongs;

                const folders = items.filter(i => i.type === "dir");
                for (const f of folders) {
                    const sub = await (await fetch(f.url)).json();
                    const songs = filterSongs(sub);
                    if (songs.length > 0) playlists[f.name] = songs;
                }

                renderNav();
                switchPlaylist(Object.keys(playlists)[0]);
            } catch (e) {
                document.getElementById('title').innerText = "IO ERROR: CHECK API";
            }
        }

        function filterSongs(items) {
            return items.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                t: f.name.replace(/\.[^/.]+$/, ""),
                u: f.download_url,
                type: f.size > 20000000 ? '96k/24b' : '44k/16b'
            }));
        }

        function renderNav() {
            const nav = document.getElementById('playlist-nav');
            nav.innerHTML = Object.keys(playlists).map(name => `
                <button onclick="switchPlaylist('${name}')" class="text-[9px] px-3 py-1 border border-white/5 whitespace-nowrap hover:bg-white/10 uppercase">
                    ${name}
                </button>
            `).join('');
        }

        function switchPlaylist(name) {
            filtered = [...playlists[name]];
            document.getElementById('folder-name').innerText = name;
            renderList();
            executeLoad(0, false);
        }

        function renderList() {
            const listEl = document.getElementById('list');
            listEl.innerHTML = filtered.map((s, i) => `
                <li class="track-item ${curIdx === i ? 'active' : ''}" onclick="executeLoad(${i}, true)">
                    ${String(i+1).padStart(2,'0')} > ${s.t}
                </li>
            `).join('');
        }

        function executeLoad(idx, auto) {
            curIdx = idx;
            const song = filtered[curIdx];
            audio.src = song.u;
            document.getElementById('title').innerText = song.t;
            document.getElementById('track-type').innerText = song.type;
            
            // 封面处理
            const art = document.getElementById('cover-art');
            const emj = document.getElementById('cover-emoji');
            art.style.backgroundImage = 'none';
            emj.style.display = 'block';

            new jsmediatags.Reader(song.u).read({
                onSuccess: (tag) => {
                    const p = tag.tags.picture;
                    if (p) {
                        let b64 = "";
                        for (let i = 0; i < p.data.length; i++) b64 += String.fromCharCode(p.data[i]);
                        art.style.backgroundImage = `url(data:${p.format};base64,${window.btoa(b64)})`;
                        emj.style.display = 'none';
                    }
                }
            });

            renderList();
            if (auto) audio.play();
        }

        function playToggle() {
            audio.paused ? audio.play() : audio.pause();
        }

        audio.onplay = () => {
            document.body.classList.replace('is-paused', 'is-playing');
            document.getElementById('play-btn-icon').style.borderLeftColor = "#00f2ff";
        };

        audio.onpause = () => {
            document.body.classList.replace('is-playing', 'is-paused');
            document.getElementById('play-btn-icon').style.borderLeftColor = "#fff";
        };

        audio.ontimeupdate = () => {
            document.getElementById('cur-time').innerText = fmt(audio.currentTime);
            document.getElementById('dur-time').innerText = fmt(audio.duration);
            
            // 模拟波形与VU表跳动
            if(!audio.paused) {
                document.querySelectorAll('.wave-bar').forEach(bar => {
                    bar.style.height = (20 + Math.random() * 60) + '%';
                });
                document.querySelectorAll('.vu-dot').forEach((dot, idx) => {
                    dot.className = (idx % 15 < Math.random() * 12) ? 'vu-dot active-cyan' : 'vu-dot';
                });
            }
        };

        function fmt(s) {
            if (isNaN(s)) return "00:00:00";
            let m = Math.floor(s/60), sec = Math.floor(s%60), ms = Math.floor((s%1)*100);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}:${ms.toString().padStart(2,'0')}`;
        }

        function step(d) {
            executeLoad((curIdx + d + filtered.length) % filtered.length, true);
        }

        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            filtered = playlists[currentPlaylistName].filter(s => s.t.toLowerCase().includes(val));
            renderList();
        }

        function dl() { window.open(filtered[curIdx].u); }
    </script>
</body>
</html>
