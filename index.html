<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Elite Music Space | Pro</title>
    
    <link rel="dns-prefetch" href="https://api.github.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent: #000000;
            --font-serif: "Noto Serif TC", serif;
            --font-sans: "Inter", system-ui, sans-serif;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: var(--font-sans);
            overflow: hidden;
            background: #f0f0f2;
        }

        /* 动态背景 */
        .mesh-bg {
            position: fixed; inset: 0; z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
            transition: all 2s var(--ease-out-expo);
        }
        .blob {
            position: absolute; width: 600px; height: 600px;
            border-radius: 50%;
            animation: drift 20s infinite alternate linear;
        }
        @keyframes drift {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(360deg); }
        }

        /* 玻璃面板 */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
        }

        /* 验证界面 */
        #login-screen {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            background: #f0f0f2;
        }
        .login-card {
            width: 100%; max-width: 400px; padding: 60px 40px;
            border-radius: 40px; text-align: center;
        }
        .login-card h1 { font-family: var(--font-serif); font-size: 2rem; letter-spacing: 0.5rem; }

        /* 滚动条隐藏 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 自定义进度条 */
        .slider-thumb::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 12px; height: 12px; background: black;
            border-radius: 50%; cursor: pointer;
            transition: transform 0.2s;
        }
        .slider-thumb::-webkit-slider-thumb:hover { transform: scale(1.3); }

        /* 歌曲列表项激活状态 */
        .list-item.active {
            background: rgba(0,0,0,0.03);
            border-left: 2px solid black;
        }

        /* 响应式调整 */
        @media (max-width: 1024px) {
            .main-layout { flex-direction: column; overflow-y: auto; }
            .player-section { height: auto !important; }
            .side-section { height: 500px !important; }
        }
    </style>
</head>
<body>

    <!-- 动态氛围背景 -->
    <div class="mesh-bg" id="bg-mesh">
        <div class="blob bg-purple-300 top-[-10%] left-[-10%]"></div>
        <div class="blob bg-blue-200 bottom-[-10%] right-[-10%]" style="animation-duration: 25s"></div>
        <div class="blob bg-pink-100 top-[20%] right-[20%]" style="animation-duration: 30s"></div>
    </div>

    <!-- 验证屏 -->
    <div id="login-screen">
        <div class="login-card glass-panel">
            <h1 class="mb-4">藏心</h1>
            <p class="text-[10px] tracking-[0.4em] text-gray-400 mb-10 uppercase">Private Audio Sanctuary</p>
            <input type="password" id="pwd-input" class="w-full bg-white/50 border-none rounded-2xl py-4 px-6 text-center mb-4 font-mono tracking-widest focus:ring-1 ring-black/5" placeholder="••••••••" onkeydown="if(event.key==='Enter') checkPwd()">
            <button onclick="checkPwd()" class="w-full bg-black text-white py-4 rounded-2xl font-semibold tracking-widest hover:opacity-80 transition-all">DECRYPT</button>
            <p id="pwd-error" class="mt-4 text-red-400 text-[10px] tracking-widest"></p>
        </div>
    </div>

    <!-- 主应用程序 -->
    <div id="main-app" class="hidden h-screen w-full p-6 lg:p-12 flex items-center justify-center">
        <div class="main-layout glass-panel w-full max-w-7xl h-full rounded-[48px] overflow-hidden flex shadow-2xl">
            
            <!-- 左侧：核心播放器 -->
            <div class="player-section flex-1 h-full flex flex-col p-10 lg:p-16 relative">
                <div class="flex justify-between items-start mb-10">
                    <div class="text-[10px] tracking-[0.5em] font-bold text-black/20 uppercase">Now Playing</div>
                    <div id="track-type" class="text-[10px] border border-black/10 px-3 py-1 rounded-full text-black/40 font-mono">HI-RES</div>
                </div>

                <div class="flex-1 flex flex-col items-center justify-center text-center">
                    <!-- 封面 -->
                    <div id="cover" class="w-64 h-64 lg:w-80 lg:h-80 rounded-[40px] mb-12 shadow-2xl transition-all duration-1000 flex items-center justify-center text-5xl">
                        💿
                    </div>
                    
                    <div class="mb-10">
                        <h2 id="title" class="text-3xl lg:text-4xl font-medium mb-3 tracking-tight font-serif">待命</h2>
                        <p id="status" class="text-xs tracking-[0.3em] text-black/30 uppercase">Ready to Stream</p>
                    </div>

                    <!-- 进度控制 -->
                    <div class="w-full max-w-md mb-10">
                        <div class="relative h-[2px] w-full bg-black/5 rounded-full mb-3 cursor-pointer" id="seek-bar">
                            <div id="prog-bar" class="absolute h-full bg-black rounded-full w-0 transition-all duration-150"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-mono text-black/20 tracking-tighter">
                            <span id="cur-time">00:00</span>
                            <span id="dur-time">00:00</span>
                        </div>
                    </div>

                    <!-- 播放控制 -->
                    <div class="flex items-center gap-8 lg:gap-12">
                        <button onclick="setLoop()" id="mode-btn" class="text-[10px] font-bold tracking-widest text-black/30 hover:text-black transition-colors">LIST</button>
                        <button onclick="step(-1)" class="opacity-40 hover:opacity-100 transition-opacity">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button onclick="playToggle()" id="play-btn" class="w-20 h-20 bg-black text-white rounded-full flex items-center justify-center shadow-xl hover:scale-105 transition-transform">
                            <svg id="play-svg" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5.14v14l11-7-11-7z"/></svg>
                        </button>
                        <button onclick="step(1)" class="opacity-40 hover:opacity-100 transition-opacity">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M16 18h2V6h-2M7 6v12l8.5-6z"/></svg>
                        </button>
                        <button onclick="dl()" class="opacity-40 hover:opacity-100 transition-opacity">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        </button>
                    </div>
                </div>

                <!-- AI Insight -->
                <div class="mt-12 pt-8 border-t border-black/[0.03]">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                        <span class="text-[9px] font-bold tracking-[0.3em] text-indigo-500 uppercase">AI Interpret</span>
                    </div>
                    <div id="ai-text" class="text-xs leading-relaxed text-black/50 font-serif italic max-w-xl">
                        聆聽旋律中的光影，感應數位時代的純粹音色...
                    </div>
                </div>
            </div>

            <!-- 右侧：极简曲库 -->
            <div class="side-section w-full lg:w-[400px] bg-black/[0.02] border-l border-black/[0.03] flex flex-col">
                <div class="p-8 border-b border-black/[0.03]">
                    <div class="relative group">
                        <input type="text" id="q" oninput="doSearch()" placeholder="Search Library" class="w-full bg-transparent border-none py-2 text-sm focus:ring-0 placeholder:text-black/20 font-light">
                        <div class="absolute bottom-0 left-0 w-0 h-[1px] bg-black/10 group-focus-within:w-full transition-all duration-500"></div>
                    </div>
                </div>
                
                <ul id="list" class="flex-1 overflow-y-auto no-scrollbar py-4">
                    <!-- 动态生成 -->
                </ul>

                <div class="p-8">
                    <button onclick="addMusic()" class="w-full py-4 border border-black/10 rounded-2xl text-[10px] font-bold tracking-widest hover:bg-black hover:text-white transition-all uppercase">
                        Request Track
                    </button>
                </div>
            </div>
        </div>
    </div>

    <audio id="player"></audio>

    <script>
        const apiKey = ""; 
        const G = { user: 'zhangzhanhang855', repo: 'musicplayer', ver: 'main' };
        const FADE_TIME = 800;

        // --- Cookie Utils ---
        const setCookie = (n, v, d=7) => {
            const date = new Date();
            date.setTime(date.getTime() + (d*24*60*60*1000));
            document.cookie = `${n}=${v};expires=${date.toUTCString()};path=/;SameSite=Lax`;
        };
        const getCookie = (n) => {
            const m = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
            return m ? m.pop() : null;
        };

        let allSongs = [], filtered = [], curIdx = 0, isPlaying = false, loopMode = 'list';
        let fadeInterval = null;
        const audio = document.getElementById('player');
        const aiBox = document.getElementById('ai-text');
        const cover = document.getElementById('cover');
        const bgMesh = document.getElementById('bg-mesh');

        // 音量平滑过渡
        function fadeVolume(target, duration, callback) {
            if (fadeInterval) clearInterval(fadeInterval);
            const step = 0.05;
            const intervalTime = duration / (1 / step);
            fadeInterval = setInterval(() => {
                if (target > audio.volume) audio.volume = Math.min(audio.volume + step, target);
                else audio.volume = Math.max(audio.volume - step, target);
                if (Math.abs(audio.volume - target) < 0.01) {
                    audio.volume = target;
                    clearInterval(fadeInterval);
                    if (callback) callback();
                }
            }, intervalTime);
        }

        // 随机背景与封面动态色
        function updateVisuals() {
            const h = Math.floor(Math.random() * 360);
            cover.style.background = `linear-gradient(135deg, hsl(${h}, 40%, 90%) 0%, hsl(${h}, 20%, 98%) 100%)`;
            cover.style.color = `hsl(${h}, 50%, 40%)`;
            // 动态改变背景球位置
            const blobs = bgMesh.querySelectorAll('.blob');
            blobs.forEach(b => {
                b.style.transform = `translate(${Math.random()*40-20}%, ${Math.random()*40-20}%)`;
            });
        }

        const getUrl = (f) => {
            const isLFS = f.size < 1024;
            return isLFS ? {
                url: `https://media.githubusercontent.com/media/${G.user}/${G.repo}/${G.ver}/${encodeURIComponent(f.name)}`,
                type: 'LFS'
            } : {
                url: `https://fastly.jsdelivr.net/gh/${G.user}/${G.repo}@${G.ver}/${encodeURIComponent(f.name)}`,
                type: 'CDN'
            };
        };

        async function analyzeInsight(name) {
            if (!apiKey) return;
            aiBox.innerText = "感應中...";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `你是一位极具人文气息的音乐导读师。请用一句充满诗意的话描述歌曲《${name}》的意境，25字以内。直接输出。` }] }] })
                });
                const data = await res.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "旋律在無形中觸動靈魂深處。";
                
                aiBox.innerText = "";
                let i = 0;
                const type = () => {
                    if (i < text.length) {
                        aiBox.innerText += text.charAt(i); i++;
                        setTimeout(type, 60);
                    }
                };
                type();
            } catch (e) { aiBox.innerText = "旋律深邃，意境自成一體。"; }
        }

        window.addEventListener('load', () => {
            if (getCookie('isLoggedIn') === 'true') enterApp();
        });

        function checkPwd() {
            if (document.getElementById('pwd-input').value === '12345678') {
                setCookie('isLoggedIn', 'true', 7);
                enterApp();
            } else {
                document.getElementById('pwd-error').innerText = 'IDENTIFICATION FAILED';
            }
        }

        function enterApp() {
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                init();
            }, 500);
        }

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const data = await res.json();
                allSongs = data.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => {
                    const route = getUrl(f);
                    return { t: f.name.replace(/\.[^/.]+$/, ""), u: route.url, type: route.type };
                });
                filtered = [...allSongs];
                
                const savedMode = getCookie('pref_loop_mode');
                if (savedMode) {
                    loopMode = savedMode;
                    document.getElementById('mode-btn').innerText = loopMode.toUpperCase();
                }

                renderList();

                const savedIdx = getCookie('pref_last_idx');
                curIdx = (savedIdx !== null && savedIdx < allSongs.length) ? parseInt(savedIdx) : 0;
                loadTrack(curIdx, false);
            } catch (e) { document.getElementById('status').innerText = "CONNECT ERROR"; }
        }

        function renderList() {
            document.getElementById('list').innerHTML = filtered.map((s, i) => `
                <li class="list-item ${curIdx === i ? 'active' : ''} px-10 py-6 cursor-pointer flex justify-between items-center transition-all hover:bg-black/[0.01]" onclick="selectTrack(${i})">
                    <div class="flex flex-col gap-1">
                        <span class="text-sm font-medium tracking-tight text-black/80">${s.t}</span>
                        <span class="text-[9px] font-mono text-black/20 uppercase tracking-widest">${s.type} MASTER</span>
                    </div>
                    <span class="text-[9px] font-mono text-black/10">0${i+1}</span>
                </li>
            `).join('');
        }

        function loadTrack(idx, auto = true) {
            if(!filtered[idx]) return;
            if (isPlaying) {
                fadeVolume(0, 400, () => executeLoad(idx, auto));
            } else {
                executeLoad(idx, auto);
            }
        }

        function executeLoad(idx, auto) {
            curIdx = idx;
            const song = filtered[curIdx];
            audio.src = song.u;
            audio.volume = 0;
            document.getElementById('title').innerText = song.t;
            document.getElementById('status').innerText = song.type + " STREAMING";
            document.getElementById('track-type').innerText = song.type;
            
            setCookie('pref_last_idx', curIdx, 30);
            updateVisuals();
            renderList();
            
            clearTimeout(window.aiTimer);
            window.aiTimer = setTimeout(() => analyzeInsight(song.t), 1500);

            if (auto) {
                audio.play();
                isPlaying = true;
                fadeVolume(1, FADE_TIME);
                syncUI();
            }
        }

        function selectTrack(i) { loadTrack(i); }
        
        function playToggle() {
            const playSvg = document.getElementById('play-svg');
            if (audio.paused) {
                audio.volume = 0; audio.play();
                fadeVolume(1, FADE_TIME); isPlaying = true;
                playSvg.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            } else {
                fadeVolume(0, FADE_TIME, () => audio.pause()); isPlaying = false;
                playSvg.innerHTML = `<path d="M8 5.14v14l11-7-11-7z"/>`;
            }
        }
        
        function syncUI() {
            const playSvg = document.getElementById('play-svg');
            playSvg.innerHTML = isPlaying 
                ? `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`
                : `<path d="M8 5.14v14l11-7-11-7z"/>`;
        }
        
        function step(d) { loadTrack((curIdx + d + filtered.length) % filtered.length); }
        
        function doSearch() {
            const key = document.getElementById('q').value.toLowerCase();
            filtered = allSongs.filter(s => s.t.toLowerCase().includes(key));
            renderList();
        }
        
        function addMusic() { window.location.href = `mailto:zhangzhanhang855@gmail.com?subject=MUSIC_REQUEST`; }
        
        function setLoop() {
            const modes = ['list', 'random', 'single'];
            loopMode = modes[(modes.indexOf(loopMode) + 1) % 3];
            document.getElementById('mode-btn').innerText = loopMode.toUpperCase();
            setCookie('pref_loop_mode', loopMode, 30);
        }

        function dl() { window.open(filtered[curIdx].u); }

        function formatTime(sec) {
            if (isNaN(sec)) return "00:00";
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration * 100);
            document.getElementById('prog-bar').style.width = p + '%';
            document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
            document.getElementById('dur-time').innerText = formatTime(audio.duration);
        };
        
        audio.onended = () => { 
            if(loopMode === 'single') audio.play(); 
            else if(loopMode === 'random') loadTrack(Math.floor(Math.random()*filtered.length));
            else step(1); 
        };

        document.getElementById('seek-bar').onclick = (e) => { 
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; 
        };
    </script>
</body>
</html>
