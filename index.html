<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 云音乐播放器</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --accent: #00d2ff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; background: #000;
        }

        /* 动态背景淡化效果 */
        #bg-blur {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #243b55, #141e30);
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.5);
            transform: scale(1.1); transition: background 1s ease;
            z-index: -1;
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; color: var(--text); padding: 20px; box-sizing: border-box;
        }

        .player-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; border-radius: 20px; width: 100%; max-width: 450px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cover-art {
            width: 180px; height: 180px; border-radius: 50%;
            margin: 0 auto 20px; background: rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; font-size: 60px;
            animation: rotate 20s linear infinite; animation-play-state: paused;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h2 { margin: 10px 0 5px; font-size: 1.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .controls-row { display: flex; justify-content: center; gap: 15px; margin: 15px 0; align-items: center; }
        button { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        button:hover { color: var(--accent); transform: scale(1.2); }
        .play-btn { font-size: 2.5rem; }

        .list-section {
            margin-top: 20px; width: 100%; max-width: 450px; flex: 1; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .search-bar {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: rgba(255,255,255,0.1); color: white; margin-bottom: 10px; box-sizing: border-box; outline: none;
        }
        #playlist {
            list-style: none; padding: 0; overflow-y: auto; flex: 1;
            background: rgba(0,0,0,0.3); border-radius: 10px;
        }
        #playlist li {
            padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;
        }
        #playlist li:hover { background: rgba(255,255,255,0.1); }
        #playlist li.active { color: var(--accent); background: rgba(0,210,255,0.1); }

        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 15px 0; cursor: pointer; }
        #progress { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; transition: width 0.1s; }
    </style>
</head>
<body>

<div id="bg-blur"></div>

<div class="container">
    <div class="player-card">
        <div class="cover-art" id="main-cover">💿</div>
        <h2 id="track-title">正在调取仓库数据...</h2>
        
        <div class="progress-container" id="progress-bar">
            <div id="progress"></div>
        </div>

        <div class="controls-row">
            <button onclick="toggleMode()" id="mode-btn" title="循环模式">🔁</button>
            <button onclick="prevTrack()">⏮</button>
            <button onclick="togglePlay()" class="play-btn" id="play-btn">▶️</button>
            <button onclick="nextTrack()">⏭</button>
            <button onclick="downloadCurrent()" title="下载歌曲">📥</button>
        </div>
    </div>

    <div class="list-section">
        <input type="text" class="search-bar" id="search" placeholder="🔍 搜索你的音乐库..." oninput="filterSongs()">
        <ul id="playlist"></ul>
    </div>
</div>

<audio id="audio"></audio>

<script>
    // ======= 自动获取你的 GitHub 仓库配置 =======
    const GITHUB_CONFIG = {
        user: 'zhangzhanhang855',
        repo: 'musicplayer',
        path: '' // 根目录
    };

    let songs = [];
    let filteredSongs = [];
    let currentIndex = 0;
    let isPlaying = false;
    let playMode = 'list'; // list, random, single

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const playlist = document.getElementById('playlist');
    const trackTitle = document.getElementById('track-title');
    const bgBlur = document.getElementById('bg-blur');
    const cover = document.getElementById('main-cover');

    // 获取 GitHub 数据
    async function fetchSongs() {
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.user}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('API 请求失败，请检查仓库权限');
            const data = await res.json();
            
            // 支持 mp3 和 flac
            const allowedExtensions = ['.mp3', '.flac', '.wav', '.ogg'];
            songs = data
                .filter(file => allowedExtensions.some(ext => file.name.toLowerCase().endsWith(ext)))
                .map(file => ({
                    name: file.name.replace(/\.[^/.]+$/, ""), // 智能去除后缀
                    url: file.download_url
                }));

            filteredSongs = [...songs];
            renderPlaylist();
            if(songs.length > 0) loadTrack(0);
            else trackTitle.innerText = "仓库中没找到音频文件";
        } catch (err) {
            trackTitle.innerText = "加载失败：" + err.message;
        }
    }

    function renderPlaylist() {
        playlist.innerHTML = filteredSongs.map((song, i) => `
            <li class="${currentIndex === i ? 'active' : ''}" onclick="selectTrack(${i})">
                <span>${i + 1}. ${song.name}</span>
                <span>🎵</span>
            </li>
        `).join('');
    }

    function loadTrack(index) {
        currentIndex = index;
        const song = filteredSongs[currentIndex];
        audio.src = song.url;
        trackTitle.innerText = song.name;
        
        // 随机背景颜色淡化效果
        const hue = Math.floor(Math.random() * 360);
        bgBlur.style.background = `linear-gradient(135deg, hsl(${hue}, 40%, 25%), #000)`;
        
        document.querySelectorAll('#playlist li').forEach((li, i) => {
            li.classList.toggle('active', i === currentIndex);
        });
    }

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playBtn.innerText = '▶️';
            cover.style.animationPlayState = 'paused';
        } else {
            audio.play();
            playBtn.innerText = '⏸';
            cover.style.animationPlayState = 'running';
        }
        isPlaying = !isPlaying;
    }

    function nextTrack() {
        let next = playMode === 'random' ? Math.floor(Math.random() * filteredSongs.length) : (currentIndex + 1) % filteredSongs.length;
        loadTrack(next);
        if (isPlaying) audio.play();
    }

    function prevTrack() {
        let prev = (currentIndex - 1 + filteredSongs.length) % filteredSongs.length;
        loadTrack(prev);
        if (isPlaying) audio.play();
    }

    function toggleMode() {
        const modes = { list: '🔁', random: '🔀', single: '🔂' };
        if (playMode === 'list') playMode = 'random';
        else if (playMode === 'random') playMode = 'single';
        else playMode = 'list';
        document.getElementById('mode-btn').innerText = modes[playMode];
    }

    function filterSongs() {
        const term = document.getElementById('search').value.toLowerCase();
        filteredSongs = songs.filter(s => s.name.toLowerCase().includes(term));
        renderPlaylist();
    }

    function selectTrack(i) {
        loadTrack(i);
        if (!isPlaying) togglePlay(); else audio.play();
    }

    function downloadCurrent() {
        const link = document.createElement('a');
        link.href = filteredSongs[currentIndex].url;
        link.download = filteredSongs[currentIndex].name;
        link.click();
    }

    // 进度条控制
    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100 || 0;
        document.getElementById('progress').style.width = pct + '%';
    };

    document.getElementById('progress-bar').onclick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pos * audio.duration;
    };

    audio.onended = () => {
        if (playMode === 'single') audio.play(); else nextTrack();
    };

    fetchSongs();
</script>
</body>
</html>
