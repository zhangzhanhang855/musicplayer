    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent: #000000;
            --font-serif: "Noto Serif TC", serif;
            --font-sans: "Inter", system-ui, sans-serif;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);

        body, html {
            margin: 0; padding: 0;

        @keyframes drift {

        .list-item:active { transform: scale(0.98); background: rgba(0,0,0,0.04); }

    </style>

    <div id="main-app" class="hidden opacity-0 w-full max-w-7xl px-4 py-8 transition-all duration-1000 flex items-center justify-center">
        <div class="main-layout glass-panel w-full h-[760px] max-h-[90vh] rounded-[56px] overflow-hidden flex shadow-2xl relative">
            
            <!-- 左側：播放區域 -->
            <div class="player-section flex-1 h-full flex flex-col p-8 lg:p-10 relative overflow-hidden">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex flex-col">
                        <span class="text-[9px] tracking-[0.5em] font-bold text-black/20 uppercase mb-1">Now Streaming</span>
                        <div id="status" class="text-[10px] text-indigo-500 font-bold tracking-widest uppercase">Ready</div>
                    </div>
                    <div id="track-type" class="text-[9px] bg-black/5 px-3 py-1 rounded-full text-black/40 font-mono">HI-RES</div>
                </div>

                <div class="flex-1 flex flex-col items-center justify-center text-center">

                    <div id="cover" class="w-52 h-52 lg:w-64 lg:h-64 rounded-[40px] mb-8 shadow-2xl transition-all duration-1000 flex items-center justify-center text-5xl group relative">
                        <div class="absolute inset-0 bg-black/5 rounded-[40px] opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        💿
                    </div>
                    
                    <div class="mb-8">
                        <h2 id="title" class="text-2xl lg:text-3xl font-semibold mb-2 tracking-tight font-serif">待命</h2>
                        <p id="artist-name" class="text-[9px] tracking-[0.4em] text-black/30 uppercase">Premium Selection</p>
                    </div>

                    <div class="w-full max-w-sm mb-10">
                        <div class="relative h-[2.5px] w-full bg-black/[0.04] rounded-full mb-4 cursor-pointer group" id="seek-bar">
                            <div id="prog-bar" class="absolute h-full bg-black rounded-full w-0"></div>
                            <div class="absolute h-3 w-3 bg-white border-2 border-black rounded-full top-1/2 -translate-y-1/2 -ml-1.5 opacity-0 group-hover:opacity-100 transition-opacity" id="prog-dot"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-mono text-black/20 tracking-widest">
                            <span id="cur-time">00:00</span>
                            <span id="dur-time">00:00</span>
                        </div>
                    </div>

                    <!-- 控制按鈕組 -->
                    <div class="flex items-center gap-8 lg:gap-12">
                        <button onclick="setLoop()" id="mode-btn" class="text-[9px] font-bold tracking-[0.1em] text-black/30 hover:text-black transition-colors uppercase w-10">List</button>
                        <button onclick="step(-1)" class="text-black/30 hover:text-black transition-colors">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button onclick="playToggle()" id="play-btn" class="w-16 h-16 bg-black text-white rounded-full flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all">
                            <svg id="play-svg" class="w-7 h-7 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5.14v14l11-7-11-7z"/></svg>
                        </button>
                        <button onclick="step(1)" class="text-black/30 hover:text-black transition-colors">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M16 18h2V6h-2M7 6v12l8.5-6z"/></svg>
                        </button>
                        <button onclick="dl()" class="text-black/30 hover:text-black transition-colors w-10">
                            <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        </button>
                    </div>
                </div>

                <!-- AI 區域 -->
                <div class="mt-4 pt-6 border-t border-black/[0.03]">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></div>
                        <span class="text-[9px] font-bold tracking-[0.3em] text-indigo-500 uppercase">AI Interpret</span>
                    </div>
                    <div id="ai-text" class="text-[11px] leading-relaxed text-black/40 font-serif italic max-w-xl h-6 overflow-hidden">
                        感應旋律中的微光，準備轉化聽覺意境...
                    </div>
                </div>
            </div>

            <!-- 右側：曲庫 -->
            <div class="side-section w-full lg:w-[400px] bg-black/[0.01] border-l border-black/[0.03] flex flex-col relative z-20">
                <div class="p-8 border-b border-black/[0.03]">
                    <div class="relative group">
                        <input type="text" id="q" oninput="doSearch()" placeholder="Search Library" class="w-full bg-transparent border-none py-2 text-sm focus:ring-0 placeholder:text-black/20 font-light tracking-wide outline-none">
                        <div class="absolute bottom-0 left-0 w-full h-[1px] bg-black/[0.03] group-focus-within:bg-black/20 transition-all"></div>
                    </div>
                </div>
                
                <ul id="list" class="flex-1 overflow-y-auto no-scrollbar relative z-30">
                    <!-- 列表由 JS 生成 -->
                </ul>

                <div class="p-8">
                    <button onclick="addMusic()" class="w-full py-4 border border-black/10 rounded-2xl text-[9px] font-bold tracking-[0.3em] hover:bg-black hover:text-white transition-all uppercase">

                    </button>

            </div>

    </div>

    <audio id="player"></audio>

    <script>
        const apiKey = ""; 
        const G = { user: 'zhangzhanhang855', repo: 'musicplayer', ver: 'main' };
        
        const setCookie = (n, v, d=7) => {
            const date = new Date();
            date.setTime(date.getTime() + (d*24*60*60*1000));
            document.cookie = `${n}=${v};expires=${date.toUTCString()};path=/;SameSite=Lax`;
        };
        const getCookie = (n) => {
            const m = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
            return m ? m.pop() : null;
        };

        let allSongs = [], filtered = [], curIdx = 0, isPlaying = false, loopMode = 'list';
        const audio = document.getElementById('player');
        const aiBox = document.getElementById('ai-text');
        const cover = document.getElementById('cover');
        const bgMesh = document.getElementById('bg-mesh');

        function updateVisuals() {
            const h = Math.floor(Math.random() * 360);
            cover.style.background = `linear-gradient(135deg, hsl(${h}, 40%, 92%) 0%, hsl(${h}, 20%, 98%) 100%)`;
            cover.style.color = `hsl(${h}, 40%, 50%)`;
            const blobs = bgMesh.querySelectorAll('.blob');
            blobs.forEach(b => {
                b.style.transform = `translate(${Math.random()*20-10}%, ${Math.random()*20-10}%) rotate(${Math.random()*45}deg)`;
            });
        }

        async function analyzeInsight(name) {
            if (!apiKey) return;
            aiBox.innerText = "感應中...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `你是一位音樂導讀師。請用一句充滿詩意的話描述歌曲《${name}》的意境，20字以內。` }] }] })
                });
                const data = await res.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "旋律在無形中觸動靈魂深處。";
                aiBox.innerText = "";
                let i = 0;
                const type = () => {
                    if (i < text.length) {
                        aiBox.innerText += text.charAt(i); i++;
                        setTimeout(type, 60);
                    }
                };
                type();
            } catch (e) { aiBox.innerText = "旋律深邃，意境自成一體。"; }
        }

        window.addEventListener('load', () => {
            if (getCookie('isLoggedIn') === 'true') enterApp();
        });

        function checkPwd() {
            if (document.getElementById('pwd-input').value === '12345678') {
                setCookie('isLoggedIn', 'true', 7);
                enterApp();
            } else {
                document.getElementById('pwd-error').innerText = 'IDENTIFICATION FAILED';
            }
        }

        function enterApp() {
            const screen = document.getElementById('login-screen');
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                const app = document.getElementById('main-app');
                app.classList.remove('hidden');
                setTimeout(() => app.style.opacity = '1', 50);
                init();
            }, 700);
        }

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const data = await res.json();
                allSongs = data.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                    t: f.name.replace(/\.[^/.]+$/, ""),
                    u: f.size < 1024 
                       ? `https://media.githubusercontent.com/media/${G.user}/${G.repo}/${G.ver}/${encodeURIComponent(f.name)}`
                       : `https://fastly.jsdelivr.net/gh/${G.user}/${G.repo}@${G.ver}/${encodeURIComponent(f.name)}`,
                    type: f.size < 1024 ? 'LFS' : 'CDN'
                }));
                filtered = [...allSongs];
                
                const savedMode = getCookie('pref_loop_mode');
                if (savedMode) {
                    loopMode = savedMode;
                    document.getElementById('mode-btn').innerText = loopMode.toUpperCase();
                }

                renderList();
                const savedIdx = getCookie('pref_last_idx');
                curIdx = (savedIdx !== null && parseInt(savedIdx) < allSongs.length) ? parseInt(savedIdx) : 0;
                executeLoad(curIdx, false);
            } catch (e) { document.getElementById('status').innerText = "CONNECT ERROR"; }
        }

        function renderList() {
            const listEl = document.getElementById('list');
            listEl.innerHTML = filtered.map((s, i) => {
                const isCurrent = curIdx === i;
                return `
                <li class="list-item ${isCurrent ? 'active' : ''} px-8 py-6 cursor-pointer flex justify-between items-center" 
                    onclick="selectTrack(${i})">
                    <div class="flex flex-col gap-1 pointer-events-none">
                        <span class="text-xs font-medium tracking-tight ${isCurrent ? 'text-black' : 'text-black/60'}">${s.t}</span>
                        <span class="text-[8px] font-mono text-black/20 uppercase tracking-[0.1em]">${s.type} STREAM</span>
                    </div>
                    ${isCurrent && isPlaying ? `
                        <div class="playing-icon">
                            <div style="animation-delay: 0s"></div>
                            <div style="animation-delay: 0.2s"></div>
                            <div style="animation-delay: 0.4s"></div>
                        </div>
                    ` : `<span class="text-[9px] font-mono text-black/10">0${i+1}</span>`}
                </li>
            `}).join('');
        }

        function selectTrack(i) {
            executeLoad(i, true);
        }

        function executeLoad(idx, auto) {
            if (idx < 0 || idx >= filtered.length) return;
            curIdx = idx;
            const song = filtered[curIdx];
            
            audio.src = song.u;
            document.getElementById('title').innerText = song.t;
            document.getElementById('status').innerText = "Streaming " + song.type;
            document.getElementById('track-type').innerText = song.type;
            
            setCookie('pref_last_idx', curIdx, 30);
            updateVisuals();
            renderList();
            
            clearTimeout(window.aiTimer);
            window.aiTimer = setTimeout(() => analyzeInsight(song.t), 1500);

            if (auto) {
                audio.play().then(() => {
                    isPlaying = true;
                    syncUI();
                    renderList();
                });
            }
        }

        function playToggle() {
            if (audio.paused) {
                audio.play();
                isPlaying = true;
            } else {
                audio.pause();
                isPlaying = false;
            }
            syncUI();
            renderList();
        }
        
        function syncUI() {
            const svg = document.getElementById('play-svg');
            svg.innerHTML = isPlaying 
                ? `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`
                : `<path d="M8 5.14v14l11-7-11-7z"/>`;
        }
        
        function step(d) { executeLoad((curIdx + d + filtered.length) % filtered.length, true); }

        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            filtered = allSongs.filter(s => s.t.toLowerCase().includes(val));
            renderList();
        }
        
        function addMusic() { window.location.href = `mailto:zhangzhanhang855@gmail.com?subject=REQUEST`; }
        
        function setLoop() {
            const modes = ['list', 'random', 'single'];
            loopMode = modes[(modes.indexOf(loopMode) + 1) % 3];
            document.getElementById('mode-btn').innerText = loopMode.toUpperCase();
            setCookie('pref_loop_mode', loopMode, 30);
        }

        function dl() { window.open(filtered[curIdx].u); }

        function formatTime(sec) {
            if (isNaN(sec)) return "00:00";
            let m = Math.floor(sec/60), s = Math.floor(sec%60);
            return `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration * 100);
            document.getElementById('prog-bar').style.width = p + '%';
            if(document.getElementById('prog-dot')) document.getElementById('prog-dot').style.left = p + '%';
            document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
            document.getElementById('dur-time').innerText = formatTime(audio.duration);
        };
        
        audio.onended = () => { 
            if(loopMode === 'single') audio.play(); 
            else if(loopMode === 'random') executeLoad(Math.floor(Math.random()*filtered.length), true);
            else step(1); 
        };

        document.getElementById('seek-bar').onclick = (e) => { 
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; 
        };
    </script>
</body>
</html>
