    <style>
        :root { 
            --accent: #1d1d1f; 
            --accent-light: #f5f5f7;
            --ai-color: #5856D6;

            --panel: #ffffff;

            --border-radius-lg: 20px;

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; 
            height: 100%; height: 100dvh; 
            font-family: var(--font-family);
            background: var(--bg); color: var(--text-main); 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* 驗證介面 */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;

        }
        
        .login-box { 
            background: var(--panel); 
            padding: 60px 40px; 
            text-align: center; 
            width: 100%; max-width: 400px; 
            border-radius: var(--border-radius-lg);
            border: 1px solid #eeeeee;
        }
        
        .pwd-input { 
            background: #fafafa; border: 1px solid #eeeeee; 
            padding: 16px; color: var(--text-main); 
            margin: 30px 0; outline: none; font-size: 1.1rem; 
            width: 100%; border-radius: var(--border-radius-md);
            text-align: center; font-family: var(--font-family);
        }
        
        .login-btn { 
            background: var(--text-main); border: none; color: #FFF; 
            cursor: pointer; font-size: 1rem; width: 100%; padding: 16px;

        }
        .login-btn:hover { opacity: 0.8; }
        
        /* 主介面 */
        .container { 
            display: none; flex-direction: column; align-items: center; 
            height: 100%; height: 100dvh; padding: 24px; 
            padding-bottom: calc(24px + env(safe-area-inset-bottom)); 
        }
        
        .layout-wrapper { 
            display: flex; flex-direction: column; 
            width: 100%; max-width: 480px; 
            flex: 1; overflow: hidden; align-items: center;

        .glass-card { 
            background: var(--panel); padding: 32px; 
            width: 100%; text-align: center; 
            box-shadow: var(--shadow); border-radius: var(--border-radius-lg);
            margin-bottom: 24px; border: 1px solid #f0f0f0;
        }
        
        h2 { font-weight: 500; font-size: 1.3rem; margin: 0 0 8px 0; letter-spacing: 1px; }

            font-size: 0.6rem; border: 1px solid #eeeeee;

            text-transform: uppercase;
        }
        
        .progress-box { width: 100%; height: 2px; background: #eeeeee; position: relative; margin-bottom: 30px; cursor: pointer; }
        #prog-bar { position: absolute; height: 100%; background: var(--text-main); width: 0%; }
        
        .btns { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 280px; margin: 0 auto; }

            font-size: 1.6rem; width: 52px; height: 52px;

            display: flex; align-items: center; justify-content: center;
        }
        
        .ai-panel {

            border-radius: var(--border-radius-md); border: 1px solid #f0f0f0;
        }
        .ai-title { color: var(--ai-color); font-weight: 700; margin-bottom: 4px; font-size: 0.7rem; letter-spacing: 1px; }

        /* 搜尋與添加按鈕區域 */
        .list-wrap { width: 100%; flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        
        .search-row {
            display: flex; gap: 8px; width: 100%; margin-bottom: 12px;
        }

        .search-box {
            flex: 1; padding: 12px 16px; 
            border: 1px solid #f0f0f0; border-radius: var(--border-radius-md);
            font-family: var(--font-family); outline: none; font-size: 0.9rem;
            background: #fafafa; transition: 0.3s;
        }
        .search-box:focus { border-color: #ddd; background: #fff; }

        .add-btn {
            background: var(--text-main); color: #fff; border: none;
            padding: 0 16px; border-radius: var(--border-radius-md);
            font-family: var(--font-family); font-size: 0.85rem;
            cursor: pointer; transition: 0.3s; white-space: nowrap;
        }
        .add-btn:hover { opacity: 0.8; }

        #list { 
            list-style: none; padding: 0; overflow-y: auto; flex: 1; margin: 0; 
            width: 100%; background: var(--panel); border: 1px solid #f0f0f0; border-radius: var(--border-radius-lg);
        }
        #list li { 
            padding: 16px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; 
            display: flex; justify-content: space-between; font-size: 0.9rem; transition: 0.2s;
        }
        #list li:hover { background: #fafafa; }
        #list li.active { background: #fafafa; font-weight: 700; border-left: 3px solid var(--text-main); }

        @media (min-width: 900px) {

            .glass-card { width: 400px; }
        }

        #list::-webkit-scrollbar { width: 3px; }
        #list::-webkit-scrollbar-thumb { background: #eee; }
    </style>
</head>
<body>
    
    <div id="login-screen">
        <div class="login-box">
            <h1>啟程</h1>
            <p>請輸入您的 JR Premium 代碼</p>
            <input type="password" id="pwd-input" class="pwd-input" placeholder="代碼" onkeydown="if(event.key==='Enter') checkPwd()">
            <button onclick="checkPwd()" class="login-btn">驗證並開啟</button>
            <div id="pwd-error" style="color:red; font-size:0.8rem; margin-top:10px;"></div>
        </div>
    </div>
    
    <div class="container" id="main-app">
        <div class="layout-wrapper">
            <div class="glass-card">
                <div id="speed-tag">LFS 加速傳輸中</div>
                <h2 id="title">靜候載入</h2>
                <div id="status" style="font-size:0.7rem; color:#bbb; margin-bottom:20px; letter-spacing: 1px;">STANDBY</div>
                
                <div class="progress-box" id="seek-bar">
                    <div id="prog-bar"></div>
                </div>
                
                <div class="btns">
                    <button onclick="setMode()" id="mode-btn">順序</button>
                    <button onclick="step(-1)">上首</button>
                    <button onclick="playToggle()" class="main-play" id="play-btn">▶</button>
                    <button onclick="step(1)">下首</button>
                    <button onclick="dl()">下載</button>
                </div>
                
                <div class="ai-panel">
                    <div class="ai-title">✦ AI 意境感應</div>
                    <div id="ai-text">準備進行曲目深度分析...</div>
                </div>
            </div>
            
            <div class="list-wrap">
                <div class="search-row">
                    <input type="text" id="q" class="search-box" placeholder="搜尋曲目..." oninput="doSearch()">
                    <button class="add-btn" onclick="addMusic()">添加音樂</button>
                </div>
                <ul id="list"></ul>
            </div>
        </div>
    </div>
    
    <audio id="player"></audio>
    
    <script>
        // =========================================================================
        // 🔑 您的配置
        // =========================================================================
        const apiKey = ""; // 填入您的 Gemini API Key
        const G = { user: 'zhangzhanhang855', repo: 'musicplayer', ver: 'main' };
        // =========================================================================

        let all = [], filtered = [], cur = 0, isP = false, loop = 'list';
        const audio = document.getElementById('player');
        const aiText = document.getElementById('ai-text');

        // LFS 檔案路徑邏輯
        const getOptimalUrl = (f) => {
            const isLFS = f.size < 1024; // 指向文件通常很小
            if (isLFS) {
                return {
                    url: `https://media.githubusercontent.com/media/${G.user}/${G.repo}/${G.ver}/${encodeURIComponent(f.name)}`,
                    type: 'LFS DIRECT'
                };
            } else {
                return {
                    url: `https://fastly.jsdelivr.net/gh/${G.user}/${G.repo}@${G.ver}/${encodeURIComponent(f.name)}`,
                    type: 'CDN EDGE'
                };
            }
        };

        // 點歌功能
        function addMusic() {
            const recipient = "zhangzhanhang855@gmail.com";
            const subject = encodeURIComponent("我要在网站点歌（标题不要改，内容直接写歌名，逗号分隔写作者，其他什么都不要写）");
            const body = encodeURIComponent("歌名, 作者");
            window.location.href = `mailto:${recipient}?subject=${subject}&body=${body}`;
        }

        async function analyzeSongTitle(title) {
            if (!apiKey) return;
            aiText.innerText = "正在解析曲目意境...";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `請分析歌曲《${title}》的意境，用一句充滿詩意且精簡的話描述，30字以內。不要有任何前綴詞。` }] }] })
                });
                const data = await response.json();
                aiText.innerText = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "旋律迴盪，自成一格。";
            } catch (e) { aiText.innerText = "意境分析暫時不可用。"; }
        }

        function checkPwd() {
            if (document.getElementById('pwd-input').value === 'gmsf4rdth89Ky5632') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                start();
            } else {
                document.getElementById('pwd-error').innerText = '無效驗證碼';
            }
        }

        async function start() {
            try {
                const r = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const d = await r.json();
                all = d.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => {
                    const route = getOptimalUrl(f);
                    return {
                        t: f.name.replace(/\.[^/.]+$/, ""),
                        u: route.url,
                        type: route.type
                    };
                });
                filtered = [...all];
                drawList();
                if(all.length > 0) loadTrack(0, false);
            } catch (e) { document.getElementById('status').innerText = "雲端連接異常"; }
        }

        function drawList() {
            document.getElementById('list').innerHTML = filtered.map((s, i) => 
                `<li class="${cur === i ? 'active' : ''}" onclick="selectTrack(${i})">
                    <span>${s.t}</span>
                    <span style="opacity:0.2; font-size:0.6rem;">${s.type}</span>
                </li>`).join('');
        }

        function loadTrack(idx, auto = true) {
            if(!filtered[idx]) return;
            cur = idx;
            const s = filtered[cur];
            audio.src = s.u;
            document.getElementById('title').innerText = s.t;
            document.getElementById('speed-tag').innerText = `傳輸路徑: ${s.type}`;
            drawList();
            clearTimeout(window.aiTimer);
            window.aiTimer = setTimeout(() => analyzeSongTitle(s.t), 2000);
            if (auto) { audio.play(); isP = true; updateUI(); }
        }

        function selectTrack(i) { loadTrack(i); }
        function playToggle() { if (audio.paused) audio.play(); else audio.pause(); isP = !audio.paused; updateUI(); }
        function updateUI() { document.getElementById('play-btn').innerText = isP ? '||' : '▶'; }
        function step(d) { loadTrack((cur + d + filtered.length) % filtered.length); }
        
        function doSearch() {
            const key = document.getElementById('q').value.toLowerCase();
            filtered = all.filter(s => s.t.toLowerCase().includes(key));
            drawList();
        }

        function setMode() {
            const mArr = ['list', 'random', 'single'];
            const mTxt = { list: '順序', random: '隨機', single: '單曲' };
            loop = mArr[(mArr.indexOf(loop) + 1) % 3];
            document.getElementById('mode-btn').innerText = mTxt[loop];
        }
        function dl() { window.open(filtered[cur].u); }

        audio.onplaying = () => { document.getElementById('status').innerText = "STREAMING..."; };
        audio.ontimeupdate = () => {
            document.getElementById('prog-bar').style.width = (audio.currentTime / audio.duration * 100) + '%';
        };
        audio.onended = () => { if(loop === 'single') audio.play(); else step(1); };
        document.getElementById('seek-bar').onclick = (e) => { 
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; 
        };
    </script>
</body>
</html>
