    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const apiKey = ""; 
        const G = { user: 'zhangzhanhang855', repo: 'musicplayer', ver: 'main' };
        
        const setCookie = (n, v, d=7) => {
            const date = new Date();
            date.setTime(date.getTime() + (d*24*60*60*1000));
            document.cookie = `${n}=${v};expires=${date.toUTCString()};path=/;SameSite=Lax`;
        };
        const getCookie = (n) => {
            const m = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
            return m ? m.pop() : null;
        };

        let allSongs = [], filtered = [], curIdx = 0, isPlaying = false, loopMode = 'list';
        let currentCoverObjectURL = null;

        const audio = document.getElementById('player');
        const aiBox = document.getElementById('ai-text');
        const cover = document.getElementById('cover');
        const coverEmoji = document.getElementById('cover-emoji');
        const bgMesh = document.getElementById('bg-mesh');

        // --- 核心封面解析函数 ---
        function extractCover(songUrl, songData) {
            // 清理旧资源
            if (currentCoverObjectURL && currentCoverObjectURL.startsWith('blob:')) {
                URL.revokeObjectURL(currentCoverObjectURL);
            }
            currentCoverObjectURL = null;

            // 显示加载状态
            cover.parentElement.classList.add('is-loading');
            cover.style.backgroundImage = 'none';

            new jsmediatags.Reader(songUrl)
                .setTagsToRead(["picture", "artist", "title"])
                .read({
                    onSuccess: function(tag) {
                        const pic = tag.tags.picture;
                        if (pic) {
                            const data = pic.data;
                            const format = pic.format;
                            let base64String = "";
                            for (let i = 0; i < data.length; i++) base64String += String.fromCharCode(data[i]);
                            const base64 = `data:${format};base64,${window.btoa(base64String)}`;
                            
                            cover.style.backgroundImage = `url(${base64})`;
                            coverEmoji.style.opacity = '0';
                            currentCoverObjectURL = base64;
                            updateMediaSession(songData, base64);
                        } else {
                            resetCoverUI(songData);
                        }
                        cover.parentElement.classList.remove('is-loading');
                    },
                    onError: function(error) {
                        console.warn("MediaTags Error:", error);
                        resetCoverUI(songData);
                        cover.parentElement.classList.remove('is-loading');
                    }
                });
        }

        function resetCoverUI(songData) {
            cover.style.backgroundImage = 'none';
            coverEmoji.style.opacity = '1';
            const h = Math.floor(Math.random() * 360);
            cover.style.backgroundColor = `hsl(${h}, 30%, 95%)`;
            cover.style.color = `hsl(${h}, 30%, 40%)`;
            updateMediaSession(songData, null);
        }

        function updateMediaSession(song, coverUrl) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.t,
                    artist: "Premium Selection",
                    album: "Elite Music Space",
                    artwork: [
                        { src: coverUrl || 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=512', sizes: '512x512', type: 'image/jpeg' }
                    ]
                });
                
                const handlers = [
                    ['play', () => audio.play()],
                    ['pause', () => audio.pause()],
                    ['previoustrack', () => step(-1)],
                    ['nexttrack', () => step(1)]
                ];
                handlers.forEach(([action, handler]) => {
                    try { navigator.mediaSession.setActionHandler(action, handler); } catch(e) {}
                });
            }
        }

        // --- 核心播放逻辑 ---
        function syncAppState(playing) {
            isPlaying = playing;
            document.body.classList.toggle('is-paused', !playing);
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = playing ? 'playing' : 'paused';
            
            const svg = document.getElementById('play-svg');
            svg.innerHTML = playing 
                ? `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`
                : `<path d="M8 5.14v14l11-7-11-7z"/>`;
            renderList();
        }

        function executeLoad(idx, auto) {
            if (idx < 0 || idx >= filtered.length) return;
            curIdx = idx;
            const song = filtered[curIdx];
            
            // 使用 GitHub Raw 链接，这是最直接且支持流式传输的方案
            audio.src = song.u;
            document.getElementById('title').innerText = song.t;
            document.getElementById('status').innerText = "Streaming " + song.type;
            document.getElementById('track-type').innerText = song.type;
            
            setCookie('pref_last_idx', curIdx, 30);
            renderList();
            extractCover(song.u, song);

            clearTimeout(window.aiTimer);
            window.aiTimer = setTimeout(() => analyzeInsight(song.t), 1500);

            if (auto) {
                audio.play().catch(() => syncAppState(false));
            }
        }

        function playToggle() { audio.paused ? audio.play() : audio.pause(); }
        function step(d) { executeLoad((curIdx + d + filtered.length) % filtered.length, true); }

        audio.onplay = () => syncAppState(true);
        audio.onpause = () => syncAppState(false);
        audio.onended = () => { 
            if(loopMode === 'single') audio.play(); 
            else if(loopMode === 'random') executeLoad(Math.floor(Math.random()*filtered.length), true);
            else step(1); 
        };
        audio.ontimeupdate = () => {
            if (audio.duration) {
                const p = (audio.currentTime / audio.duration * 100);
                document.getElementById('prog-bar').style.width = p + '%';
                if(document.getElementById('prog-dot')) document.getElementById('prog-dot').style.left = p + '%';
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
                document.getElementById('dur-time').innerText = formatTime(audio.duration);
            }
        };

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const data = await res.json();
                
                allSongs = data.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => {
                    const fileName = encodeURIComponent(f.name);
                    // GitHub API 中，LFS 指针文件通常非常小（100-200字节），普通 MP3 会很大
                    const isLFS = f.size < 2000; 
                    return {
                        t: f.name.replace(/\.[^/.]+$/, ""),
                        // 统一使用 raw 内容，稳定性最高
                        u: `https://raw.githubusercontent.com/${G.user}/${G.repo}/${G.ver}/${fileName}`,
                        type: isLFS ? 'HI-RES' : 'STD'
                    };
                });

                if (allSongs.length === 0) throw new Error("No Songs Found");

                filtered = [...allSongs];
                const savedMode = getCookie('pref_loop_mode');
                if (savedMode) { loopMode = savedMode; document.getElementById('mode-btn').innerText = loopMode.toUpperCase(); }
                
                renderList();
                const savedIdx = getCookie('pref_last_idx');
                curIdx = (savedIdx !== null && parseInt(savedIdx) < allSongs.length) ? parseInt(savedIdx) : 0;
                executeLoad(curIdx, false);
            } catch (e) { 
                console.error(e);
                document.getElementById('status').innerText = "CONNECT ERROR"; 
            }
        }

        function renderList() {
            const listEl = document.getElementById('list');
            listEl.innerHTML = filtered.map((s, i) => {
                const isCurrent = curIdx === i;
                return `
                <li class="list-item ${isCurrent ? 'active' : ''} px-8 py-6 cursor-pointer flex justify-between items-center" 
                    onclick="executeLoad(${i}, true)">
                    <div class="flex flex-col gap-1.5">
                        <span class="text-[13px] font-medium tracking-tight ${isCurrent ? 'text-black' : 'text-black/60'}">${s.t}</span>
                        <span class="text-[8px] font-mono text-black/20 uppercase tracking-[0.1em]">${s.type} STREAM</span>
                    </div>
                    ${isCurrent && isPlaying ? `
                        <div class="playing-icon"><div></div><div style="animation-delay: 0.2s"></div><div style="animation-delay: 0.4s"></div></div>
                    ` : `<span class="text-[9px] font-mono text-black/10">0${i+1}</span>`}
                </li>`;
            }).join('');
        }

        async function analyzeInsight(name) {
            if (!apiKey) return;
            aiBox.innerText = "感應中...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: `你是一位音樂導讀師。請用一句充滿詩意的話描述歌曲《${name}》的意境，20字以內。不要使用引號。` }] }] 
                    })
                });
                const data = await res.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "旋律在無形中觸動靈魂深處。";
                aiBox.innerText = "";
                let i = 0;
                const type = () => { if (i < text.length) { aiBox.innerText += text.charAt(i++); setTimeout(type, 50); } };
                type();
            } catch (e) { aiBox.innerText = "旋律深邃，意境自成一體。"; }
        }

        // --- 交互功能 ---
        function checkPwd() {
            if (document.getElementById('pwd-input').value === '12345678') {
                setCookie('isLoggedIn', 'true', 7);
                enterApp();
            } else { document.getElementById('pwd-error').innerText = 'IDENTIFICATION FAILED'; }
        }

        function enterApp() {
            const screen = document.getElementById('login-screen');
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                const app = document.getElementById('main-app');
                app.classList.remove('hidden');
                setTimeout(() => app.style.opacity = '1', 50);
                init();
            }, 700);
        }

        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            filtered = allSongs.filter(s => s.t.toLowerCase().includes(val));
            renderList();
        }
        function formatTime(sec) {
            if (isNaN(sec)) return "00:00";
            let m = Math.floor(sec/60), s = Math.floor(sec%60);
            return `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        }
        function setLoop() {
            const modes = ['list', 'random', 'single'];
            loopMode = modes[(modes.indexOf(loopMode) + 1) % 3];
            document.getElementById('mode-btn').innerText = loopMode.toUpperCase();
            setCookie('pref_loop_mode', loopMode, 30);
        }
        function dl() { window.open(filtered[curIdx].u); }
        function addMusic() { window.location.href = `mailto:zhangzhanhang855@gmail.com?subject=TRACK_REQUEST`; }

        document.getElementById('seek-bar').onclick = (e) => { 
            const rect = e.currentTarget.getBoundingClientRect();
            if (audio.duration) {
                audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; 
            }
        };

        // 初始化检查登录状态
        if (getCookie('isLoggedIn') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('main-app').style.opacity = '1';
            init();
        }
    </script>
</body>
</html>
