<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Premium 智能音樂播放器</title>
    
    <link rel="dns-prefetch" href="https://api.github.com">
    <link rel="preconnect" href="https://api.github.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    
    <style>
        :root { 
            --accent: #007AFF; 
            --accent-light: #E5F1FF;
            --ai-color: #5856D6; 
            --bg: #F5F5F7; 
            --panel: #FFFFFF;
            --text-main: #1D1D1F;
            --text-sub: #86868B;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; 
            height: 100%; height: 100dvh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text-main); 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--bg); z-index: 9999; padding: 20px;
        }
        
        .login-box { 
            background: var(--panel); 
            padding: 48px 32px; 
            text-align: center; 
            width: 100%; max-width: 380px; 
            border-radius: var(--border-radius-lg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }
        
        .pwd-input { 
            background: #F2F2F7; 
            border: 1px solid transparent; 
            padding: 16px; 
            color: var(--text-main); 
            margin: 24px 0; 
            outline: none; 
            font-size: 1.1rem; 
            width: 100%; 
            border-radius: var(--border-radius-md);
            text-align: center;
            transition: var(--transition);
        }
        .pwd-input:focus { border-color: var(--accent); background: #FFF; box-shadow: 0 0 0 4px var(--accent-light); }
        
        .login-btn { 
            background: var(--text-main); 
            border: none; color: #FFF; 
            cursor: pointer; font-size: 1rem; 
            width: 100%; padding: 16px; 
            border-radius: var(--border-radius-md);
            font-weight: 600; 
            transition: var(--transition);
        }
        
        .container { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            height: 100%; height: 100dvh; 
            padding: 24px; 
            padding-bottom: calc(24px + env(safe-area-inset-bottom)); 
        }
        
        .layout-wrapper { 
            display: flex; 
            flex-direction: column; 
            width: 100%; max-width: 480px; 
            flex: 1; overflow: hidden; 
            align-items: center; 
        }
        
        .glass-card { 
            background: var(--panel); 
            padding: 32px; 
            width: 100%; 
            text-align: center; 
            box-shadow: var(--shadow);
            border-radius: var(--border-radius-lg);
            margin-bottom: 24px; 
            border: 1px solid rgba(0,0,0,0.02);
        }
        
        #speed-tag { 
            font-size: 0.7rem; 
            background: var(--accent-light); 
            color: var(--accent); 
            padding: 4px 12px; 
            border-radius: 20px;
            font-weight: 700; 
            margin-bottom: 12px; 
            display: inline-block; 
        }
        
        .progress-box { width: 100%; height: 6px; background: #E5E5EA; border-radius: 10px; position: relative; margin-bottom: 32px; cursor: pointer; }
        #buf-bar { position: absolute; height: 100%; background: rgba(0,0,0,0.05); border-radius: 10px; width: 0%; }
        #prog-bar { position: absolute; height: 100%; background: var(--accent); border-radius: 10px; width: 0%; }
        
        .btns { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 300px; margin: 0 auto; }
        .btns button { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 1.4rem; transition: var(--transition); }
        .btns .main-play { 
            font-size: 2.2rem; width: 64px; height: 64px; 
            background: var(--text-main); color: #FFF; border-radius: 50%; 
        }
        
        .ai-panel { 
            background: #F8F8FC; padding: 16px; margin-top: 24px; text-align: left; 
            border-radius: var(--border-radius-md); border: 1px solid rgba(88, 86, 214, 0.1);
        }
        .ai-title { color: var(--ai-color); font-weight: 700; margin-bottom: 8px; font-size: 0.8rem; }
        
        #list { 
            list-style: none; padding: 0; overflow-y: auto; flex: 1; margin: 0; 
            width: 100%; background: var(--panel); border-radius: var(--border-radius-lg); box-shadow: var(--shadow);
        }
        #list li { padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.03); cursor: pointer; display: flex; justify-content: space-between; }
        #list li.active { color: var(--accent); background: var(--accent-light); font-weight: 600; }

        @media (min-width: 900px) {
            .layout-wrapper { flex-direction: row; max-width: 1000px; gap: 32px; }
            .glass-card { width: 400px; }
        }
    </style>
</head>
<body>
    
    <div id="login-screen">
        <div class="login-box">
            <h1>JR Premium</h1>
            <p>請輸入您的啟用碼以存取曲庫</p>
            <input type="password" id="pwd-input" class="pwd-input" placeholder="啟用碼" onkeydown="if(event.key==='Enter') checkPwd()">
            <button onclick="checkPwd()" class="login-btn">登入</button>
            <div id="pwd-error"></div>
        </div>
    </div>
    
    <div class="container" id="main-app">
        <div class="layout-wrapper">
            <div class="glass-card">
                <div id="speed-tag">智能路由中</div>
                <h2 id="title">載入中...</h2>
                <div id="status">準備就緒</div>
                
                <div class="progress-box" id="seek-bar">
                    <div id="buf-bar"></div>
                    <div id="prog-bar"></div>
                </div>
                
                <div class="btns">
                    <button onclick="setMode()" id="mode-btn">LIST</button>
                    <button onclick="step(-1)">◁◁</button>
                    <button onclick="playToggle()" class="main-play" id="play-btn">▶</button>
                    <button onclick="step(1)">▷▷</button>
                    <button onclick="dl()">↓</button>
                </div>
                
                <div class="ai-panel">
                    <div class="ai-title">✦ GEMINI AI 智能分析</div>
                    <div id="ai-text">等待歌曲播放以進行分析...</div>
                </div>
            </div>
            
            <div id="list"></div>
        </div>
    </div>
    
    <audio id="player"></audio>
    
    <script>
        // =========================================================================
        // 🔑 請在此處填寫您的 API KEY
        // =========================================================================
        const apiKey = "AIzaSyDFp3FaJYc6VBc4Q_zY2W7Z132U-Q7pL9Y"; 
        const G = { user: 'zhangzhanhang855', repo: 'musicplayer', ver: 'main' };
        // =========================================================================

        let all = [], filtered = [], cur = 0, isP = false, loop = 'list';
        const audio = document.getElementById('player');
        const aiText = document.getElementById('ai-text');

        // 指數退避重試函數
        async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                if (retries <= 0) throw error;
                await new Promise(resolve => setTimeout(resolve, backoff));
                return fetchWithRetry(url, options, retries - 1, backoff * 2);
            }
        }

        async function analyzeSongTitle(title) {
            if (!apiKey) {
                aiText.innerText = "⚠️ 請在代碼中配置 API Key。";
                return;
            }

            aiText.innerText = "📡 AI 正在感應曲目意境...";
            
            // 使用建議的 2.5-flash-preview 模型，或者你可以改回 1.5-flash
            const model = "gemini-2.5-flash-preview-09-2025";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    parts: [{ text: `你是一位資深音樂評論家。請用一句話（30字以內）分析歌曲《${title}》的情感意境或音樂風格。直接給出結果，不要有前言。` }]
                }]
            };

            try {
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (responseText) {
                    aiText.innerText = responseText.trim();
                } else {
                    aiText.innerText = "AI 無法識別此曲目。";
                }
            } catch (error) {
                console.error("Gemini Error:", error);
                aiText.innerText = `❌ AI 分析失敗: ${error.message}。請檢查 Key 是否有效或網絡環境。`;
            }
        }

        // --- 播放器邏輯 ---
        function checkPwd() {
            if (document.getElementById('pwd-input').value === 'gmsf4rdth89Ky5632') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                start();
            } else {
                document.getElementById('pwd-error').innerText = '啟用碼無效';
            }
        }

        async function start() {
            try {
                const r = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const d = await r.json();
                all = d.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                    t: f.name.replace(/\.[^/.]+$/, ""),
                    u: `https://fastly.jsdelivr.net/gh/${G.user}/${G.repo}@${G.ver}/${encodeURIComponent(f.name)}`
                }));
                filtered = [...all];
                drawList();
                if(all.length > 0) loadTrack(0, false);
            } catch (e) { document.getElementById('status').innerText = "載入失敗"; }
        }

        function drawList() {
            document.getElementById('list').innerHTML = filtered.map((s, i) => 
                `<li class="${cur === i ? 'active' : ''}" onclick="selectTrack(${i})">${s.t}</li>`).join('');
        }

        function loadTrack(idx, auto = true) {
            cur = idx;
            const s = filtered[cur];
            audio.src = s.u;
            document.getElementById('title').innerText = s.t;
            drawList();
            
            // 延遲兩秒分析，避免切歌太快頻繁調用 API
            clearTimeout(window.aiTimer);
            window.aiTimer = setTimeout(() => analyzeSongTitle(s.t), 1500);
            
            if (auto) { audio.play(); isP = true; updateUI(); }
        }

        function selectTrack(i) { loadTrack(i); }
        function playToggle() { if (audio.paused) audio.play(); else audio.pause(); isP = !audio.paused; updateUI(); }
        function updateUI() { document.getElementById('play-btn').innerText = isP ? '||' : '▶'; }
        function step(d) { loadTrack((cur + d + filtered.length) % filtered.length); }
        
        audio.ontimeupdate = () => {
            document.getElementById('prog-bar').style.width = (audio.currentTime / audio.duration * 100) + '%';
        };
        
        audio.onended = () => step(1);
    </script>
</body>
</html>
