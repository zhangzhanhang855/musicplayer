<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VOID | Premium Music Space</title>
    
    <!-- 外部資源加載 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Syncopate:wght@700&family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --accent: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-dim: rgba(255, 255, 255, 0.4);
            --font-main: 'Inter', system-ui, sans-serif;
            --font-logo: 'Syncopate', sans-serif;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--accent);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 极致背景：弥散光 --- */
        .visual-bg {
            position: fixed; inset: 0; z-index: -1;
            filter: blur(100px); opacity: 0.6;
        }
        .orb {
            position: absolute; border-radius: 50%;
            animation: drift 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 60vw; height: 60vw; background: #2563eb; top: -10%; left: -10%; }
        .orb-2 { width: 50vw; height: 50vw; background: #7c3aed; bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes drift {
            from { transform: translate(0,0) rotate(0deg) scale(1); }
            to { transform: translate(10%, 15%) rotate(180deg) scale(1.2); }
        }

        /* --- 身份驗證屏 --- */
        .auth-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: var(--bg-dark);
            display: flex; align-items: center; justify-content: center;
            transition: all 1s var(--ease);
        }
        .auth-card { text-align: center; width: 100%; max-width: 320px; }
        .brand-logo { font-family: var(--font-logo); letter-spacing: 1em; font-size: 14px; margin-bottom: 60px; color: var(--accent); }
        .pwd-input {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--glass-border);
            padding: 15px; color: white; text-align: center; outline: none; letter-spacing: 0.5em;
            margin-bottom: 30px; transition: 0.3s;
        }
        .pwd-input:focus { border-bottom-color: var(--accent); }

        /* --- 主容器 --- */
        .app-container {
            width: 95%; max-width: 1200px; height: 820px; max-height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(50px) saturate(160%);
            -webkit-backdrop-filter: blur(50px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 48px;
            display: flex; overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
            opacity: 0; transform: scale(1.05);
            transition: all 1.2s var(--ease);
        }
        .app-container.active { opacity: 1; transform: scale(1); }

        /* --- 左：播放核心 --- */
        .player-core {
            flex: 1.2; padding: 60px; display: flex; flex-direction: column;
            border-right: 1px solid var(--glass-border); position: relative;
        }

        /* CD 旋转交互 */
        .artwork-vault { flex: 1; display: flex; align-items: center; justify-content: center; }
        .main-disc {
            width: 340px; height: 340px; border-radius: 50%;
            background: #111; position: relative;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            transition: transform 1s var(--ease), filter 1s var(--ease);
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center;
            border: 8px solid rgba(255,255,255,0.05);
        }
        /* 播放時旋轉 */
        @keyframes rotate-disc { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .is-playing .main-disc { animation: rotate-disc 15s linear infinite; }
        .is-paused .main-disc { transform: scale(0.9) rotate(-5deg); filter: brightness(0.6); }

        .disc-center {
            position: absolute; width: 60px; height: 60px; background: var(--bg-dark);
            border-radius: 50%; border: 4px solid rgba(255,255,255,0.1);
            z-index: 2;
        }

        /* 进度条 */
        .progress-area { width: 100%; max-width: 400px; margin: 40px auto; }
        .scrubber-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 10px; cursor: pointer; position: relative;
        }
        .prog-fill {
            position: absolute; height: 100%; background: #fff; border-radius: 10px;
            box-shadow: 0 0 15px rgba(255,255,255,0.5); width: 0%;
        }

        /* --- 右：列表 --- */
        .media-library { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        .track-list { flex: 1; overflow-y: auto; padding: 20px; }
        .track-list::-webkit-scrollbar { width: 4px; }
        .track-list::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .list-item {
            padding: 20px 30px; border-radius: 20px; margin-bottom: 10px;
            cursor: pointer; transition: 0.3s var(--ease);
            display: flex; justify-content: space-between; align-items: center;
        }
        .list-item:hover { background: rgba(255,255,255,0.05); padding-left: 40px; }
        .list-item.active { background: #fff; color: #000; }

        .playlist-tab {
            padding: 10px 20px; font-size: 10px; font-weight: bold; letter-spacing: 2px;
            opacity: 0.4; transition: 0.3s;
        }
        .playlist-tab.active { opacity: 1; border-bottom: 2px solid white; }

        .play-btn {
            width: 80px; height: 80px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s var(--ease); color: #000;
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px rgba(255,255,255,0.3); }

        /* 响应式 */
        @media (max-width: 1024px) {
            .app-container { flex-direction: column; height: 100vh; width: 100vw; border-radius: 0; }
            .player-core { flex: 1.5; padding: 30px; }
            .media-library { flex: 1; }
            .main-disc { width: 220px; height: 220px; }
        }
    </style>
</head>
<body class="is-paused">

    <div class="visual-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- 驗證屏 -->
    <div id="login-screen" class="auth-overlay">
        <div class="auth-card">
            <h1 class="brand-logo">VOID</h1>
            <input type="password" id="pwd-input" class="pwd-input" placeholder="ACCESS CODE" onkeydown="if(event.key==='Enter') checkPwd()">
            <p id="pwd-error" class="text-[10px] text-red-500 tracking-widest uppercase"></p>
        </div>
    </div>

    <!-- 主界面 -->
    <main id="main-app" class="app-container">
        <!-- 左側播放區域 -->
        <section class="player-core">
            <div class="flex justify-between items-start opacity-40 text-[10px] tracking-[0.3em] font-bold">
                <div id="current-folder-name">LIBRARY / ROOT</div>
                <div id="track-type">HI-RES AUDIO</div>
            </div>

            <div class="artwork-vault">
                <div id="cover" class="main-disc">
                    <div class="disc-center"></div>
                    <span id="cover-emoji" class="text-6xl">💿</span>
                </div>
            </div>

            <div class="text-center mb-8">
                <h1 id="title" class="text-3xl font-semibold tracking-tight mb-2 font-serif">Select a Track</h1>
                <p id="artist-name" class="text-[10px] tracking-[0.5em] text-white/30 uppercase">Premium Sequence</p>
            </div>

            <div class="progress-area">
                <div class="scrubber-bar" id="seek-bar">
                    <div id="prog-bar" class="prog-fill"></div>
                </div>
                <div class="flex justify-between mt-4 text-[10px] font-mono opacity-30">
                    <span id="cur-time">00:00</span>
                    <span id="dur-time">00:00</span>
                </div>
            </div>

            <div class="flex items-center justify-center gap-10">
                <button onclick="setLoop()" id="mode-btn" class="text-[9px] font-bold opacity-30 hover:opacity-100 uppercase w-10">List</button>
                <button onclick="step(-1)" class="opacity-40 hover:opacity-100 transition-opacity">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button onclick="playToggle()" id="play-btn" class="play-btn">
                    <svg id="play-svg" class="w-10 h-10 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5.14v14l11-7-11-7z"/></svg>
                </button>
                <button onclick="step(1)" class="opacity-40 hover:opacity-100 transition-opacity">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M16 18h2V6h-2M7 6v12l8.5-6z"/></svg>
                </button>
                <button onclick="dl()" class="opacity-40 hover:opacity-100 w-10">
                    <svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                </button>
            </div>

            <div class="mt-10 pt-6 border-t border-white/5">
                <p id="ai-text" class="text-[11px] italic text-white/40 font-serif text-center">系统就绪，等待音频流...</p>
            </div>
        </section>

        <!-- 右側清單區域 -->
        <aside class="media-library">
            <div class="p-8 pb-4">
                <div id="playlist-nav" class="flex gap-4 overflow-x-auto no-scrollbar mb-6"></div>
                <input type="text" id="q" oninput="doSearch()" placeholder="SEARCH LIBRARY..." class="w-full bg-white/5 border-b border-white/10 py-3 px-4 text-xs outline-none focus:border-white/40 transition-all">
            </div>
            
            <ul id="list" class="track-list"></ul>
            
            <div class="p-8">
                <button onclick="addMusic()" class="w-full py-4 border border-white/10 rounded-2xl text-[9px] font-bold tracking-[0.3em] hover:bg-white hover:text-black transition-all">
                    REQUEST TRACK
                </button>
            </div>
        </aside>
    </main>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        // 核心配置
        const G = { user: 'zhangzhanhang855', repo: 'musiconly', ver: 'main' };
        const apiKey = ""; // 如果需要 Gemini AI 评论，请填写

        let playlists = {}; 
        let currentPlaylistName = "";
        let filtered = [], curIdx = 0, isPlaying = false, loopMode = 'list';
        
        const audio = document.getElementById('player');
        const aiBox = document.getElementById('ai-text');
        const cover = document.getElementById('cover');
        const coverEmoji = document.getElementById('cover-emoji');
        const navEl = document.getElementById('playlist-nav');

        // 初始化
        async function init() {
            const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
            const items = await res.json();
            
            // 根目录音乐
            const rootSongs = filterSongs(items);
            if (rootSongs.length > 0) playlists["Root"] = rootSongs;

            // 获取文件夹
            const folders = items.filter(i => i.type === "dir");
            for (const f of folders) {
                const subRes = await fetch(f.url);
                const subData = await subRes.json();
                const songs = filterSongs(subData);
                if (songs.length > 0) playlists[f.name] = songs;
            }

            renderNav();
            switchPlaylist(Object.keys(playlists)[0]);
        }

        function filterSongs(items) {
            return items.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                t: f.name.replace(/\.[^/.]+$/, ""),
                u: f.download_url,
                type: f.size > 10000000 ? 'HI-RES' : 'STD'
            }));
        }

        function renderNav() {
            navEl.innerHTML = Object.keys(playlists).map(name => `
                <button onclick="switchPlaylist('${name}')" class="playlist-tab ${name === currentPlaylistName ? 'active' : ''}">
                    ${name.toUpperCase()}
                </button>
            `).join('');
        }

        function switchPlaylist(name) {
            currentPlaylistName = name;
            filtered = [...playlists[name]];
            document.getElementById('current-folder-name').innerText = `LIBRARY / ${name.toUpperCase()}`;
            renderNav();
            renderList();
            executeLoad(0, false);
        }

        function renderList() {
            const listEl = document.getElementById('list');
            listEl.innerHTML = filtered.map((s, i) => `
                <li class="list-item ${curIdx === i ? 'active' : ''}" onclick="executeLoad(${i}, true)">
                    <div class="flex flex-col">
                        <span class="text-xs font-semibold">${s.t}</span>
                        <span class="text-[8px] opacity-50 uppercase">${s.type}</span>
                    </div>
                    ${curIdx === i && isPlaying ? '●' : `<span class="opacity-20 text-[10px]">${i+1}</span>`}
                </li>
            `).join('');
        }

        function executeLoad(idx, auto) {
            curIdx = idx;
            const song = filtered[curIdx];
            audio.src = song.u;
            document.getElementById('title').innerText = song.t;
            document.getElementById('track-type').innerText = song.type;
            
            // 封面处理
            coverEmoji.style.display = 'block';
            cover.style.backgroundImage = 'none';
            new jsmediatags.Reader(song.u).read({
                onSuccess: function(tag) {
                    const pic = tag.tags.picture;
                    if (pic) {
                        let base64 = "";
                        for (let i = 0; i < pic.data.length; i++) base64 += String.fromCharCode(pic.data[i]);
                        cover.style.backgroundImage = `url(data:${pic.format};base64,${window.btoa(base64)})`;
                        coverEmoji.style.display = 'none';
                    }
                }
            });

            renderList();
            if (auto) audio.play();
        }

        // 播放控制
        function playToggle() {
            if (audio.paused) audio.play(); else audio.pause();
        }

        audio.onplay = () => {
            isPlaying = true;
            document.body.classList.replace('is-paused', 'is-playing');
            document.getElementById('play-svg').innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            renderList();
        };

        audio.onpause = () => {
            isPlaying = false;
            document.body.classList.replace('is-playing', 'is-paused');
            document.getElementById('play-svg').innerHTML = `<path d="M8 5.14v14l11-7-11-7z"/>`;
            renderList();
        };

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('prog-bar').style.width = p + '%';
            document.getElementById('cur-time').innerText = fmtTime(audio.currentTime);
            document.getElementById('dur-time').innerText = fmtTime(audio.duration);
        };

        function fmtTime(s) {
            if (isNaN(s)) return "00:00";
            let m = Math.floor(s/60), sec = Math.floor(s%60);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function step(d) {
            let n = (curIdx + d + filtered.length) % filtered.length;
            executeLoad(n, true);
        }

        function checkPwd() {
            if (document.getElementById('pwd-input').value === '12345678') {
                document.getElementById('login-screen').style.transform = 'translateY(-100%)';
                document.getElementById('main-app').classList.add('active');
                init();
            } else {
                document.getElementById('pwd-error').innerText = 'ACCESS DENIED';
            }
        }

        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            filtered = playlists[currentPlaylistName].filter(s => s.t.toLowerCase().includes(val));
            renderList();
        }

        function dl() { window.open(filtered[curIdx].u); }
        function addMusic() { window.location.href = `mailto:zhangzhanhang855@gmail.com`; }
        document.getElementById('seek-bar').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };
    </script>
</body>
</html>
