<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOID DJ MK-VI | TACTILE & COVERS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00f2ff; --panel: #121212; }
        
        body { 
            background: #050505; color: #fff; font-family: 'Inter', sans-serif; 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
            overflow-x: hidden; user-select: none; margin: 0;
        }

        /* --- 核心响应式架构 --- */
        .dj-system {
            width: 98vw; max-width: 1500px; height: 850px; 
            background: #1a1a1a; border: 6px solid #222; border-radius: 12px;
            display: grid; grid-template-columns: 1.5fr 260px 1fr; 
            gap: 10px; padding: 10px; box-shadow: 0 100px 200px rgba(0,0,0,1);
            position: relative; box-sizing: border-box;
        }

        /* 手机竖屏适配 */
        @media (max-width: 1024px) and (orientation: portrait), (max-width: 640px) {
            body { overflow-y: auto; align-items: flex-start; padding: 10px 0; }
            .dj-system { grid-template-columns: 1fr; height: auto; width: 95vw; padding-bottom: 40px; }
            .mixer-section { order: 2; height: 500px; } 
            .crate-section { order: 3; height: 600px; } 
            .deck-section { order: 1; height: 750px; } 
            .vinyl-wrap { width: 300px !important; height: 300px !important; }
            .art-center { width: 110px !important; height: 110px !important; }
        }

        /* --- 模块基础样式 --- */
        .module { background: #0d0d0d; border: 1px solid #222; border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* 交互式旋钮 */
        .knob-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; cursor: ns-resize; touch-action: none; }
        .knob-physical { 
            width: 48px; height: 48px; border-radius: 50%; 
            background: radial-gradient(circle at 30% 30%, #444, #111); 
            border: 3px solid #000; position: relative;
            transform: rotate(0deg); transition: transform 0.05s linear;
        }
        .knob-physical::after { 
            content: ''; position: absolute; top: 6px; left: 50%; 
            width: 3px; height: 10px; background: var(--neon); 
            transform: translateX(-50%); border-radius: 2px;
        }

        /* 交互式推子 */
        .fader-track { width: 14px; height: 200px; background: #000; border-radius: 7px; position: relative; border: 1px solid #222; cursor: ns-resize; touch-action: none; }
        .fader-handle { 
            width: 44px; height: 60px; 
            background: linear-gradient(180deg, #444 0%, #222 100%); 
            border-radius: 4px; position: absolute; left: -15px; 
            bottom: 50%; border: 1px solid #000; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: bottom 0.05s linear;
        }

        /* 打击垫 */
        .pad { 
            height: 50px; background: #1a1a1a; border-radius: 4px; 
            border-bottom: 4px solid #000; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 900; color: #444; transition: all 0.05s;
        }
        .pad.lit { background: var(--neon); color: #000; border-bottom: 0; transform: translateY(3px); box-shadow: 0 0 30px var(--neon); }

        /* 黑胶慢轮 */
        .vinyl-wrap { width: 380px; height: 380px; border-radius: 50%; background: #050505; display: flex; align-items: center; justify-content: center; cursor: grab; position: relative; touch-action: none; }
        .vinyl-disk { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, #222 0%, #0a0a0a 60%, #000 100%); border: 10px solid #080808; position: relative; pointer-events: none; }
        .vinyl-disk::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: repeating-radial-gradient(circle, transparent 0, transparent 2px, rgba(255,255,255,0.02) 3px); }
        
        /* 慢轮中心孔与盖板：强制圆剪裁 */
        .art-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 140px; border-radius: 50%; border: 6px solid #000; background: #111; z-index: 10; overflow: hidden; pointer-events: none; }
        #cover-art { width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 0.4s ease; }
        #cover-art.loaded { opacity: 1; }

        /* 动画 */
        .is-playing .vinyl-disk { animation: rotate-v 6s linear infinite; }
        .is-playing .art-center { animation: rotate-a 6s linear infinite; }
        @keyframes rotate-v { to { transform: rotate(360deg); } }
        @keyframes rotate-a { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .lcd-main { background: #050a05; border-radius: 4px; padding: 15px; font-family: 'Share Tech Mono', monospace; box-shadow: inset 0 0 50px #000; border: 2px solid #000; }
        .boot-overlay { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="is-paused">

    <div id="boot-overlay" class="boot-overlay">
        <div class="text-[10px] tracking-[1.2em] text-cyan-900 mb-10 font-black">VOID HYBRID SYSTEM MK-VI</div>
        <button onclick="bootSystem()" class="px-10 py-4 border border-cyan-500 text-cyan-500 font-black hover:bg-cyan-500/10 transition">INITIALIZE SYSTEM</button>
    </div>

    <main id="main-app" class="dj-system opacity-0 transition-opacity duration-1000">
        
        <!-- DECK SECTION -->
        <section class="module deck-section p-6 lg:p-10">
            <div class="lcd-main">
                <div class="flex justify-between text-[9px] opacity-30 mb-2 uppercase"><span>Studio Engine v2</span><span>Deck A</span></div>
                <div id="title" class="text-2xl lg:text-3xl font-bold tracking-tighter text-cyan-400 truncate">READY</div>
                <div class="flex justify-between mt-6">
                    <div class="text-4xl font-black italic" id="cur-time">00:00:00</div>
                    <div class="text-right text-[10px] text-cyan-800">BPM: 128.00</div>
                </div>
            </div>

            <div class="flex-1 flex items-center justify-center my-6">
                <div class="vinyl-wrap" id="jog-wrap">
                    <div class="vinyl-disk" id="vinyl-visual"></div>
                    <div class="art-center">
                        <!-- 音乐封面渲染节点 -->
                        <div id="cover-art"></div>
                        <!-- 备用 Emoji 节点 -->
                        <span id="cover-emoji" class="absolute inset-0 flex items-center justify-center text-5xl">💿</span>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center">
                <button onclick="playToggle()" class="w-20 h-20 bg-black border border-white/10 rounded-full flex items-center justify-center shadow-xl">
                    <div id="play-icon" class="w-0 h-0 border-y-[12px] border-y-transparent border-l-[20px] border-l-white ml-1"></div>
                </button>
                <div class="flex flex-col items-end gap-2">
                    <div class="fader-track h-24 w-8">
                        <div class="fader-handle w-10 h-6 left-[-6px] bottom-[50%]"></div>
                    </div>
                    <span class="text-[8px] opacity-20 font-black uppercase">Pitch</span>
                </div>
            </div>
        </section>

        <!-- MIXER SECTION -->
        <section class="module mixer-section p-6 flex flex-col items-center justify-center">
            <div class="knob-container" data-type="knob">
                <div class="knob-physical"></div>
                <span class="text-[8px] font-bold opacity-30 mt-1 uppercase">Gain</span>
            </div>
            <div class="knob-container" data-type="knob">
                <div class="knob-physical" style="transform: rotate(45deg);"></div>
                <span class="text-[8px] font-bold opacity-30 mt-1 uppercase">High</span>
            </div>
            <div class="knob-container" data-type="knob">
                <div class="knob-physical" style="transform: rotate(-20deg);"></div>
                <span class="text-[8px] font-bold opacity-30 mt-1 uppercase">Low</span>
            </div>

            <div class="fader-track mt-4" data-type="fader">
                <div class="fader-handle"></div>
            </div>
            <span class="text-[8px] font-black opacity-20 mt-2 uppercase">Master Fader</span>
        </section>

        <!-- CRATE SECTION -->
        <aside class="module crate-section flex flex-col">
            <div class="grid grid-cols-4 gap-2 p-4">
                <div class="pad" onclick="flashPad(this)">CUE 1</div>
                <div class="pad" onclick="flashPad(this)">CUE 2</div>
                <div class="pad" onclick="flashPad(this)">LOOP</div>
                <div class="pad" onclick="flashPad(this)">FX</div>
            </div>

            <div class="p-4 bg-black/40 border-y border-white/5">
                <div id="playlist-nav" class="flex gap-2 overflow-x-auto no-scrollbar mb-4 pb-1"></div>
                <input type="text" id="q" oninput="doSearch()" placeholder="FIND TRACK..." class="w-full bg-black border border-white/10 p-3 text-[10px] outline-none focus:border-cyan-500/50">
            </div>

            <div class="flex-1 overflow-y-auto"><ul id="list"></ul></div>
            <div class="p-4"><p id="ai-text" class="text-[8px] text-cyan-600/50 font-mono italic uppercase">Broadcast Active</p></div>
        </aside>

    </main>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const G = { user: 'zhangzhanhang855', repo: 'musiconly' };
        let playlists = {}; 
        let currentPlaylist = "Root";
        let filteredTracks = [], curIdx = 0;
        const audio = document.getElementById('player');
        
        // 用于跟踪和释放 Blob URL，防止内存泄漏
        let currentObjectURL = null;

        // --- 触屏与交互逻辑核心 ---
        function handleInteraction(elements, type, callback) {
            elements.forEach(el => {
                let isMoving = false;
                let startPos = 0;

                const start = (e) => {
                    isMoving = true;
                    startPos = e.clientY || e.touches[0].clientY;
                    e.preventDefault();
                };

                const move = (e) => {
                    if (!isMoving) return;
                    let currentPos = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                    let delta = startPos - currentPos;
                    callback(el, delta, currentPos);
                    if (type === 'fader') startPos = currentPos; 
                };

                const end = () => isMoving = false;

                el.addEventListener('mousedown', start);
                el.addEventListener('touchstart', start, {passive: false});
                window.addEventListener('mousemove', move);
                window.addEventListener('touchmove', move, {passive: false});
                window.addEventListener('mouseup', end);
                window.addEventListener('touchend', end);
            });
        }

        handleInteraction(document.querySelectorAll('.knob-container'), 'knob', (el, delta) => {
            const knob = el.querySelector('.knob-physical');
            let currentRotation = parseInt(knob.style.transform.replace('rotate(', '').replace('deg)', '')) || 0;
            let newRot = Math.max(-150, Math.min(150, currentRotation + delta));
            knob.style.transform = `rotate(${newRot}deg)`;
        });

        handleInteraction(document.querySelectorAll('.fader-track'), 'fader', (el, delta, currentY) => {
            const handle = el.querySelector('.fader-handle');
            const rect = el.getBoundingClientRect();
            let percent = 1 - ((currentY - rect.top) / rect.height);
            percent = Math.max(0, Math.min(1, percent));
            handle.style.bottom = (percent * 100) + '%';
        });

        function flashPad(el) {
            el.classList.add('lit');
            setTimeout(() => el.classList.remove('lit'), 100);
        }

        // --- 播放引擎逻辑 ---
        function bootSystem() {
            document.getElementById('boot-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-overlay').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
                loadLibrary();
            }, 800);
        }

        async function loadLibrary() {
            try {
                const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const items = await res.json();
                playlists["Root"] = filterAudio(items);
                const folders = items.filter(i => i.type === "dir");
                for (let f of folders) {
                    const subData = await (await fetch(f.url)).json();
                    playlists[f.name] = filterAudio(subData);
                }
                renderNav();
                switchPlaylist("Root");
            } catch (e) { document.getElementById('title').innerText = "IO ERROR"; }
        }

        function filterAudio(items) {
            return items.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                t: f.name.replace(/\.[^/.]+$/, ""), u: f.download_url
            }));
        }

        function renderNav() {
            document.getElementById('playlist-nav').innerHTML = Object.keys(playlists).map(name => `
                <button onclick="switchPlaylist('${name}')" class="text-[9px] px-3 py-1 border border-white/10 hover:bg-white/5 uppercase whitespace-nowrap">${name}</button>
            `).join('');
        }

        function switchPlaylist(name) {
            currentPlaylist = name;
            filteredTracks = [...playlists[name]];
            renderList();
            if(filteredTracks.length > 0) executeLoad(0, false);
        }

        function renderList() {
            document.getElementById('list').innerHTML = filteredTracks.map((s, i) => `
                <li class="track-item p-3 border-b border-white/5 text-[11px] font-mono cursor-pointer ${curIdx === i ? 'text-cyan-400 bg-cyan-900/10' : 'text-gray-600'}" onclick="executeLoad(${i}, true)">
                    ${String(i+1).padStart(2,'0')} . ${s.t}
                </li>
            `).join('');
        }

        // --- 核心修改：无损封面解析与直引机制 ---
        function executeLoad(idx, auto) {
            curIdx = idx;
            const song = filteredTracks[curIdx];
            audio.src = song.u;
            document.getElementById('title').innerText = song.t;
            
            const art = document.getElementById('cover-art');
            const emj = document.getElementById('cover-emoji');
            
            // 重置上一首歌曲的视觉状态
            art.classList.remove('loaded');
            art.style.backgroundImage = 'none';
            emj.style.opacity = '1';

            // 释放上一次创建的内存对象，防止长期挂载导致浏览器爆内存
            if (currentObjectURL) {
                URL.revokeObjectURL(currentObjectURL);
                currentObjectURL = null;
            }

            // 利用 jsmediatags 异步读取远程音频流文件的元数据元块 (Range Requests)
            new jsmediatags.Reader(song.u).read({
                onSuccess: (tag) => {
                    const pic = tag.tags.picture;
                    if (pic) {
                        // 将二进制字节流高速转换为 Uint8Array
                        const byteArray = new Uint8Array(pic.data);
                        // 封装生成高密 Blob 对象
                        const blob = new Blob([byteArray], { type: pic.format });
                        // 映射本地高速内存 URL
                        currentObjectURL = URL.createObjectURL(blob);
                        
                        // 注入样式并执行淡入效果
                        art.style.backgroundImage = `url(${currentObjectURL})`;
                        art.classList.add('loaded');
                        emj.style.opacity = '0'; // 隐退备用 Emoji
                    }
                },
                onError: (error) => {
                    console.log("此音轨无自带内嵌封面，保留默认机械CD图标:", error.type);
                }
            });

            renderList();
            if (auto) audio.play();
        }

        function playToggle() { audio.paused ? audio.play() : audio.pause(); }
        audio.onplay = () => { document.body.classList.replace('is-paused', 'is-playing'); document.getElementById('play-icon').style.borderLeftColor = "#00f2ff"; };
        audio.onpause = () => { document.body.classList.replace('is-playing', 'is-paused'); document.getElementById('play-icon').style.borderLeftColor = "#fff"; };
        audio.ontimeupdate = () => { document.getElementById('cur-time').innerText = fmt(audio.currentTime); };

        function fmt(s) {
            if (isNaN(s)) return "00:00:00";
            let m = Math.floor(s/60), sec = Math.floor(s%60), ms = Math.floor((s%1)*100);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}:${ms.toString().padStart(2,'0')}`;
        }
        function step(d) { executeLoad((curIdx + d + filteredTracks.length) % filteredTracks.length, true); }
        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            filteredTracks = playlists[currentPlaylist].filter(s => s.t.toLowerCase().includes(val));
            renderList();
        }
    </script>
</body>
</html>
