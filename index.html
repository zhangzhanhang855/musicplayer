<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-Res Pro Player</title>
    <style>
        :root { --accent: #00d2ff; --bg: #050505; --panel: rgba(255,255,255,0.08); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; filter: blur(100px) brightness(0.3); z-index: -1; transition: background 2s; }
        .container { display: flex; flex-direction: column; align-items: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        
        .glass-card {
            background: var(--panel); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 40px;
            width: 100%; max-width: 420px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .visualizer { width: 120px; height: 120px; margin: 0 auto 25px; position: relative; display: flex; align-items: center; justify-content: center; }
        .disk { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, #222, #444, #222); border: 5px solid rgba(255,255,255,0.1); animation: spin 10s linear infinite; animation-play-state: paused; }
        @keyframes spin { to { transform: rotate(360deg); } }

        h2 { margin: 10px 0; font-size: 1.2rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #speed-tag { font-size: 0.65rem; background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        #status { font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-bottom: 20px; letter-spacing: 1px; }

        .progress-box { width: 100%; position: relative; margin-bottom: 25px; }
        .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
        #buf-bar { position: absolute; height: 100%; background: rgba(255,255,255,0.2); width: 0%; transition: width 0.4s; border-radius: 2px; }
        #prog-bar { position: absolute; height: 100%; background: var(--accent); width: 0%; border-radius: 2px; box-shadow: 0 0 15px var(--accent); }

        .btns { display: flex; justify-content: space-around; align-items: center; margin-top: 10px; }
        .btns button { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.5rem; transition: 0.2s; padding: 10px; }
        .btns .main-play { font-size: 4rem; color: #fff; }
        
        .list-wrap { flex: 1; width: 100%; max-width: 420px; margin-top: 30px; overflow: hidden; display: flex; flex-direction: column; }
        .search { background: rgba(255,255,255,0.05); border: none; padding: 15px; border-radius: 20px; color: #fff; margin-bottom: 15px; outline: none; border: 1px solid transparent; transition: 0.3s; }
        .search:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        #list { list-style: none; padding: 0; overflow-y: auto; flex: 1; border-radius: 20px; }
        #list li { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        #list li.active { background: rgba(0,210,255,0.1); border-left: 4px solid var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<div id="bg-canvas"></div>

<div class="container">
    <div class="glass-card">
        <div class="visualizer">
            <div class="disk" id="disk"></div>
        </div>
        <div id="speed-tag">LFS HIGH-SPEED</div>
        <h2 id="title">INITIATING...</h2>
        <div id="status">WAKING UP GITHUB NODES</div>
        
        <div class="progress-box">
            <div class="bar-bg" id="seek-bar">
                <div id="buf-bar"></div>
                <div id="prog-bar"></div>
            </div>
        </div>

        <div class="btns">
            <button onclick="setMode()" id="mode-btn">🔁</button>
            <button onclick="step(-1)">⏮</button>
            <button onclick="playToggle()" class="main-play" id="play-btn">▶️</button>
            <button onclick="step(1)">⏭</button>
            <button onclick="dl()">📥</button>
        </div>
    </div>

    <div class="list-wrap">
        <input type="text" class="search" id="q" placeholder="SEARCH MUSIC..." oninput="doSearch()">
        <ul id="list"></ul>
    </div>
</div>

<audio id="player" crossorigin="anonymous" preload="auto"></audio>

<script>
    const G = { user: 'zhangzhanhang855', repo: 'musicplayer', ver: 'main' };
    let all = [], filtered = [], cur = 0, isP = false, loop = 'list';
    
    const audio = document.getElementById('player');
    const status = document.getElementById('status');
    const prog = document.getElementById('prog-bar');
    const buf = document.getElementById('buf-bar');
    const disk = document.getElementById('disk');

    // 自动构建 CDN 链接
    const getLink = (n) => `https://cdn.jsdelivr.net/gh/${G.user}/${G.repo}@${G.ver}/${encodeURIComponent(n)}`;

    async function start() {
        try {
            const r = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
            const d = await r.json();
            all = d.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                t: f.name.replace(/\.[^/.]+$/, ""),
                f: f.name,
                u: getLink(f.name)
            }));
            filtered = [...all];
            drawList();
            if(all.length > 0) loadTrack(0, false);
            status.innerText = "NODES READY. ENJOY LOSSLESS.";
        } catch (e) { status.innerText = "CONNECTION ERROR"; }
    }

    function drawList() {
        document.getElementById('list').innerHTML = filtered.map((s, i) => `
            <li class="${cur === i ? 'active' : ''}" onclick="selectTrack(${i})">
                <span>${s.t}</span>
                <span style="opacity:0.3;font-size:0.6rem;">${s.f.split('.').pop().toUpperCase()}</span>
            </li>`).join('');
    }

    function loadTrack(idx, auto = true) {
        cur = idx;
        const s = filtered[cur];
        
        // 核心加速优化：双重预解析
        audio.pause();
        audio.src = s.u;
        audio.load(); // 触发抢占式下载

        document.getElementById('title').innerText = s.t;
        status.innerText = "STREAMING FROM EDGE NODES...";
        
        const h = Math.floor(Math.random() * 360);
        document.getElementById('bg-canvas').style.background = `radial-gradient(circle at center, hsl(${h}, 50%, 20%), #000)`;
        
        drawList();

        if (auto || isP) {
            const p = audio.play();
            if (p) p.then(() => { isP = true; ui(); }).catch(() => { isP = false; ui(); });
        }
    }

    // 缓冲监控：计算秒级加载量
    audio.onprogress = () => {
        if (audio.buffered.length > 0) {
            const bEnd = audio.buffered.end(audio.buffered.length - 1);
            const d = audio.duration;
            if (d > 0) {
                const pct = (bEnd / d) * 100;
                buf.style.width = pct + "%";
                if(pct < 100 && isP) status.innerText = `BUFFERING HI-RES: ${Math.round(pct)}%`;
            }
        }
    };

    audio.oncanplaythrough = () => { if(isP) status.innerText = "HI-RES BITSTREAM ACTIVE"; };
    audio.onstalled = () => { status.innerText = "RECONNECTING TO LFS..."; };

    function playToggle() {
        if (audio.paused) { audio.play(); isP = true; } 
        else { audio.pause(); isP = false; }
        ui();
    }

    function ui() {
        document.getElementById('play-btn').innerText = isP ? '⏸' : '▶️';
        disk.style.animationPlayState = isP ? 'running' : 'paused';
    }

    function step(d) {
        let n = (cur + d + filtered.length) % filtered.length;
        if (loop === 'random') n = Math.floor(Math.random() * filtered.length);
        loadTrack(n);
    }

    function selectTrack(i) { loadTrack(i); isP = true; ui(); }

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100 || 0;
        prog.style.width = p + '%';
    };

    document.getElementById('seek-bar').onclick = (e) => {
        const r = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    };

    audio.onended = () => { if (loop === 'single') audio.play(); else step(1); };

    function setMode() {
        const m = { list: '🔁', random: '🔀', single: '🔂' };
        loop = loop === 'list' ? 'random' : (loop === 'random' ? 'single' : 'list');
        document.getElementById('mode-btn').innerText = m[loop];
    }

    function doSearch() {
        const val = document.getElementById('q').value.toLowerCase();
        filtered = all.filter(s => s.f.toLowerCase().includes(val));
        drawList();
    }

    function dl() { window.open(filtered[cur].u); }

    start();
</script>
</body>
</html>
