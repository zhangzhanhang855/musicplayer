<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极速版 GitHub LFS 播放器</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.12); --text: #ffffff; --accent: #00d2ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; background: #050505; }
        
        #bg-blur {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #121212, #1a1a2e);
            filter: blur(60px) brightness(0.4); transform: scale(1.1);
            transition: background 1s ease; z-index: -1;
        }

        .container { display: flex; flex-direction: column; align-items: center; height: 100vh; color: var(--text); padding: 20px; box-sizing: border-box; }
        
        .player-card {
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 28px;
            width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .cover-art {
            width: 150px; height: 150px; border-radius: 50%; margin: 0 auto 20px;
            background: rgba(255,255,255,0.05); border: 3px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; font-size: 50px;
            animation: rotate 15s linear infinite; animation-play-state: paused;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h2 { margin: 10px 0 5px; font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-msg { font-size: 0.8rem; color: var(--accent); margin-bottom: 15px; min-height: 1.2rem; }
        
        .controls-row { display: flex; justify-content: center; gap: 15px; margin: 10px 0; align-items: center; }
        button { background: none; border: none; color: white; cursor: pointer; font-size: 1.4rem; transition: 0.2s; }
        .play-btn { font-size: 3.5rem; }

        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; cursor: pointer; }
        #progress { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; box-shadow: 0 0 10px var(--accent); }

        .list-section { margin-top: 20px; width: 100%; max-width: 400px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: none; background: rgba(255,255,255,0.08); color: white; margin-bottom: 10px; box-sizing: border-box; }
        #playlist { list-style: none; padding: 0; overflow-y: auto; flex: 1; background: rgba(0,0,0,0.2); border-radius: 12px; }
        #playlist li { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; display: flex; justify-content: space-between; font-size: 0.9rem; }
        #playlist li.active { color: var(--accent); background: rgba(0,210,255,0.1); }
    </style>
</head>
<body>

<div id="bg-blur"></div>

<div class="container">
    <div class="player-card">
        <div class="cover-art" id="main-cover">💿</div>
        <h2 id="track-title">正在加载...</h2>
        <div id="status-text" class="status-msg">初始化 API 连接</div>
        
        <div class="progress-container" id="progress-bar">
            <div id="progress"></div>
        </div>

        <div class="controls-row">
            <button onclick="toggleMode()" id="mode-btn">🔁</button>
            <button onclick="prevTrack()">⏮</button>
            <button onclick="togglePlay()" class="play-btn" id="play-btn">▶️</button>
            <button onclick="nextTrack()">⏭</button>
            <button onclick="downloadCurrent()">📥</button>
        </div>
    </div>

    <div class="list-section">
        <input type="text" class="search-bar" id="search" placeholder="🔍 搜索库中音频..." oninput="filterSongs()">
        <ul id="playlist"></ul>
    </div>
</div>

<audio id="audio" crossorigin="anonymous" preload="auto"></audio>

<script>
    const CONFIG = {
        user: 'zhangzhanhang855',
        repo: 'musicplayer',
        branch: 'main' // 默认分支
    };

    let songs = [];
    let filteredSongs = [];
    let currentIndex = 0;
    let isPlaying = false;
    let playMode = 'list'; 

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const playlist = document.getElementById('playlist');
    const trackTitle = document.getElementById('track-title');
    const statusText = document.getElementById('status-text');
    const bgBlur = document.getElementById('bg-blur');
    const cover = document.getElementById('main-cover');

    // 关键：CDN 加速转换函数
    function getCDNUrl(fileName) {
        // 使用 jsDelivr 绕过 GitHub API 的 LFS 重定向延迟
        return `https://cdn.jsdelivr.net/gh/${CONFIG.user}/${CONFIG.repo}@${CONFIG.branch}/${encodeURIComponent(fileName)}`;
    }

    async function fetchSongs() {
        const apiUrl = `https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/`;
        try {
            const res = await fetch(apiUrl);
            const data = await res.json();
            
            const allowed = ['.mp3', '.flac', '.wav', '.m4a'];
            songs = data
                .filter(file => allowed.some(ext => file.name.toLowerCase().endsWith(ext)))
                .map(file => ({
                    name: file.name.replace(/\.[^/.]+$/, ""),
                    fileName: file.name,
                    // 优先生成加速链接，备用 API 链接
                    url: getCDNUrl(file.name)
                }));

            filteredSongs = [...songs];
            renderPlaylist();
            if(songs.length > 0) {
                loadTrack(0);
                statusText.innerText = "CDN 加速已就绪";
            }
        } catch (err) {
            statusText.innerText = "同步失败，请检查网络";
        }
    }

    function renderPlaylist() {
        playlist.innerHTML = filteredSongs.map((song, i) => `
            <li class="${currentIndex === i ? 'active' : ''}" onclick="selectTrack(${i})">
                <span>${song.name}</span>
                <span style="opacity:0.4; font-size:0.7rem;">${song.fileName.split('.').pop().toUpperCase()}</span>
            </li>
        `).join('');
    }

    function loadTrack(index) {
        currentIndex = index;
        const song = filteredSongs[currentIndex];
        
        statusText.innerText = "正在握手 LFS 数据节点...";
        audio.pause();
        audio.src = song.url; 
        audio.load(); // 强制触发浏览器预读

        trackTitle.innerText = song.name;
        
        const hue = Math.floor(Math.random() * 360);
        bgBlur.style.background = `linear-gradient(135deg, hsl(${hue}, 40%, 20%), #000)`;
        
        document.querySelectorAll('#playlist li').forEach((li, i) => {
            li.classList.toggle('active', i === currentIndex);
        });

        if (isPlaying) audio.play().catch(() => {});
    }

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playBtn.innerText = '▶️';
            cover.style.animationPlayState = 'paused';
        } else {
            audio.play().then(() => {
                playBtn.innerText = '⏸';
                cover.style.animationPlayState = 'running';
            }).catch(() => { statusText.innerText = "缓冲大文件中..."; });
        }
        isPlaying = !isPlaying;
    }

    function nextTrack() {
        let next = (playMode === 'random') ? Math.floor(Math.random() * filteredSongs.length) : (currentIndex + 1) % filteredSongs.length;
        loadTrack(next);
    }

    function prevTrack() {
        let prev = (currentIndex - 1 + filteredSongs.length) % filteredSongs.length;
        loadTrack(prev);
    }

    function toggleMode() {
        const modes = { list: '🔁', random: '🔀', single: '🔂' };
        playMode = (playMode === 'list') ? 'random' : (playMode === 'random' ? 'single' : 'list');
        document.getElementById('mode-btn').innerText = modes[playMode];
    }

    function filterSongs() {
        const term = document.getElementById('search').value.toLowerCase();
        filteredSongs = songs.filter(s => s.name.toLowerCase().includes(term));
        renderPlaylist();
    }

    function selectTrack(i) {
        loadTrack(i);
        if (!isPlaying) togglePlay(); else audio.play();
    }

    function downloadCurrent() { window.open(filteredSongs[currentIndex].url); }

    // 缓冲状态监控
    audio.onprogress = () => {
        if (audio.buffered.length > 0) {
            const bufferedEnd = audio.buffered.end(audio.buffered.length - 1);
            const duration = audio.duration;
            if (duration > 0) {
                statusText.innerText = `已缓冲: ${Math.round((bufferedEnd / duration) * 100)}%`;
            }
        }
    };

    audio.onplaying = () => { statusText.innerText = "正在播放 Hi-Res 资源"; };

    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100 || 0;
        document.getElementById('progress').style.width = pct + '%';
    };

    document.getElementById('progress-bar').onclick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    };

    audio.onended = () => { if (playMode === 'single') audio.play(); else nextTrack(); };

    fetchSongs();
</script>
</body>
</html>
