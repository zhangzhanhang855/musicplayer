<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hi-Res 智能双轨版 Pro</title>
    
    <link rel="dns-prefetch" href="https://api.github.com">
    <link rel="preconnect" href="https://api.github.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <style>
        :root { --accent: #ff0055; --bg: #000000; --panel: rgba(20,20,20,0.8); }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; height: 100dvh; 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: #fff; 
            overflow: hidden; 
        }
        
        #bg-canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            filter: blur(80px) brightness(0.4); z-index: -1; 
            transition: background 1s ease-out; 
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100%; height: 100dvh; 
            padding: 20px; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
            box-sizing: border-box; 
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column; 
            width: 100%;
            max-width: 420px;
            flex: 1;
            overflow: hidden;
            align-items: center;
        }
        
        .glass-card {
            background: var(--panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05); padding: 30px 20px; border-radius: 30px;
            width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            flex-shrink: 0; margin-bottom: 20px;
        }

        h2 { margin: 5px 0; font-size: 1.3rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #speed-tag { font-size: 0.65rem; background: var(--accent); color: #fff; padding: 3px 8px; border-radius: 6px; font-weight: 900; margin-bottom: 12px; display: inline-block; }
        #status { font-size: 0.75rem; color: #888; margin-bottom: 25px; min-height: 1rem; }

        .progress-box { width: 100%; height: 30px; display: flex; align-items: center; margin-bottom: 10px; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
        #buf-bar { position: absolute; height: 100%; background: rgba(255,255,255,0.25); width: 0%; transition: width 0.2s linear; }
        #prog-bar { position: absolute; height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }

        .btns { display: flex; justify-content: space-evenly; align-items: center; width: 100%; }
        .btns button { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.4rem; width: 45px; display: flex; justify-content: center; align-items: center; padding: 0; }
        .btns .main-play { font-size: 3.5rem; width: 70px; }
        
        .list-wrap { width: 100%; flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .search { background: rgba(255,255,255,0.08); border: none; padding: 16px; border-radius: 16px; color: #fff; margin-bottom: 12px; outline: none; font-size: 1rem; flex-shrink: 0; }
        
        #list { 
            list-style: none; padding: 0 0 20px 0; overflow-y: auto; flex: 1; margin: 0; 
            -webkit-overflow-scrolling: touch; 
        }
        #list li { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        #list li.active { color: var(--accent); font-weight: bold; background: linear-gradient(90deg, rgba(255,0,85,0.1) 0%, transparent 100%); border-left: 3px solid var(--accent); }

        .footer-info {
            width: 100%; max-width: 420px; display: flex; justify-content: space-between; 
            align-items: flex-end; margin-top: 10px; flex-shrink: 0;
            font-size: 0.65rem; color: rgba(255,255,255,0.3); line-height: 1.5;
        }

        @media (min-width: 900px) and (orientation: landscape) {
            .container { padding: 40px; }
            .layout-wrapper {
                flex-direction: row; 
                max-width: 1000px;
                gap: 40px;
                align-items: stretch;
            }
            .glass-card {
                width: 400px; 
                margin-bottom: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .list-wrap { flex: 1; }
            .footer-info {
                max-width: 1000px;
                justify-content: flex-end; 
            }
            .footer-info .left {
                margin-right: 30px;
                text-align: right;
            }
        }
    </style>
</head>
<body>

<div id="bg-canvas"></div>

<div class="container">
    <div class="layout-wrapper">
        <div class="glass-card">
            <div id="speed-tag">SMART ROUTING</div>
            <h2 id="title">WAITING...</h2>
            <div id="status">INITIALIZING...</div>
            
            <div class="progress-box">
                <div class="bar-bg" id="seek-bar">
                    <div id="buf-bar"></div>
                    <div id="prog-bar"></div>
                </div>
            </div>

            <div class="btns">
                <button onclick="setMode()" id="mode-btn">🔁</button>
                <button onclick="step(-1)">⏮</button>
                <button onclick="playToggle()" class="main-play" id="play-btn">▶️</button>
                <button onclick="step(1)">⏭</button>
                <button onclick="dl()">📥</button>
            </div>
        </div>

        <div class="list-wrap">
            <input type="text" class="search" id="q" placeholder="SEARCH MUSIC..." oninput="doSearch()">
            <ul id="list"></ul>
        </div>
    </div>

    <div class="footer-info">
        <div class="left">💡 如果是LFS DIRECT<br>则为最高音质歌曲（超清母带）</div>
        <div class="right">本网站由zzh个人制作<br>感谢你的支持！❤️</div>
    </div>
</div>

<audio id="player" preload="auto"></audio>

<script>
    const G = { user: 'zhangzhanhang855', repo: 'musicplayer', ver: 'main', token: '' };

    let all = [], filtered = [], cur = 0, isP = false, loop = 'list';
    const audio = document.getElementById('player');
    const status = document.getElementById('status');
    const prog = document.getElementById('prog-bar');
    const buf = document.getElementById('buf-bar');
    const playBtn = document.getElementById('play-btn');
    const speedTag = document.getElementById('speed-tag');

    const getOptimalUrl = (fileObj) => {
        if (fileObj.size < 1024) {
            return { url: `https://media.githubusercontent.com/media/${G.user}/${G.repo}/${G.ver}/${encodeURIComponent(fileObj.name)}`, type: 'LFS DIRECT' };
        } else {
            return { url: `https://cdn.jsdelivr.net/gh/${G.user}/${G.repo}@${G.ver}/${encodeURIComponent(fileObj.name)}`, type: 'CDN EDGE' };
        }
    };

    // 🌟 核心一：更新 Apple/Android 原生媒体控制中心信息
    function updateMediaSession(songTitle, fileType) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: songTitle,               // 锁屏显示：当前真实的歌名
                artist: 'Hi-Res Audio (' + fileType + ')', // 锁屏显示：副标题（音频格式）
                album: 'ZZH 云音乐库'            // 锁屏显示：专辑名
            });
        }
    }

    // 🌟 核心二：绑定 Apple/Android 原生按键事件（比如耳机的双击切歌、锁屏控制）
    if ('mediaSession' in navigator) {
        navigator.mediaSession.setActionHandler('play', () => { audio.play(); isP = true; ui(); });
        navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); isP = false; ui(); });
        navigator.mediaSession.setActionHandler('previoustrack', () => step(-1));
        navigator.mediaSession.setActionHandler('nexttrack', () => step(1));
        // 允许在锁屏界面拖动进度条
        navigator.mediaSession.setActionHandler('seekto', (details) => {
            if (details.fastSeek && ('fastSeek' in audio)) {
                audio.fastSeek(details.seekTime);
            } else {
                audio.currentTime = details.seekTime;
            }
        });
    }

    async function start() {
        try {
            const fetchOptions = G.token ? { headers: { 'Authorization': `token ${G.token}` } } : {};
            const r = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`, fetchOptions);
            
            if (r.status === 403) throw new Error("HTTP 403: API频率超限");
            if (!r.ok) throw new Error(`HTTP ${r.status}: 无法读取仓库`);

            const d = await r.json();
            all = d.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => {
                const route = getOptimalUrl(f);
                return { t: f.name.replace(/\.[^/.]+$/, ""), f: f.name, u: route.url, routeType: route.type };
            });
            
            filtered = [...all];
            drawList();
            if(all.length > 0) loadTrack(0, false);
            status.innerText = "READY. SMART ROUTING ENABLED.";
        } catch (e) { 
            status.innerText = "详细报错 👉 " + e.message; 
            document.getElementById('title').innerText = "加载失败";
        }
    }

    function drawList() {
        let html = '';
        for(let i=0; i<filtered.length; i++) {
            let s = filtered[i];
            html += `<li class="${cur === i ? 'active' : ''}" onclick="selectTrack(${i})">
                <span>${s.t}</span>
                <span style="opacity:0.4;font-size:0.7rem;">${s.f.split('.').pop().toUpperCase()}</span>
            </li>`;
        }
        document.getElementById('list').innerHTML = html;
    }

    function loadTrack(idx, auto = true) {
        cur = idx;
        const s = filtered[cur];
        audio.pause();
        audio.src = s.u; 
        audio.load(); 
        document.getElementById('title').innerText = s.t;
        speedTag.innerText = s.routeType;
        speedTag.style.background = s.routeType === 'CDN EDGE' ? '#00d2ff' : '#ff0055';
        status.innerText = `CONNECTING VIA ${s.routeType}...`;
        document.getElementById('bg-canvas').style.background = `hsl(${Math.random() * 360}, 50%, 15%)`;
        
        // 🌟 触发原生锁屏信息的更新
        updateMediaSession(s.t, s.f.split('.').pop().toUpperCase());

        drawList();
        if (auto || isP) {
            const p = audio.play();
            if (p) p.then(() => { isP = true; ui(); }).catch(() => { isP = false; ui(); });
        }
    }

    audio.addEventListener('progress', () => {
        if (audio.buffered.length > 0) {
            const pct = (audio.buffered.end(audio.buffered.length - 1) / audio.duration) * 100 || 0;
            buf.style.width = pct + "%";
        }
    });

    audio.addEventListener('playing', () => { status.innerText = "STREAMING ACTIVE"; isP = true; ui(); });
    audio.addEventListener('waiting', () => { status.innerText = "BUFFERING..."; });
    audio.addEventListener('timeupdate', () => { prog.style.width = ((audio.currentTime / audio.duration) * 100 || 0) + '%'; });

    function playToggle() {
        if (audio.paused) { audio.play(); isP = true; } 
        else { audio.pause(); isP = false; }
        ui();
    }

    function ui() { playBtn.innerText = isP ? '⏸' : '▶️'; }

    function step(d) {
        let n = (cur + d + filtered.length) % filtered.length;
        if (loop === 'random') n = Math.floor(Math.random() * filtered.length);
        loadTrack(n);
    }

    function selectTrack(i) { loadTrack(i); isP = true; ui(); }

    document.getElementById('seek-bar').onclick = (e) => {
        audio.currentTime = ((e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth) * audio.duration;
    };

    audio.onended = () => { if (loop === 'single') audio.play(); else step(1); };

    function setMode() {
        const m = { list: '🔁', random: '🔀', single: '🔂' };
        loop = loop === 'list' ? 'random' : (loop === 'random' ? 'single' : 'list');
        document.getElementById('mode-btn').innerText = m[loop];
    }

    function doSearch() {
        const val = document.getElementById('q').value.toLowerCase();
        filtered = all.filter(s => s.f.toLowerCase().includes(val));
        drawList();
    }

    function dl() { 
        const link = document.createElement('a');
        link.href = filtered[cur].u;
        link.download = filtered[cur].f; 
        link.target = '_blank';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    start();
</script>
</body>
</html>
