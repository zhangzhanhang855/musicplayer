<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 高保真音乐播放器</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --accent: #00d2ff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; background: #0a0a0a;
        }

        /* 动态模糊背景 */
        #bg-blur {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #1a1c2c, #4a192c);
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.4);
            transform: scale(1.1); transition: background 1.5s ease-in-out;
            z-index: -1;
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; color: var(--text); padding: 20px; box-sizing: border-box;
        }

        .player-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; border-radius: 24px; width: 100%; max-width: 420px;
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .cover-art {
            width: 160px; height: 160px; border-radius: 50%;
            margin: 0 auto 20px; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; font-size: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            animation: rotate 12s linear infinite; animation-play-state: paused;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h2 { margin: 10px 0 5px; font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; height: 1.5rem; }
        .status-msg { font-size: 0.8rem; color: var(--accent); margin-bottom: 15px; opacity: 0.8; }
        
        .controls-row { display: flex; justify-content: center; gap: 20px; margin: 10px 0; align-items: center; }
        button { background: none; border: none; color: white; cursor: pointer; font-size: 1.3rem; transition: 0.2s; opacity: 0.8; }
        button:hover { color: var(--accent); opacity: 1; transform: scale(1.1); }
        .play-btn { font-size: 3rem; }

        .list-section {
            margin-top: 25px; width: 100%; max-width: 420px; flex: 1; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .search-bar {
            width: 100%; padding: 12px 15px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.08); color: white; margin-bottom: 12px; box-sizing: border-box; outline: none;
        }
        #playlist {
            list-style: none; padding: 0; overflow-y: auto; flex: 1;
            background: rgba(0,0,0,0.25); border-radius: 12px;
        }
        #playlist li {
            padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem;
        }
        #playlist li:hover { background: rgba(255,255,255,0.08); }
        #playlist li.active { color: var(--accent); background: rgba(0,210,255,0.1); font-weight: bold; }

        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; cursor: pointer; position: relative; }
        #progress { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

<div id="bg-blur"></div>

<div class="container">
    <div class="player-card">
        <div class="cover-art" id="main-cover">🎵</div>
        <h2 id="track-title">准备同步仓库...</h2>
        <div id="status-text" class="status-msg">正在检测 API 状态</div>
        
        <div class="progress-container" id="progress-bar">
            <div id="progress"></div>
        </div>

        <div class="controls-row">
            <button onclick="toggleMode()" id="mode-btn">🔁</button>
            <button onclick="prevTrack()">⏮</button>
            <button onclick="togglePlay()" class="play-btn" id="play-btn">▶️</button>
            <button onclick="nextTrack()">⏭</button>
            <button onclick="downloadCurrent()">📥</button>
        </div>
    </div>

    <div class="list-section">
        <input type="text" class="search-bar" id="search" placeholder="🔍 搜索歌曲..." oninput="filterSongs()">
        <ul id="playlist"></ul>
    </div>
</div>

<audio id="audio" crossorigin="anonymous" preload="metadata"></audio>

<script>
    const CONFIG = {
        user: 'zhangzhanhang855',
        repo: 'musicplayer',
        path: '' 
    };

    let songs = [];
    let filteredSongs = [];
    let currentIndex = 0;
    let isPlaying = false;
    let playMode = 'list'; 

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const playlist = document.getElementById('playlist');
    const trackTitle = document.getElementById('track-title');
    const statusText = document.getElementById('status-text');
    const bgBlur = document.getElementById('bg-blur');
    const cover = document.getElementById('main-cover');

    // 1. 获取 GitHub API 数据
    async function fetchSongs() {
        const url = `https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.path}`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('仓库读取失败或超过访问限制');
            const data = await res.json();
            
            const allowedExtensions = ['.mp3', '.flac', '.wav', '.ogg', '.m4a'];
            songs = data
                .filter(file => allowedExtensions.some(ext => file.name.toLowerCase().endsWith(ext)))
                .map(file => ({
                    name: file.name.replace(/\.[^/.]+$/, ""),
                    url: file.download_url
                }));

            filteredSongs = [...songs];
            renderPlaylist();
            if(songs.length > 0) {
                loadTrack(0);
                statusText.innerText = `已同步 ${songs.length} 首高品质音乐`;
            } else {
                trackTitle.innerText = "仓库里空空的";
            }
        } catch (err) {
            trackTitle.innerText = "同步失败";
            statusText.innerText = err.message;
        }
    }

    // 2. 渲染列表
    function renderPlaylist() {
        playlist.innerHTML = filteredSongs.map((song, i) => `
            <li class="${currentIndex === i ? 'active' : ''}" onclick="selectTrack(${i})">
                <span>${song.name}</span>
                <span style="font-size:0.7rem; opacity:0.5;">${song.url.includes('.flac') ? 'FLAC' : 'MP3'}</span>
            </li>
        `).join('');
    }

    // 3. 加载音轨 (针对大文件优化)
    function loadTrack(index) {
        currentIndex = index;
        const song = filteredSongs[currentIndex];
        
        // 强制停止当前播放并清理缓存
        audio.pause();
        audio.removeAttribute('src'); 
        audio.load(); 

        // 注入新链接
        audio.src = song.url;
        trackTitle.innerText = song.name;
        statusText.innerText = "正在缓冲大文件 (FLAC/MP3)...";
        
        // 随机背景
        const hue = Math.floor(Math.random() * 360);
        bgBlur.style.background = `linear-gradient(135deg, hsl(${hue}, 45%, 20%), #050505)`;
        
        document.querySelectorAll('#playlist li').forEach((li, i) => {
            li.classList.toggle('active', i === currentIndex);
        });

        if (isPlaying) {
            audio.play().catch(e => console.log("等待缓冲或用户交互"));
        }
    }

    // 4. 播放控制
    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playBtn.innerText = '▶️';
            cover.style.animationPlayState = 'paused';
        } else {
            audio.play().then(() => {
                playBtn.innerText = '⏸';
                cover.style.animationPlayState = 'running';
            }).catch(err => {
                statusText.innerText = "缓冲中，请稍候...";
            });
        }
        isPlaying = !isPlaying;
    }

    function nextTrack() {
        let next = (playMode === 'random') ? Math.floor(Math.random() * filteredSongs.length) : (currentIndex + 1) % filteredSongs.length;
        loadTrack(next);
    }

    function prevTrack() {
        let prev = (currentIndex - 1 + filteredSongs.length) % filteredSongs.length;
        loadTrack(prev);
    }

    function toggleMode() {
        const modes = { list: '🔁', random: '🔀', single: '🔂' };
        playMode = (playMode === 'list') ? 'random' : (playMode === 'random' ? 'single' : 'list');
        document.getElementById('mode-btn').innerText = modes[playMode];
    }

    function filterSongs() {
        const term = document.getElementById('search').value.toLowerCase();
        filteredSongs = songs.filter(s => s.name.toLowerCase().includes(term));
        renderPlaylist();
    }

    function selectTrack(i) {
        loadTrack(i);
        if (!isPlaying) togglePlay(); else audio.play();
    }

    function downloadCurrent() {
        window.open(filteredSongs[currentIndex].url);
    }

    // 5. 进度条更新
    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100 || 0;
        document.getElementById('progress').style.width = pct + '%';
        if (audio.readyState >= 3) {
            statusText.innerText = "正在播放 - Hi-Res Audio";
        }
    };

    document.getElementById('progress-bar').onclick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pos * audio.duration;
    };

    audio.onended = () => {
        if (playMode === 'single') audio.play(); else nextTrack();
    };

    // 初始启动
    fetchSongs();
</script>
</body>
</html>
