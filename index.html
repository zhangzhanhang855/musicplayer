<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Elite Music Space | musiconly</title>
    
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --font-serif: "Noto Serif TC", serif;
            --font-sans: "Inter", system-ui, sans-serif;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html {
            margin: 0; padding: 0;
            min-height: 100vh; width: 100%;
            font-family: var(--font-sans);
            background: #f4f4f7;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; -webkit-tap-highlight-color: transparent;
        }

        .mesh-bg {
            position: fixed; inset: 0; z-index: -1;
            filter: blur(80px); opacity: 0.5;
            transition: all 2s var(--ease-out-expo);
        }
        .blob {
            position: absolute; width: 600px; height: 600px;
            border-radius: 50%; animation: drift 20s infinite alternate linear;
        }
        @keyframes drift {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(360deg); }
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #prog-bar { transition: width 0.2s ease-out; }

        .list-item {
            position: relative; z-index: 10;
            transition: all 0.3s var(--ease-out-expo);
        }
        .list-item.active {
            background: rgba(0,0,0,0.06);
            border-left: 4px solid black;
        }

        .playlist-tab {
            transition: all 0.3s var(--ease-out-expo);
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            padding: 8px 12px;
            flex-shrink: 0;
            opacity: 0.4;
        }
        .playlist-tab.active {
            color: black;
            border-bottom-color: black;
            opacity: 1;
        }

        #cover {
            background-size: cover; background-position: center;
            transition: all 0.8s var(--ease-out-expo);
            transform: scale(1);
        }
        .is-paused #cover { transform: scale(0.92); filter: brightness(0.8); }

        .loading-ring {
            display: none; width: 40px; height: 40px;
            border: 2px solid rgba(0,0,0,0.05); border-top-color: #000;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        .is-loading .loading-ring { display: block; }
        .is-loading #cover-emoji { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 1024px) {
            .main-layout { flex-direction: column; height: 100vh; width: 100vw; border-radius: 0; }
            .player-section { height: 55% !important; }
            .side-section { height: 45% !important; border-left: none; border-top: 1px solid rgba(0,0,0,0.05); }
        }

        .playing-icon { display: flex; gap: 2px; align-items: flex-end; height: 12px; }
        .playing-icon div {
            width: 2.5px; background: black; border-radius: 1px;
            animation: bounce 0.8s infinite ease-in-out alternate;
        }
        @keyframes bounce { 0% { height: 4px; } 100% { height: 12px; } }
    </style>
</head>
<body class="is-paused">

    <div class="mesh-bg" id="bg-mesh">
        <div class="blob bg-purple-200 top-[-10%] left-[-10%]"></div>
        <div class="blob bg-blue-100 bottom-[-10%] right-[-10%]"></div>
    </div>

    <!-- 驗證屏 -->
    <div id="login-screen" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-50/80 backdrop-blur-md transition-all duration-700">
        <div class="login-card glass-panel w-full max-w-[400px] p-12 rounded-[40px] text-center">
            <h1 class="font-serif text-3xl mb-4 tracking-[0.4rem]">藏心</h1>
            <p class="text-[10px] tracking-[0.3em] text-gray-400 mb-10 uppercase">Identity Verification</p>
            <input type="password" id="pwd-input" class="w-full bg-white/50 border-none rounded-2xl py-4 px-6 text-center mb-6 outline-none font-mono" placeholder="••••••••" onkeydown="if(event.key==='Enter') checkPwd()">
            <button onclick="checkPwd()" class="w-full bg-black text-white py-4 rounded-2xl font-semibold tracking-widest hover:scale-[1.02] active:scale-95 transition-all">ENTER SPACE</button>
            <p id="pwd-error" class="mt-4 text-red-400 text-[10px] tracking-widest uppercase"></p>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="main-app" class="hidden opacity-0 w-full max-w-7xl px-4 py-8 transition-all duration-1000 flex items-center justify-center">
        <div class="main-layout glass-panel w-full h-[820px] max-h-[95vh] rounded-[56px] overflow-hidden flex shadow-2xl relative">
            
            <!-- 左：播放器區域 -->
            <div class="player-section flex-1 h-full flex flex-col p-8 lg:p-12 relative overflow-hidden">
                <div class="flex justify-between items-start mb-6">
                    <div class="flex flex-col">
                        <span class="text-[9px] tracking-[0.5em] font-bold text-black/20 uppercase mb-1">Playlist Active</span>
                        <div id="current-folder-name" class="text-[10px] text-indigo-500 font-bold tracking-widest uppercase">Root</div>
                    </div>
                    <div id="track-type" class="text-[9px] bg-black/5 px-3 py-1 rounded-full text-black/40 font-mono">HI-RES</div>
                </div>

                <div class="flex-1 flex flex-col items-center justify-center text-center">
                    <div id="cover" class="w-56 h-56 lg:w-72 lg:h-72 rounded-[48px] mb-10 shadow-2xl flex items-center justify-center text-5xl group relative overflow-hidden bg-white/40">
                        <div class="loading-ring"></div>
                        <span id="cover-emoji" class="z-0">💿</span>
                    </div>
                    
                    <div class="mb-10">
                        <h2 id="title" class="text-2xl lg:text-3xl font-semibold mb-2 tracking-tight font-serif">載入庫中...</h2>
                        <p id="artist-name" class="text-[9px] tracking-[0.4em] text-black/30 uppercase">Premium Selection</p>
                    </div>

                    <div class="w-full max-w-sm mb-10">
                        <div class="relative h-[3px] w-full bg-black/[0.06] rounded-full mb-4 cursor-pointer" id="seek-bar">
                            <div id="prog-bar" class="absolute h-full bg-black rounded-full w-0"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-mono text-black/30">
                            <span id="cur-time">00:00</span>
                            <span id="dur-time">00:00</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-10 lg:gap-14">
                        <button onclick="setLoop()" id="mode-btn" class="text-[9px] font-bold text-black/30 uppercase w-10">List</button>
                        <button onclick="step(-1)" class="text-black/30 hover:text-black">
                            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button onclick="playToggle()" id="play-btn" class="w-16 h-16 bg-black text-white rounded-full flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all">
                            <svg id="play-svg" class="w-8 h-8 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5.14v14l11-7-11-7z"/></svg>
                        </button>
                        <button onclick="step(1)" class="text-black/30 hover:text-black">
                            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M16 18h2V6h-2M7 6v12l8.5-6z"/></svg>
                        </button>
                        <button onclick="dl()" class="text-black/30 hover:text-black w-10">
                            <svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        </button>
                    </div>
                </div>

                <div class="mt-4 pt-6 border-t border-black/[0.04]">
                    <div id="ai-text" class="text-[11px] leading-relaxed text-black/50 font-serif italic max-w-xl h-6 overflow-hidden">
                        正在感應旋律中的微光...
                    </div>
                </div>
            </div>

            <!-- 右：播放清單與目錄 -->
            <div class="side-section w-full lg:w-[420px] bg-black/[0.01] border-l border-black/[0.03] flex flex-col relative z-20">
                <div class="px-8 pt-8 pb-4">
                    <span class="text-[9px] tracking-[0.3em] font-bold text-black/20 uppercase block mb-4">Select Library</span>
                    <div id="playlist-nav" class="flex gap-4 overflow-x-auto no-scrollbar pb-2 text-[10px] font-bold uppercase tracking-widest text-black/30">
                        <!-- 資料夾標籤 -->
                    </div>
                </div>
                
                <div class="px-8 pb-4">
                    <input type="text" id="q" oninput="doSearch()" placeholder="Search current list" class="w-full bg-transparent border-b border-black/[0.05] py-2 text-sm focus:outline-none focus:border-black/20 placeholder:text-black/20 font-light">
                </div>

                <ul id="list" class="flex-1 overflow-y-auto no-scrollbar relative z-30"></ul>
                
                <div class="p-8">
                    <button onclick="addMusic()" class="w-full py-4 border border-black/10 rounded-2xl text-[9px] font-bold tracking-[0.3em] hover:bg-black hover:text-white transition-all uppercase">
                        Request Track
                    </button>
                </div>
            </div>
        </div>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        // 核心配置
        const G = { user: 'zhangzhanhang855', repo: 'musiconly', ver: 'main' };
        const apiKey = ""; 

        let playlists = {}; 
        let currentPlaylistName = "";
        let filtered = [], curIdx = 0, isPlaying = false, loopMode = 'list';
        let currentCoverObjectURL = null;

        const audio = document.getElementById('player');
        const aiBox = document.getElementById('ai-text');
        const cover = document.getElementById('cover');
        const coverEmoji = document.getElementById('cover-emoji');
        const navEl = document.getElementById('playlist-nav');

        // --- GitHub API 讀取 ---
        async function fetchRepoContents(path = "") {
            const url = `https://api.github.com/repos/${G.user}/${G.repo}/contents/${path}`;
            try {
                const res = await fetch(url);
                if (res.status === 403) {
                    showError("API 頻率受限，請一小時後再試");
                    return null;
                }
                if (!res.ok) {
                    showError(`倉庫讀取失敗 (${res.status})`);
                    return null;
                }
                return await res.json();
            } catch (e) {
                showError("網路連接失敗");
                return null;
            }
        }

        function showError(msg) {
            document.getElementById('title').innerText = "ERROR";
            document.getElementById('artist-name').innerText = msg;
            console.error(msg);
        }

        async function init() {
            // 1. 讀取根目錄
            const rootItems = await fetchRepoContents();
            if (!rootItems) return;

            // 2. 獲取根目錄音樂
            const rootSongs = filterSongs(rootItems);
            if (rootSongs.length > 0) playlists["Root"] = rootSongs;

            // 3. 識別目錄
            const folders = rootItems.filter(item => item.type === "dir");
            
            // 先渲染導航（即使只有 Root）
            renderPlaylistNav();
            if (playlists["Root"]) switchPlaylist("Root");

            // 4. 異步加載子目錄
            for (const folder of folders) {
                fetchRepoContents(folder.path).then(data => {
                    if (data) {
                        const songs = filterSongs(data);
                        if (songs.length > 0) {
                            playlists[folder.name] = songs;
                            renderPlaylistNav();
                            // 如果當前沒歌，自動切換到第一個加載出的目錄
                            if (!currentPlaylistName) switchPlaylist(folder.name);
                        }
                    }
                });
            }
        }

        function filterSongs(items) {
            return items.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => {
                const isLFS = f.size < 2000;
                return {
                    t: f.name.replace(/\.[^/.]+$/, ""),
                    u: `https://raw.githubusercontent.com/${G.user}/${G.repo}/${G.ver}/${f.path}`,
                    type: isLFS ? 'HI-RES' : 'STD'
                };
            });
        }

        function renderPlaylistNav() {
            const names = Object.keys(playlists);
            navEl.innerHTML = names.map(name => `
                <button onclick="switchPlaylist('${name}')" class="playlist-tab ${name === currentPlaylistName ? 'active' : ''}">
                    ${name}
                </button>
            `).join('');
        }

        function switchPlaylist(name) {
            if (!playlists[name]) return;
            currentPlaylistName = name;
            filtered = [...playlists[name]];
            curIdx = 0;
            
            document.getElementById('current-folder-name').innerText = name;
            renderPlaylistNav();
            renderList();
            executeLoad(0, false);
        }

        // --- 播放核心 ---
        function executeLoad(idx, auto) {
            if (idx < 0 || idx >= filtered.length) return;
            curIdx = idx;
            const song = filtered[curIdx];
            
            audio.src = song.u;
            document.getElementById('title').innerText = song.t;
            document.getElementById('track-type').innerText = song.type;
            
            renderList();
            extractCover(song.u, song);

            clearTimeout(window.aiTimer);
            window.aiTimer = setTimeout(() => analyzeInsight(song.t), 1500);

            if (auto) {
                audio.play().catch(() => syncAppState(false));
            }
        }

        function extractCover(songUrl, songData) {
            if (currentCoverObjectURL && currentCoverObjectURL.startsWith('blob:')) {
                URL.revokeObjectURL(currentCoverObjectURL);
            }
            cover.parentElement.classList.add('is-loading');
            cover.style.backgroundImage = 'none';

            new jsmediatags.Reader(songUrl).read({
                onSuccess: function(tag) {
                    const pic = tag.tags.picture;
                    if (pic) {
                        let base64String = "";
                        for (let i = 0; i < pic.data.length; i++) base64String += String.fromCharCode(pic.data[i]);
                        const base64 = `data:${pic.format};base64,${window.btoa(base64String)}`;
                        cover.style.backgroundImage = `url(${base64})`;
                        coverEmoji.style.opacity = '0';
                        currentCoverObjectURL = base64;
                    } else {
                        resetCoverUI();
                    }
                    cover.parentElement.classList.remove('is-loading');
                },
                onError: () => { 
                    resetCoverUI(); 
                    cover.parentElement.classList.remove('is-loading'); 
                }
            });
        }

        function resetCoverUI() {
            cover.style.backgroundImage = 'none';
            coverEmoji.style.opacity = '1';
            const h = Math.floor(Math.random() * 360);
            cover.style.backgroundColor = `hsl(${h}, 20%, 95%)`;
        }

        function renderList() {
            const listEl = document.getElementById('list');
            listEl.innerHTML = filtered.map((s, i) => {
                const isCurrent = curIdx === i;
                return `
                <li class="list-item ${isCurrent ? 'active' : ''} px-8 py-5 cursor-pointer flex justify-between items-center" 
                    onclick="executeLoad(${i}, true)">
                    <div class="flex flex-col gap-1">
                        <span class="text-[12px] font-medium tracking-tight ${isCurrent ? 'text-black' : 'text-black/60'}">${s.t}</span>
                        <span class="text-[8px] font-mono text-black/20 uppercase">${s.type}</span>
                    </div>
                    ${isCurrent && isPlaying ? `<div class="playing-icon"><div></div><div></div><div></div></div>` : `<span class="text-[9px] text-black/10">${i+1}</span>`}
                </li>`;
            }).join('');
        }

        // --- 控制 ---
        function syncAppState(playing) {
            isPlaying = playing;
            document.body.classList.toggle('is-paused', !playing);
            document.getElementById('play-svg').innerHTML = playing 
                ? `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>` : `<path d="M8 5.14v14l11-7-11-7z"/>`;
            renderList();
        }

        audio.onplay = () => syncAppState(true);
        audio.onpause = () => syncAppState(false);
        audio.ontimeupdate = () => {
            if (audio.duration) {
                const p = (audio.currentTime / audio.duration * 100);
                document.getElementById('prog-bar').style.width = p + '%';
                document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
                document.getElementById('dur-time').innerText = formatTime(audio.duration);
            }
        };
        audio.onended = () => step(1);

        function formatTime(sec) {
            if (isNaN(sec)) return "00:00";
            let m = Math.floor(sec/60), s = Math.floor(sec%60);
            return `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        }

        function playToggle() { audio.paused ? audio.play() : audio.pause(); }
        function step(d) { executeLoad((curIdx + d + filtered.length) % filtered.length, true); }
        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            filtered = playlists[currentPlaylistName].filter(s => s.t.toLowerCase().includes(val));
            renderList();
        }

        async function analyzeInsight(name) {
            if (!apiKey) return;
            aiBox.innerText = "...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `用一句15字以內中文描述《${name}》的音樂意境。` }] }] })
                });
                const data = await res.json();
                aiBox.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) { aiBox.innerText = "旋律在指尖流淌。"; }
        }

        function checkPwd() {
            if (document.getElementById('pwd-input').value === '12345678') {
                document.cookie = "isLoggedIn=true;max-age=604800;path=/";
                enterApp();
            } else {
                document.getElementById('pwd-error').innerText = 'IDENTIFICATION FAILED';
            }
        }

        function enterApp() {
            const screen = document.getElementById('login-screen');
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                setTimeout(() => document.getElementById('main-app').style.opacity = '1', 50);
                init();
            }, 700);
        }

        function setLoop() {
            const modes = ['list', 'random', 'single'];
            loopMode = modes[(modes.indexOf(loopMode) + 1) % 3];
            document.getElementById('mode-btn').innerText = loopMode.toUpperCase();
        }
        
        function dl() { window.open(filtered[curIdx].u); }
        function addMusic() { window.location.href = `mailto:zhangzhanhang855@gmail.com`; }
        
        document.getElementById('seek-bar').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            if (audio.duration) audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        window.onload = () => {
            if (document.cookie.includes("isLoggedIn=true")) {
                enterApp();
            }
        };
    </script>
</body>
</html>
