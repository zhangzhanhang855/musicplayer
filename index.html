<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 云音乐播放器</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --accent: #00d2ff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; background: #000;
        }

        /* 动态背景 */
        #bg-blur {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #243b55, #141e30);
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.6);
            transform: scale(1.1); transition: background-image 1s ease;
            z-index: -1;
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; color: var(--text); padding: 20px; box-sizing: border-box;
        }

        /* 播放器核心 */
        .player-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; border-radius: 20px; width: 100%; max-width: 450px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cover-art {
            width: 200px; height: 200px; border-radius: 15px;
            margin: 0 auto 20px; background: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; font-size: 50px;
        }

        h2 { margin: 10px 0 5px; font-size: 1.4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 控件 */
        .controls-row { display: flex; justify-content: center; gap: 20px; margin: 20px 0; align-items: center; }
        button { 
            background: none; border: none; color: white; cursor: pointer; 
            font-size: 1.2rem; transition: 0.3s; opacity: 0.8;
        }
        button:hover { opacity: 1; transform: scale(1.1); color: var(--accent); }
        .play-btn { font-size: 2.5rem; }

        /* 列表和搜索 */
        .list-section {
            margin-top: 20px; width: 100%; max-width: 450px; flex: 1; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .search-bar {
            width: 100%; padding: 10px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.1); color: white; margin-bottom: 10px; box-sizing: border-box;
        }
        #playlist {
            list-style: none; padding: 0; overflow-y: auto; flex: 1;
            background: rgba(0,0,0,0.2); border-radius: 10px;
        }
        #playlist li {
            padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        #playlist li:hover { background: rgba(255,255,255,0.1); }
        #playlist li.active { color: var(--accent); border-left: 4px solid var(--accent); }
        .download-icon { font-size: 0.9rem; opacity: 0.5; }
        .download-icon:hover { opacity: 1; }

        /* 进度条 */
        .progress-container { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 15px 0; cursor: pointer; }
        #progress { height: 100%; background: var(--accent); width: 0%; border-radius: 5px; }
    </style>
</head>
<body>

<div id="bg-blur"></div>

<div class="container">
    <div class="player-card">
        <div class="cover-art" id="main-cover">🎵</div>
        <h2 id="track-title">等待加载...</h2>
        
        <div class="progress-container" id="progress-bar">
            <div id="progress"></div>
        </div>

        <div class="controls-row">
            <button onclick="toggleMode()" id="mode-btn" title="播放模式">🔁</button>
            <button onclick="prevTrack()">⏮</button>
            <button onclick="togglePlay()" class="play-btn" id="play-btn">▶️</button>
            <button onclick="nextTrack()">⏭</button>
            <button onclick="downloadCurrent()" title="下载当前歌曲">📥</button>
        </div>
    </div>

    <div class="list-section">
        <input type="text" class="search-bar" id="search" placeholder="搜索歌曲名..." oninput="filterSongs()">
        <ul id="playlist">
            </ul>
    </div>
</div>

<audio id="audio"></audio>

<script>
    // ======= 配置区域 =======
    const GITHUB_CONFIG = {
        user: 'YOUR_USERNAME',      // 替换为你的 GitHub 用户名
        repo: 'YOUR_REPO_NAME',    // 替换为你的 仓库名
        path: ''                    // 如果在子文件夹，填写路径，否则留空
    };
    // ========================

    let songs = [];
    let filteredSongs = [];
    let currentIndex = 0;
    let isPlaying = false;
    let playMode = 'list'; // list (列表循环), random (随机), single (单曲)

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const playlist = document.getElementById('playlist');
    const trackTitle = document.getElementById('track-title');
    const bgBlur = document.getElementById('bg-blur');

    // 获取数据
    async function fetchSongs() {
        const url = `https://api.github.com/repos/zhangzhanhang855/musicplayer/contents/`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            songs = data
                .filter(file => file.name.endsWith('.mp3'))
                .map(file => ({
                    name: file.name.replace('.mp3', ''),
                    url: file.download_url
                }));
            filteredSongs = [...songs];
            renderPlaylist();
            if(songs.length > 0) loadTrack(0);
        } catch (err) {
            trackTitle.innerText = "加载失败，请检查配置";
        }
    }

    function renderPlaylist() {
        playlist.innerHTML = filteredSongs.map((song, i) => `
            <li class="${currentIndex === i ? 'active' : ''}" onclick="selectTrack(${i})">
                <span>${song.name}</span>
                <span class="download-icon" onclick="event.stopPropagation(); window.open('${song.url}')">💾</span>
            </li>
        `).join('');
    }

    function loadTrack(index) {
        currentIndex = index;
        const song = filteredSongs[currentIndex];
        audio.src = song.url;
        trackTitle.innerText = song.name;
        
        // 模拟随机背景色 (因为 GitHub 仓库通常没封面图)
        const hue = Math.floor(Math.random() * 360);
        bgBlur.style.backgroundImage = `linear-gradient(135deg, hsl(${hue}, 50%, 30%), #000)`;
        
        document.querySelectorAll('#playlist li').forEach((li, i) => {
            li.classList.toggle('active', i === currentIndex);
        });
    }

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playBtn.innerText = '▶️';
        } else {
            audio.play();
            playBtn.innerText = '⏸';
        }
        isPlaying = !isPlaying;
    }

    function nextTrack() {
        let next;
        if (playMode === 'random') {
            next = Math.floor(Math.random() * filteredSongs.length);
        } else {
            next = (currentIndex + 1) % filteredSongs.length;
        }
        loadTrack(next);
        if (isPlaying) audio.play();
    }

    function prevTrack() {
        let prev = (currentIndex - 1 + filteredSongs.length) % filteredSongs.length;
        loadTrack(prev);
        if (isPlaying) audio.play();
    }

    function toggleMode() {
        const modes = { list: '🔁', random: '🔀', single: '🔂' };
        if (playMode === 'list') playMode = 'random';
        else if (playMode === 'random') playMode = 'single';
        else playMode = 'list';
        document.getElementById('mode-btn').innerText = modes[playMode];
    }

    function filterSongs() {
        const term = document.getElementById('search').value.toLowerCase();
        filteredSongs = songs.filter(s => s.name.toLowerCase().includes(term));
        renderPlaylist();
    }

    function selectTrack(i) {
        loadTrack(i);
        if (!isPlaying) togglePlay();
        else audio.play();
    }

    function downloadCurrent() {
        window.open(filteredSongs[currentIndex].url);
    }

    // 进度条控制
    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progress').style.width = pct + '%';
    };

    document.getElementById('progress-bar').onclick = (e) => {
        const rect = e.target.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pos * audio.duration;
    };

    // 播放结束逻辑
    audio.onended = () => {
        if (playMode === 'single') audio.play();
        else nextTrack();
    };

    fetchSongs();
</script>
</body>
</html>
