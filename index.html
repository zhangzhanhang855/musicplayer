<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID DJ MK-III | STUDIO REFERENCE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #00f2ff;
            --lcd-bg: #050a05;
            --panel-border: #222;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; /* 严禁页面滚动，确保UI稳定 */
        }

        /* --- 主架构：锁定宽度防止位移 --- */
        .dj-system {
            width: 96vw;
            max-width: 1400px;
            height: 850px;
            background: #111;
            border: 8px solid #1a1a1a;
            border-radius: 12px;
            display: flex; /* 使用Flex布局 */
            padding: 15px;
            gap: 15px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }

        /* 左：Deck 区域 (固定比例) */
        .deck-section {
            flex: 1.5; 
            min-width: 0; /* 极其重要：防止子元素撑开flex */
            background: linear-gradient(180deg, #181818 0%, #0d0d0d 100%);
            border-radius: 10px;
            border: 1px solid var(--panel-border);
            padding: 30px;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* 中：Mixer 区域 (固定宽度) */
        .mixer-section {
            width: 240px; 
            flex-shrink: 0; 
            background: #0a0a0a;
            border-radius: 10px;
            border: 1px solid var(--panel-border);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0;
        }

        /* 右：Crate 区域 (固定比例) */
        .crate-section {
            flex: 1;
            min-width: 0;
            background: #0f0f0f;
            border-radius: 10px;
            border: 1px solid var(--panel-border);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- 液晶显示屏 --- */
        .lcd-display {
            background: var(--lcd-bg);
            border: 3px solid #000;
            border-radius: 4px;
            padding: 20px;
            font-family: 'Share Tech Mono', monospace;
            box-shadow: inset 0 0 30px #000;
            margin-bottom: 25px;
        }

        .track-title {
            font-size: 1.8rem;
            color: var(--neon);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 歌名过长自动省略，不撑开界面 */
        }

        /* --- 黑胶慢轮组件：解决不居中问题 --- */
        .jog-wheel-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .vinyl-record {
            width: 380px; height: 380px;
            border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #111 50%, #000 100%);
            border: 10px solid #080808;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            position: relative;
            z-index: 1;
        }

        /* 唱片螺纹 */
        .vinyl-record::after {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent 0, transparent 2px, rgba(255,255,255,0.02) 3px);
            pointer-events: none;
        }

        /* 封面容器：绝对几何中心定位 */
        .artwork-core {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); /* 核心对齐逻辑 */
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 5px solid #000;
            background: #111;
            z-index: 10;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .artwork-core img, .artwork-core div {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* 旋转逻辑 */
        .is-playing .vinyl-record {
            animation: rotate-vinyl 8s linear infinite;
        }
        .is-playing .artwork-core {
            /* 旋转时必须保持 translate 偏移 */
            animation: rotate-artwork 8s linear infinite;
        }

        @keyframes rotate-vinyl { to { transform: rotate(360deg); } }
        @keyframes rotate-artwork { 
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* --- 列表美化 --- */
        .track-list-container {
            flex: 1;
            overflow-y: auto;
        }
        .track-list-container::-webkit-scrollbar { width: 4px; }
        .track-list-container::-webkit-scrollbar-thumb { background: #333; }

        .track-item {
            padding: 15px 20px;
            border-bottom: 1px solid #1a1a1a;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px; color: #666;
            cursor: pointer;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .track-item:hover { background: #151515; color: #fff; }
        .track-item.active { 
            background: rgba(0, 242, 255, 0.05); 
            color: var(--neon); 
            border-left: 4px solid var(--neon); 
        }

        /* VU 电平表 */
        .vu-meter {
            display: flex; gap: 3px; height: 120px; padding: 10px; background: #000; border-radius: 4px;
        }
        .vu-bar { flex: 1; display: flex; flex-direction: column-reverse; gap: 2px; }
        .vu-dot { height: 5px; width: 100%; background: #1a1a1a; transition: background 0.1s; }
        .vu-dot.lit { background: #10b981; box-shadow: 0 0 5px #10b981; }

        /* 启动层 */
        .boot-screen {
            position: fixed; inset: 0; z-index: 100;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: 0.8s ease;
        }
    </style>
</head>
<body class="is-paused">

    <!-- 启动层 -->
    <div id="boot-overlay" class="boot-screen">
        <div class="text-[10px] tracking-[1em] text-cyan-900 mb-8 uppercase">VOID DJ-SYSTEM MK-III</div>
        <button onclick="bootSystem()" class="w-24 h-24 border border-cyan-500/30 rounded-full flex items-center justify-center text-cyan-500 hover:bg-cyan-500/10 transition">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </button>
    </div>

    <!-- 主系统 -->
    <main id="main-app" class="dj-system opacity-0 transition-opacity duration-1000">
        
        <!-- 左侧：DECK A -->
        <section class="deck-section">
            <div class="lcd-display">
                <div class="flex justify-between text-[10px] opacity-40 mb-2">
                    <span>96kHz / 32-BIT FLOAT</span>
                    <span>DECK A</span>
                </div>
                <div id="title" class="track-title">SYSTEM READY...</div>
                <div class="flex justify-between items-end mt-4">
                    <div class="text-[10px] text-cyan-900 font-bold uppercase">Master Output</div>
                    <div class="text-3xl font-bold tracking-tighter" id="cur-time">00:00:00</div>
                </div>
            </div>

            <div class="jog-wheel-container">
                <!-- 黑胶盘本体 -->
                <div class="vinyl-record" id="vinyl"></div>
                <!-- 封面图：严格居中层 -->
                <div class="artwork-core">
                    <div id="cover-art" class="bg-cover bg-center w-full h-full"></div>
                    <span id="cover-emoji" class="text-5xl">💿</span>
                </div>
            </div>

            <div class="flex justify-between items-center mt-8">
                <div class="flex gap-4">
                    <button onclick="playToggle()" class="w-20 h-16 bg-black border border-white/10 rounded flex items-center justify-center hover:bg-white/5 active:scale-95 transition">
                        <div id="play-icon" class="w-0 h-0 border-y-[12px] border-y-transparent border-l-[20px] border-l-white"></div>
                    </button>
                    <button onclick="step(1)" class="px-8 bg-black border border-white/10 rounded text-[10px] font-bold uppercase hover:bg-white/5">Next</button>
                </div>
                <div class="text-right">
                    <div class="text-[9px] opacity-20 mb-1">PITCH BEND</div>
                    <div class="text-xl font-black italic">+0.00%</div>
                </div>
            </div>
        </section>

        <!-- 中侧：MIXER -->
        <section class="mixer-section">
            <div class="text-[9px] opacity-20 font-black tracking-widest mb-6 uppercase">Audio Mixer</div>
            
            <div class="vu-meter" id="vu-meter"></div>

            <div class="mt-10 flex flex-col items-center gap-10">
                <div class="w-10 h-10 rounded-full bg-gradient-to-b from-[#333] to-[#111] border border-black shadow-lg"></div>
                <div class="w-8 h-48 bg-black rounded-sm relative border border-white/5">
                    <div class="absolute w-12 h-8 bg-[#222] border border-black left-1/2 -translate-x-1/2 top-1/4 rounded-sm"></div>
                </div>
                <span class="text-[8px] opacity-30">VOL-CH1</span>
            </div>
        </section>

        <!-- 右侧：CRATE -->
        <aside class="crate-section">
            <div class="p-6 bg-black/40">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-[10px] font-black tracking-widest opacity-30 uppercase">Track Browser</h2>
                </div>
                <input type="text" id="q" oninput="doSearch()" placeholder="FILTER CRATE..." class="w-full bg-black border border-white/10 p-3 text-[10px] outline-none focus:border-cyan-500/50">
            </div>

            <div class="track-list-container">
                <ul id="list"></ul>
            </div>

            <div class="p-6 border-t border-white/5">
                <p id="ai-text" class="text-[9px] text-cyan-600/50 font-mono italic leading-relaxed uppercase">
                    Awaiting Signal...
                </p>
            </div>
        </aside>

    </main>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const G = { user: 'zhangzhanhang855', repo: 'musiconly', ver: 'main' };
        let playlists = []; 
        let filtered = [], curIdx = 0, isPlaying = false;
        const audio = document.getElementById('player');

        // 初始化 VU 表
        (function initVisuals() {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<2; i++) {
                const bar = document.createElement('div');
                bar.className = 'vu-bar';
                for(let j=0; j<18; j++) {
                    const dot = document.createElement('div');
                    dot.className = 'vu-dot';
                    bar.appendChild(dot);
                }
                vu.appendChild(bar);
            }
        })();

        function bootSystem() {
            document.getElementById('boot-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-overlay').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
                loadLibrary();
            }, 800);
        }

        async function loadLibrary() {
            console.log("正在尝试加载曲库...");
            document.getElementById('ai-text').innerText = "CONNECTING TO GITHUB...";

            try {
                const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                if(!res.ok) throw new Error(`API 访问失败: ${res.status}`);
                
                const data = await res.json();
                
                // 仅抓取音乐文件
                playlists = data.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                    t: f.name.replace(/\.[^/.]+$/, ""),
                    u: f.download_url
                }));

                console.log(`成功加载 ${playlists.length} 首歌曲`);
                filtered = [...playlists];
                
                if(playlists.length > 0) {
                    renderList();
                    executeLoad(0, false);
                    document.getElementById('ai-text').innerText = "SYSTEM ONLINE - TRACKS LOADED";
                } else {
                    document.getElementById('ai-text').innerText = "ERROR: NO AUDIO FILES FOUND IN REPO";
                }

            } catch (e) {
                console.error("加载失败:", e);
                document.getElementById('title').innerText = "LINK ERROR";
                document.getElementById('ai-text').innerText = "ERROR: " + e.message;
            }
        }

        function renderList() {
            const listEl = document.getElementById('list');
            listEl.innerHTML = filtered.map((s, i) => `
                <li class="track-item ${curIdx === i ? 'active' : ''}" onclick="executeLoad(${i}, true)">
                    ${String(i+1).padStart(2,'0')} . ${s.t}
                </li>
            `).join('');
        }

        function executeLoad(idx, auto) {
            curIdx = idx;
            const song = filtered[curIdx];
            audio.src = song.u;
            document.getElementById('title').innerText = song.t;
            
            // 封面处理
            const art = document.getElementById('cover-art');
            const emj = document.getElementById('cover-emoji');
            art.style.backgroundImage = 'none';
            emj.style.display = 'block';

            new jsmediatags.Reader(song.u).read({
                onSuccess: (tag) => {
                    const p = tag.tags.picture;
                    if (p) {
                        let b64 = "";
                        for (let i = 0; i < p.data.length; i++) b64 += String.fromCharCode(p.data[i]);
                        art.style.backgroundImage = `url(data:${p.format};base64,${window.btoa(b64)})`;
                        emj.style.display = 'none';
                    }
                }
            });

            renderList();
            if (auto) audio.play();
        }

        function playToggle() {
            audio.paused ? audio.play() : audio.pause();
        }

        audio.onplay = () => {
            document.body.classList.replace('is-paused', 'is-playing');
            document.getElementById('play-icon').style.borderLeftColor = "#00f2ff";
        };

        audio.onpause = () => {
            document.body.classList.replace('is-playing', 'is-paused');
            document.getElementById('play-icon').style.borderLeftColor = "#fff";
        };

        audio.ontimeupdate = () => {
            document.getElementById('cur-time').innerText = fmt(audio.currentTime);
            // 模拟VU跳动
            if(!audio.paused) {
                const dots = document.querySelectorAll('.vu-dot');
                dots.forEach((dot, idx) => {
                    dot.className = (idx % 18 < Math.random() * 14) ? 'vu-dot lit' : 'vu-dot';
                });
            }
        };

        function fmt(s) {
            if (isNaN(s)) return "00:00:00";
            let m = Math.floor(s/60), sec = Math.floor(s%60), ms = Math.floor((s%1)*100);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}:${ms.toString().padStart(2,'0')}`;
        }

        function step(d) {
            executeLoad((curIdx + d + filtered.length) % filtered.length, true);
        }

        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            filtered = playlists.filter(s => s.t.toLowerCase().includes(val));
            renderList();
        }
    </script>
</body>
</html>
