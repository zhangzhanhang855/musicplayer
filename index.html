        .side-content { flex: 0.9; display: flex; flex-direction: column; gap: 20px; overflow: hidden; height: 100%; }

        @media (max-width: 900px) {
            .container { padding: 20px; overflow-y: auto; }
            .main-content { flex-direction: column; overflow: visible; perspective: none; }

</head>
<body>
    
    <div id="login-screen">
        <div class="login-box">
            <h1>PREMIUM</h1>
            <p>INTELLECTUAL SOUNDSCAPE</p>
            <input type="password" id="pwd-input" class="pwd-input" placeholder="••••••" onkeydown="if(event.key==='Enter') checkPwd()">
            <button onclick="checkPwd()" class="login-btn">進入空間</button>
            <div id="pwd-error" style="color:#ff3b30; font-size:0.75rem; margin-top:20px; font-weight: 600;"></div>
        </div>
    </div>
    
    <div class="container" id="main-app">
        <div class="main-content">
            <div class="player-card">
                <div class="cover-art" id="cover"></div>
                <div class="meta">
                    <p id="status">Ready to Stream</p>
                    <h2 id="title">靜候啟程</h2>
                </div>
                <div class="prog-wrap" id="seek-bar"><div class="prog-bg"><div id="prog-bar"></div></div></div>
                <div class="controls">
                    <button onclick="setLoop()" id="mode-btn" style="width:50px">LIST</button>
                    <button onclick="step(-1)">PREV</button>
                    <button onclick="playToggle()" class="play-btn" id="play-btn">▶</button>
                    <button onclick="step(1)">NEXT</button>
                    <button onclick="dl()" style="width:50px">DL</button>
                </div>
                <div class="ai-box">
                    <div class="ai-label">✦ Gemini Pro Intelligence</div>
                    <div id="ai-text">準備進行深度曲目解析，感知旋律中的意象...</div>
                </div>
            </div>
            
            <div class="side-content">
                <div class="search-bar">
                    <input type="text" id="q" placeholder="搜尋您的私藏音樂庫..." oninput="doSearch()">
                    <button class="add-btn" onclick="addMusic()">＋</button>
                </div>
                <div class="list-container"><ul id="list"></ul></div>
            </div>
        </div>
    </div>
    
    <audio id="player"></audio>
    
    <script>
        // =========================================================================
        // 🔑 核心配置區域
        // =========================================================================
        const apiKey = "AIzaSyB_XsYIvO01YrhSRhTCo3ZboEByIxtch5M"; 
        const G = { user: 'zhangzhanhang855', repo: 'musicplayer', ver: 'main' };
        const FADE_TIME = 800;
        // =========================================================================

        let allSongs = [], filtered = [], curIdx = 0, isPlaying = false, loopMode = 'list';
        let fadeInterval = null;
        const audio = document.getElementById('player');
        const aiBox = document.getElementById('ai-text');
        const cover = document.getElementById('cover');

        // 音量淡入淡出
        function fadeVolume(target, duration, callback) {
            if (fadeInterval) clearInterval(fadeInterval);
            const step = 0.05;
            const intervalTime = duration / (1 / step);
            fadeInterval = setInterval(() => {
                if (target > audio.volume) audio.volume = Math.min(audio.volume + step, target);
                else audio.volume = Math.max(audio.volume - step, target);
                if (Math.abs(audio.volume - target) < 0.01) {
                    audio.volume = target;
                    clearInterval(fadeInterval);
                    if (callback) callback();
                }
            }, intervalTime);
        }

        function updateCover() {
            const h = Math.floor(Math.random() * 360);
            cover.style.background = `linear-gradient(145deg, hsl(${h}, 15%, 95%) 0%, hsl(${h}, 10%, 80%) 100%)`;
        }

        // Gemini AI 終極修正邏輯
        async function analyzeInsight(name) {
            // 格式檢測：如果您貼了 OpenAI 的 Key
            if (apiKey.startsWith('sk-')) {
                aiBox.innerHTML = "<span style='color:red'>⚠️ Key 格式錯誤：您使用了 OpenAI Key，請前往 Google AI Studio 獲取 AIza 開頭的 Key。</span>";
                return;
            }

            if (!apiKey || apiKey.includes("填入")) {
                aiBox.innerText = "⚠️ 尚未配置 API Key。";
                return;
            }

            aiBox.innerText = "正在調用 Pro 節點感應旋律...";
            
            // 使用穩定版 v1 端點與 gemini-1.5-flash
            const endpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你是一位極具人文氣息的音樂導讀師。請用一句充滿詩意且富有層次感的話描述歌曲《${name}》的意境，30字以內。直接輸出內容，不要前綴。` }] }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    // 精確顯示錯誤原因
                    throw new Error(data.error?.message || `HTTP ${response.status}`);
                }

                const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "旋律在空間中緩緩流淌。";
                
                // 打字機效果
                aiBox.innerText = "";
                let i = 0;
                const type = () => {
                    if (i < text.length) {
                        aiBox.innerText += text.charAt(i); i++;
                        setTimeout(type, 50);
                    }
                };
                type();
            } catch (e) { 
                console.error("Gemini Error:", e);
                aiBox.innerText = "❌ 解析失敗：" + e.message;
            }
        }

        // --- 核心播放邏輯 ---
        function checkPwd() {
            if (document.getElementById('pwd-input').value === '12345678') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                init();
            } else {
                document.getElementById('pwd-error').innerText = '身分驗證失敗';
            }
        }

        async function init() {
            try {
                const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const data = await res.json();
                allSongs = data.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => {
                    const isLFS = f.size < 1024;
                    const u = isLFS ? `https://media.githubusercontent.com/media/${G.user}/${G.repo}/${G.ver}/${encodeURIComponent(f.name)}` 
                                  : `https://fastly.jsdelivr.net/gh/${G.user}/${G.repo}@${G.ver}/${encodeURIComponent(f.name)}`;
                    return { t: f.name.replace(/\.[^/.]+$/, ""), u, type: isLFS ? 'LFS' : 'CDN' };
                });
                filtered = [...allSongs];
                renderList();
                if(allSongs.length > 0) loadTrack(0, false);
            } catch (e) { document.getElementById('status').innerText = "CONNECT ERROR"; }
        }

        function renderList() {
            document.getElementById('list').innerHTML = filtered.map((s, i) => `
                <li class="${curIdx === i ? 'active' : ''}" onclick="selectTrack(${i})">
                    <div class="li-info"><span class="li-title">${s.t}</span><span class="li-meta">${s.type} STREAM</span></div>
                    <span style="opacity:0.2; font-size:0.75rem; font-weight:700;">${i+1 < 10 ? '0'+(i+1) : i+1}</span>
                </li>`).join('');
        }

        function loadTrack(idx, auto = true) {
            if(!filtered[idx]) return;
            if (isPlaying) fadeVolume(0, 400, () => executeLoad(idx, auto));
            else executeLoad(idx, auto);
        }

        function executeLoad(idx, auto) {
            curIdx = idx;
            const song = filtered[curIdx];
            audio.src = song.u;
            audio.volume = 0;
            document.getElementById('title').innerText = song.t;
            document.getElementById('status').innerText = song.type + " SOURCE";
            updateCover(); renderList();
            clearTimeout(window.aiTimer);
            window.aiTimer = setTimeout(() => analyzeInsight(song.t), 1500);
            if (auto) { audio.play(); isPlaying = true; fadeVolume(1, FADE_TIME); syncUI(); }
        }

        function selectTrack(i) { loadTrack(i); }
        function playToggle() {
            if (audio.paused) { audio.volume = 0; audio.play(); fadeVolume(1, FADE_TIME); isPlaying = true; }
            else { fadeVolume(0, FADE_TIME, () => audio.pause()); isPlaying = false; }
            syncUI();
        }
        function syncUI() { document.getElementById('play-btn').innerText = isPlaying ? '||' : '▶'; }
        function step(d) { loadTrack((curIdx + d + filtered.length) % filtered.length); }
        function doSearch() {
            const key = document.getElementById('q').value.toLowerCase();
            filtered = allSongs.filter(s => s.t.toLowerCase().includes(key));
            renderList();
        }
        function addMusic() { window.location.href = `mailto:zhangzhanhang855@gmail.com?subject=ADD_MUSIC`; }
        function setLoop() {
            const modes = ['list', 'random', 'single'];
            loopMode = modes[(modes.indexOf(loopMode) + 1) % 3];
            document.getElementById('mode-btn').innerText = loopMode.toUpperCase();
        }
        function dl() { window.open(filtered[curIdx].u); }

        audio.ontimeupdate = () => { document.getElementById('prog-bar').style.width = (audio.currentTime / audio.duration * 100) + '%'; };
        audio.onended = () => { if(loopMode === 'single') audio.play(); else step(1); };
        document.getElementById('seek-bar').onclick = (e) => { 
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; 
        };
    </script>
</body>
</html>
