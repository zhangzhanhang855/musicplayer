<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID DJ MK-II | REFERENCE STUDIO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --panel-black: #0a0a0a;
            --metal-grey: #1a1a1a;
            --neon-cyan: #00f2ff;
            --warning-red: #ff3c00;
            --lcd-green: #10b981;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; /* 禁止页面级滚动，防止切歌抖动 */
        }

        /* 工业级拉丝背景 */
        .console-frame {
            width: 96vw;
            max-width: 1400px;
            height: 850px;
            background: #111;
            border: 8px solid #222;
            border-radius: 16px;
            display: grid;
            grid-template-columns: 1fr 280px 400px;
            gap: 15px;
            padding: 15px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 50px rgba(255,255,255,0.02);
            box-sizing: border-box;
        }

        /* --- DECK A: 核心盘面区 --- */
        .deck {
            background: linear-gradient(180deg, #181818 0%, #0d0d0d 100%);
            border-radius: 12px;
            padding: 30px;
            display: flex; flex-direction: column;
            position: relative;
            border: 1px solid #2a2a2a;
            overflow: hidden;
        }

        /* LCD 模拟显示屏 */
        .lcd-panel {
            background: #020502;
            border: 3px solid #000;
            border-radius: 6px;
            padding: 20px;
            font-family: 'Share Tech Mono', monospace;
            box-shadow: inset 0 0 30px #000;
            margin-bottom: 25px;
        }

        .lcd-title {
            font-size: 1.8rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 防止文字过长撑开容器 */
        }

        /* 黑胶慢轮容器：确保绝对居中 */
        .jog-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .jog-wheel {
            width: 380px; height: 380px;
            border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #111 40%, #050505 100%);
            border: 12px solid #000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
            z-index: 1;
        }

        /* 唱盘螺纹纹理 */
        .jog-wheel::after {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent 0, transparent 2px, rgba(255,255,255,0.03) 3px);
            pointer-events: none;
        }

        /* 核心 CD/封面：强制几何中心对齐 */
        .jog-art-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); /* 核心对齐逻辑 */
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 6px solid #000;
            overflow: hidden;
            background: #111;
            z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }

        .jog-art-wrapper img, #cover-art {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* 唱片中间的小孔（专业感） */
        .spindle-hole {
            position: absolute;
            width: 12px; height: 12px;
            background: #222;
            border-radius: 50%;
            z-index: 20;
            border: 2px solid #555;
            box-shadow: inset 0 0 4px #000;
        }

        /* 旋转动画 */
        .is-playing .jog-wheel, .is-playing .jog-art-wrapper {
            animation: rotate-deck 6s linear infinite;
        }
        @keyframes rotate-deck { to { transform: translate(-50%, -50%) rotate(360deg); } }
        /* 注意：wrapper旋转需要保持 translate(-50%, -50%) 否则会跑偏 */
        @keyframes rotate-jog { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .is-playing .jog-wheel { animation: rotate-jog 6s linear infinite; }

        /* --- 按钮美化 --- */
        .pro-btn {
            background: linear-gradient(180deg, #333 0%, #111 100%);
            border: 1px solid #000;
            color: #888;
            border-radius: 4px;
            transition: all 0.1s;
            text-transform: uppercase;
            font-size: 11px; font-weight: 900;
        }
        .pro-btn:active { background: #222; transform: translateY(1px); }
        .pro-btn.active-cyan { color: var(--neon-cyan); border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,242,255,0.3); }

        /* --- 列表与搜索 --- */
        .library-aside {
            background: #0d0d0d;
            border-radius: 8px;
            display: flex; flex-direction: column;
            border: 1px solid #222;
            overflow: hidden;
        }

        .track-item {
            padding: 15px 20px;
            border-bottom: 1px solid #1a1a1a;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px; color: #666;
            cursor: pointer;
        }
        .track-item:hover { background: #151515; color: #fff; }
        .track-item.active { 
            background: rgba(0, 242, 255, 0.05); 
            color: var(--neon-cyan); 
            border-left: 4px solid var(--neon-cyan); 
        }

        /* 电平表 VU Meter */
        .vu-meter {
            display: flex; gap: 3px; height: 120px; padding: 10px; background: #000; border-radius: 4px;
        }
        .vu-bar { flex: 1; display: flex; flex-direction: column-reverse; gap: 2px; }
        .vu-dot { height: 5px; width: 100%; background: #1a1a1a; transition: background 0.1s; }
        .vu-dot.lit { background: var(--lcd-green); box-shadow: 0 0 5px var(--lcd-green); }
        .vu-dot.peak { background: var(--warning-red); box-shadow: 0 0 5px var(--warning-red); }

    </style>
</head>
<body class="is-paused">

    <!-- 系统引导 -->
    <div id="boot-overlay" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="text-[10px] tracking-[1em] text-cyan-900 mb-8">VOID AUDIO CORE v2.0</div>
        <button onclick="bootSystem()" class="w-20 h-20 border border-cyan-500/30 rounded-full flex items-center justify-center text-cyan-500 hover:bg-cyan-500/10 transition">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </button>
    </div>

    <!-- DJ 核心面板 -->
    <main id="main-app" class="console-frame opacity-0 transition-opacity duration-1000">
        
        <!-- 左：DECK A -->
        <section class="deck">
            <div class="lcd-panel">
                <div class="flex justify-between text-[10px] opacity-40 mb-2 tracking-widest">
                    <span>96kHz / 32-BIT FLOAT</span>
                    <span>DECK A</span>
                </div>
                <div id="title" class="lcd-title">NO TRACK LOADED</div>
                <div class="flex justify-between items-end mt-4">
                    <div id="artist-name" class="text-xs text-cyan-800 uppercase">System Ready</div>
                    <div class="flex gap-4 font-bold text-2xl text-white">
                        <span id="cur-time">00:00:00</span>
                    </div>
                </div>
            </div>

            <div class="jog-container">
                <!-- 黑胶盘 -->
                <div class="jog-wheel" id="jog-wheel"></div>
                <!-- 封面：独立包装并居中 -->
                <div class="jog-art-wrapper">
                    <div id="cover-art" class="bg-cover bg-center w-full h-full"></div>
                    <span id="cover-emoji" class="text-4xl">💿</span>
                    <div class="spindle-hole"></div>
                </div>
            </div>

            <div class="flex justify-between mt-8">
                <div class="flex gap-3">
                    <button onclick="playToggle()" class="w-16 h-16 pro-btn flex items-center justify-center" id="play-main">
                        <div id="play-icon" class="w-0 h-0 border-y-[10px] border-y-transparent border-l-[16px] border-l-white"></div>
                    </button>
                    <button onclick="step(1)" class="px-6 pro-btn">Next Track</button>
                </div>
                <div class="text-right">
                    <div class="text-[9px] opacity-30 mb-1">PITCH BEND</div>
                    <div class="text-xl font-black text-white italic">+0.00%</div>
                </div>
            </div>
        </section>

        <!-- 中：MIXER / 混音区 -->
        <section class="flex flex-col gap-4 p-4 bg-[#0a0a0a] border-x border-white/5">
            <div class="text-[9px] text-center opacity-20 font-black tracking-widest">SIGNAL LEVEL</div>
            <div class="vu-meter" id="vu-meter"></div>
            
            <div class="mt-8 flex flex-col items-center gap-6">
                <div class="w-12 h-12 rounded-full bg-gradient-to-b from-[#333] to-[#111] border border-black shadow-xl"></div>
                <span class="text-[8px] opacity-40">TRIM</span>
                
                <!-- 模拟推子 -->
                <div class="w-8 h-48 bg-black rounded-sm relative border border-white/5">
                    <div class="absolute w-full h-[1px] bg-white/10 top-1/2"></div>
                    <div class="absolute w-12 h-8 bg-[#222] border border-black left-1/2 -translate-x-1/2 top-1/4 shadow-2xl rounded-sm"></div>
                </div>
                <span class="text-[8px] opacity-40">CHANNEL 1</span>
            </div>
        </section>

        <!-- 右：LIBRARY / 媒体库 -->
        <aside class="library-aside">
            <div class="p-6 bg-black/40 border-b border-white/5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-[10px] font-black tracking-widest opacity-30">TRACK BROWSER</h2>
                    <span id="folder-tag" class="text-[9px] text-cyan-500 bg-cyan-500/10 px-2 py-0.5 rounded">ROOT</span>
                </div>
                <input type="text" id="q" oninput="doSearch()" placeholder="SEARCH CRATE..." class="w-full bg-black border border-white/10 p-3 text-[10px] text-cyan-500 outline-none focus:border-cyan-500/50">
            </div>
            
            <ul id="list" class="track-list no-scrollbar"></ul>

            <div class="mt-auto p-4 border-t border-white/5">
                <div id="ai-text" class="text-[9px] text-white/20 italic leading-relaxed">
                    Waiting for track selection...
                </div>
            </div>
        </aside>

    </main>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const G = { user: 'zhangzhanhang855', repo: 'musiconly', ver: 'main' };
        let playlists = {}; 
        let filtered = [], curIdx = 0, isPlaying = false;
        const audio = document.getElementById('player');

        // 初始化 VU 表
        (function createVU() {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<2; i++) {
                const bar = document.createElement('div');
                bar.className = 'vu-bar';
                for(let j=0; j<18; j++) {
                    const dot = document.createElement('div');
                    dot.className = 'vu-dot';
                    bar.appendChild(dot);
                }
                vu.appendChild(bar);
            }
        })();

        function bootSystem() {
            document.getElementById('boot-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-overlay').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
                loadLibrary();
            }, 1000);
        }

        async function loadLibrary() {
            try {
                const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const data = await res.json();
                
                // 简单处理：仅抓取根目录
                playlists["Root"] = data.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                    t: f.name.replace(/\.[^/.]+$/, ""),
                    u: f.download_url
                }));

                renderList();
                executeLoad(0, false);
            } catch (e) {
                console.error("Failed to load library");
            }
        }

        function renderList() {
            const listEl = document.getElementById('list');
            listEl.innerHTML = playlists["Root"].map((s, i) => `
                <li class="track-item ${curIdx === i ? 'active' : ''}" onclick="executeLoad(${i}, true)">
                    ${String(i+1).padStart(2,'0')} . ${s.t}
                </li>
            `).join('');
        }

        function executeLoad(idx, auto) {
            curIdx = idx;
            const song = playlists["Root"][curIdx];
            audio.src = song.u;
            document.getElementById('title').innerText = song.t;
            
            // 封面图居中处理
            const art = document.getElementById('cover-art');
            const emj = document.getElementById('cover-emoji');
            art.style.backgroundImage = 'none';
            emj.style.display = 'block';

            new jsmediatags.Reader(song.u).read({
                onSuccess: (tag) => {
                    const p = tag.tags.picture;
                    if (p) {
                        let b64 = "";
                        for (let i = 0; i < p.data.length; i++) b64 += String.fromCharCode(p.data[i]);
                        art.style.backgroundImage = `url(data:${p.format};base64,${window.btoa(b64)})`;
                        emj.style.display = 'none';
                    }
                }
            });

            renderList();
            if (auto) audio.play();
        }

        function playToggle() {
            audio.paused ? audio.play() : audio.pause();
        }

        audio.onplay = () => {
            document.body.classList.replace('is-paused', 'is-playing');
            document.getElementById('play-icon').style.borderLeftColor = "#00f2ff";
        };

        audio.onpause = () => {
            document.body.classList.replace('is-playing', 'is-paused');
            document.getElementById('play-icon').style.borderLeftColor = "#fff";
        };

        audio.ontimeupdate = () => {
            const cur = audio.currentTime;
            const dur = audio.duration;
            document.getElementById('cur-time').innerText = fmt(cur);
            
            // VU 表动画
            if(!audio.paused) {
                const dots = document.querySelectorAll('.vu-dot');
                dots.forEach((dot, idx) => {
                    const rand = Math.random() * 18;
                    const isLit = (idx % 18) < rand;
                    dot.className = isLit ? (idx % 18 > 14 ? 'vu-dot peak' : 'vu-dot lit') : 'vu-dot';
                });
            }
        };

        function fmt(s) {
            if (isNaN(s)) return "00:00:00";
            let m = Math.floor(s/60), sec = Math.floor(s%60), ms = Math.floor((s%1)*100);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}:${ms.toString().padStart(2,'0')}`;
        }

        function step(d) {
            let next = (curIdx + d + playlists["Root"].length) % playlists["Root"].length;
            executeLoad(next, true);
        }
    </script>
</body>
</html>
