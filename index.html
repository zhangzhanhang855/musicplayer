<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Premium 智能音樂播放器</title>
    
    <link rel="dns-prefetch" href="https://api.github.com">
    <link rel="preconnect" href="https://api.github.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    
    <style>
        :root { 
            --accent: #1d1d1f; /* 使用純深色作為強調色 */
            --accent-light: #f5f5f7;
            --ai-color: #5856D6; 
            --bg: #ffffff; 
            --panel: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #6e6e73;
            --border-radius-lg: 20px;
            --border-radius-md: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            /* 字體設置為宋體優先 */
            --font-family: "Songti SC", "STSong", "SimSun", "NSimSun", "Source Han Serif CN", serif;
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; 
            height: 100%; height: 100dvh; 
            font-family: var(--font-family);
            background: var(--bg); color: var(--text-main); 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--bg); z-index: 9999; padding: 20px;
        }
        
        .login-box { 
            background: var(--panel); 
            padding: 60px 40px; 
            text-align: center; 
            width: 100%; max-width: 400px; 
            border-radius: var(--border-radius-lg);
            border: 1px solid #eeeeee;
        }

        .login-box h1 {
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        
        .pwd-input { 
            background: #fafafa; 
            border: 1px solid #eeeeee; 
            padding: 16px; 
            color: var(--text-main); 
            margin: 30px 0; 
            outline: none; 
            font-size: 1.1rem; 
            width: 100%; 
            border-radius: var(--border-radius-md);
            text-align: center;
            font-family: var(--font-family);
        }
        
        .login-btn { 
            background: var(--text-main); 
            border: none; color: #FFF; 
            cursor: pointer; font-size: 1rem; 
            width: 100%; padding: 16px; 
            border-radius: var(--border-radius-md);
            letter-spacing: 2px;
            font-family: var(--font-family);
        }
        
        .container { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            height: 100%; height: 100dvh; 
            padding: 24px; 
            padding-bottom: calc(24px + env(safe-area-inset-bottom)); 
        }
        
        .layout-wrapper { 
            display: flex; 
            flex-direction: column; 
            width: 100%; max-width: 480px; 
            flex: 1; overflow: hidden; 
            align-items: center; 
        }
        
        .glass-card { 
            background: var(--panel); 
            padding: 40px 32px; 
            width: 100%; 
            text-align: center; 
            box-shadow: var(--shadow);
            border-radius: var(--border-radius-lg);
            margin-bottom: 24px; 
            border: 1px solid #f0f0f0;
        }
        
        h2 { 
            font-weight: 500; 
            font-size: 1.4rem; 
            margin: 0 0 8px 0; 
            letter-spacing: 1px;
        }

        #speed-tag { 
            font-size: 0.7rem; 
            border: 1px solid #eeeeee;
            color: var(--text-sub); 
            padding: 3px 10px; 
            border-radius: 4px;
            margin-bottom: 15px; 
            display: inline-block; 
        }
        
        #status { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 30px; letter-spacing: 1px; }

        .progress-box { width: 100%; height: 2px; background: #eeeeee; position: relative; margin-bottom: 40px; cursor: pointer; }
        #prog-bar { position: absolute; height: 100%; background: var(--text-main); width: 0%; }
        #prog-bar::after {
            content: ''; position: absolute; right: -4px; top: -4px; width: 10px; height: 10px;
            background: var(--text-main); border-radius: 50%;
        }
        
        .btns { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 280px; margin: 0 auto; }
        .btns button { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 1.2rem; transition: 0.2s; font-family: var(--font-family); }
        .btns .main-play { 
            font-size: 1.8rem; width: 56px; height: 56px; 
            background: var(--text-main); color: #FFF; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .ai-panel { 
            background: #fafafa; padding: 16px; margin-top: 32px; text-align: left; 
            border-radius: var(--border-radius-md); border: 1px solid #f0f0f0;
        }
        .ai-title { color: var(--ai-color); font-weight: 700; margin-bottom: 6px; font-size: 0.75rem; letter-spacing: 1px; }
        #ai-text { font-size: 0.85rem; line-height: 1.6; color: #333; }
        
        #list { 
            list-style: none; padding: 0; overflow-y: auto; flex: 1; margin: 0; 
            width: 100%; background: var(--panel); border: 1px solid #f0f0f0; border-radius: var(--border-radius-lg);
        }
        #list li { 
            padding: 18px 24px; border-bottom: 1px solid #f9f9f9; cursor: pointer; 
            display: flex; justify-content: space-between; font-size: 0.95rem; 
        }
        #list li.active { background: #fafafa; font-weight: 700; border-left: 4px solid var(--text-main); }

        @media (min-width: 900px) {
            .layout-wrapper { flex-direction: row; max-width: 1000px; gap: 32px; }
            .glass-card { width: 420px; }
        }

        /* 捲軸美化 */
        #list::-webkit-scrollbar { width: 4px; }
        #list::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }
    </style>
</head>
<body>
    
    <div id="login-screen">
        <div class="login-box">
            <h1>啟程</h1>
            <p>請輸入啟用碼開啟音樂空間</p>
            <input type="password" id="pwd-input" class="pwd-input" placeholder="代碼" onkeydown="if(event.key==='Enter') checkPwd()">
            <button onclick="checkPwd()" class="login-btn">進入</button>
            <div id="pwd-error"></div>
        </div>
    </div>
    
    <div class="container" id="main-app">
        <div class="layout-wrapper">
            <div class="glass-card">
                <div id="speed-tag">經由智能節點傳輸</div>
                <h2 id="title">曲目載入中</h2>
                <div id="status">無播放內容</div>
                
                <div class="progress-box" id="seek-bar">
                    <div id="prog-bar"></div>
                </div>
                
                <div class="btns">
                    <button onclick="setMode()" id="mode-btn">順序</button>
                    <button onclick="step(-1)">上首</button>
                    <button onclick="playToggle()" class="main-play" id="play-btn">▶</button>
                    <button onclick="step(1)">下首</button>
                    <button onclick="dl()">下載</button>
                </div>
                
                <div class="ai-panel">
                    <div class="ai-title">✦ AI 意境導讀</div>
                    <div id="ai-text">分析功能已就緒。</div>
                </div>
            </div>
            
            <div id="list"></div>
        </div>
    </div>
    
    <audio id="player"></audio>
    
    <script>
        // =========================================================================
        // 🔑 請填寫您的 API KEY
        // =========================================================================
        const apiKey = ""; 
        const G = { user: 'zhangzhanhang855', repo: 'musicplayer', ver: 'main' };
        // =========================================================================

        let all = [], filtered = [], cur = 0, isP = false, loop = 'list';
        const audio = document.getElementById('player');
        const aiText = document.getElementById('ai-text');

        async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                if (retries <= 0) throw error;
                await new Promise(resolve => setTimeout(resolve, backoff));
                return fetchWithRetry(url, options, retries - 1, backoff * 2);
            }
        }

        async function analyzeSongTitle(title) {
            if (!apiKey) {
                aiText.innerText = "尚未配置分析密鑰。";
                return;
            }
            aiText.innerText = "正在感應曲目意境...";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: `請分析歌曲《${title}》的意境，用一句充滿詩意的話描述，30字以內。不要前綴。` }] }]
            };
            try {
                const result = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                aiText.innerText = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "意境深邃，難以言表。";
            } catch (e) {
                aiText.innerText = "暫時無法感應意境。";
            }
        }

        function checkPwd() {
            if (document.getElementById('pwd-input').value === 'gmsf4rdth89Ky5632') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                start();
            } else {
                document.getElementById('pwd-error').innerText = '無效代碼';
            }
        }

        async function start() {
            try {
                const r = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const d = await r.json();
                all = d.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                    t: f.name.replace(/\.[^/.]+$/, ""),
                    u: `https://fastly.jsdelivr.net/gh/${G.user}/${G.repo}@${G.ver}/${encodeURIComponent(f.name)}`
                }));
                filtered = [...all];
                drawList();
                if(all.length > 0) loadTrack(0, false);
            } catch (e) { document.getElementById('status').innerText = "連線失敗"; }
        }

        function drawList() {
            document.getElementById('list').innerHTML = filtered.map((s, i) => 
                `<li class="${cur === i ? 'active' : ''}" onclick="selectTrack(${i})">
                    <span>${s.t}</span>
                    <span style="opacity:0.3;font-size:0.7rem;">CH. ${i+1}</span>
                </li>`).join('');
        }

        function loadTrack(idx, auto = true) {
            cur = idx;
            const s = filtered[cur];
            audio.src = s.u;
            document.getElementById('title').innerText = s.t;
            document.getElementById('status').innerText = "串流載入中";
            drawList();
            clearTimeout(window.aiTimer);
            window.aiTimer = setTimeout(() => analyzeSongTitle(s.t), 2000);
            if (auto) { audio.play(); isP = true; updateUI(); }
        }

        function selectTrack(i) { loadTrack(i); }
        function playToggle() { if (audio.paused) audio.play(); else audio.pause(); isP = !audio.paused; updateUI(); }
        function updateUI() { document.getElementById('play-btn').innerText = isP ? '||' : '▶'; }
        function step(d) { loadTrack((cur + d + filtered.length) % filtered.length); }
        function setMode() {
            const mArr = ['list', 'random', 'single'];
            const mTxt = { list: '順序', random: '隨機', single: '單曲' };
            loop = mArr[(mArr.indexOf(loop) + 1) % 3];
            document.getElementById('mode-btn').innerText = mTxt[loop];
        }
        function dl() { window.open(filtered[cur].u); }
        
        audio.onplaying = () => { document.getElementById('status').innerText = "正在播放"; };
        audio.ontimeupdate = () => {
            document.getElementById('prog-bar').style.width = (audio.currentTime / audio.duration * 100) + '%';
        };
        audio.onended = () => { if(loop === 'single') audio.play(); else step(1); };
        document.getElementById('seek-bar').onclick = (e) => { 
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; 
        };
    </script>
</body>
</html>

```
