<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID DJ MK-IV | MASTER CONSOLE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00f2ff; --panel: #111; }
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* 主架构 - 严格锁定宽度 */
        .dj-system {
            width: 96vw; max-width: 1400px; height: 850px;
            background: var(--panel); border: 8px solid #1a1a1a; border-radius: 12px;
            display: flex; padding: 15px; gap: 15px; box-sizing: border-box;
        }

        /* 模块化布局 */
        .deck-section { flex: 1.5; min-width: 0; background: linear-gradient(180deg, #181818 0%, #0d0d0d 100%); border-radius: 10px; border: 1px solid #222; padding: 30px; display: flex; flex-direction: column; position: relative; }
        .mixer-section { width: 240px; flex-shrink: 0; background: #0a0a0a; border-radius: 10px; border: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .crate-section { flex: 1; min-width: 0; background: #0f0f0f; border-radius: 10px; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; }

        /* LCD 屏 */
        .lcd-display { background: #050a05; border: 3px solid #000; border-radius: 4px; padding: 20px; font-family: 'Share Tech Mono', monospace; box-shadow: inset 0 0 30px #000; margin-bottom: 25px; }
        .track-title { font-size: 1.8rem; color: var(--neon); text-shadow: 0 0 10px rgba(0, 242, 255, 0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 黑胶慢轮 - 精准对齐 */
        .jog-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .vinyl-record { width: 380px; height: 380px; border-radius: 50%; background: radial-gradient(circle, #222 0%, #111 50%, #000 100%); border: 10px solid #080808; box-shadow: 0 20px 50px rgba(0,0,0,0.7); position: relative; }
        .vinyl-record::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: repeating-radial-gradient(circle, transparent 0, transparent 2px, rgba(255,255,255,0.02) 3px); pointer-events: none; }
        
        .artwork-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px; border-radius: 50%; border: 5px solid #000;
            background: #111; z-index: 10; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        #cover-art { width: 100%; height: 100%; background-size: cover; background-position: center; }

        /* 旋转动画 */
        .is-playing .vinyl-record { animation: rotate-v 8s linear infinite; }
        .is-playing .artwork-core { animation: rotate-a 8s linear infinite; }
        @keyframes rotate-v { to { transform: rotate(360deg); } }
        @keyframes rotate-a { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 列表区域 */
        .track-list-container { flex: 1; overflow-y: auto; }
        .track-item { padding: 15px 20px; border-bottom: 1px solid #1a1a1a; font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #666; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-item:hover { background: #151515; color: #fff; }
        .track-item.active { background: rgba(0, 242, 255, 0.05); color: var(--neon); border-left: 4px solid var(--neon); }

        /* VU 表 */
        .vu-meter { display: flex; gap: 3px; height: 120px; padding: 10px; background: #000; border-radius: 4px; }
        .vu-bar { flex: 1; display: flex; flex-direction: column-reverse; gap: 2px; }
        .vu-dot { height: 5px; width: 100%; background: #1a1a1a; }
        .vu-dot.lit { background: #10b981; box-shadow: 0 0 5px #10b981; }

        .boot-screen { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease; }
    </style>
</head>
<body class="is-paused">

    <div id="boot-overlay" class="boot-screen">
        <div class="text-[10px] tracking-[1em] text-cyan-900 mb-8 uppercase">VOID DJ MK-IV</div>
        <button onclick="bootSystem()" class="w-24 h-24 border border-cyan-500/30 rounded-full flex items-center justify-center text-cyan-500 hover:bg-cyan-500/10 transition">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </button>
    </div>

    <main id="main-app" class="dj-system opacity-0 transition-opacity duration-1000">
        <!-- DECK -->
        <section class="deck-section">
            <div class="lcd-display">
                <div class="flex justify-between text-[10px] opacity-40 mb-2"><span>STUDIO REF</span><span>DECK A</span></div>
                <div id="title" class="track-title">INITIALIZING...</div>
                <div class="flex justify-between items-end mt-4">
                    <div id="folder-name" class="text-[10px] text-cyan-900 font-bold uppercase">Loading...</div>
                    <div class="text-3xl font-bold tracking-tighter" id="cur-time">00:00:00</div>
                </div>
            </div>
            <div class="jog-container">
                <div class="vinyl-record"></div>
                <div class="artwork-core">
                    <div id="cover-art"></div>
                    <span id="cover-emoji" class="text-5xl">💿</span>
                </div>
            </div>
            <div class="flex justify-between items-center mt-8">
                <div class="flex gap-4">
                    <button onclick="playToggle()" class="w-20 h-16 bg-black border border-white/10 rounded flex items-center justify-center hover:bg-white/5 transition">
                        <div id="play-icon" class="w-0 h-0 border-y-[12px] border-y-transparent border-l-[20px] border-l-white"></div>
                    </button>
                    <button onclick="step(1)" class="px-8 bg-black border border-white/10 rounded text-[10px] font-bold uppercase">Next</button>
                </div>
                <div class="text-xl font-black italic">+0.00%</div>
            </div>
        </section>

        <!-- MIXER -->
        <section class="mixer-section">
            <div class="vu-meter" id="vu-meter"></div>
            <div class="mt-10 flex flex-col items-center gap-10">
                <div class="w-10 h-10 rounded-full bg-gradient-to-b from-[#333] to-[#111] border border-black"></div>
                <div class="w-8 h-48 bg-black border border-white/5 relative">
                    <div class="absolute w-12 h-8 bg-[#222] border border-black left-1/2 -translate-x-1/2 top-1/4"></div>
                </div>
                <span class="text-[8px] opacity-30 uppercase">Vol-Master</span>
            </div>
        </section>

        <!-- CRATE -->
        <aside class="crate-section">
            <div class="p-6 bg-black/40">
                <div id="playlist-nav" class="flex gap-2 overflow-x-auto no-scrollbar mb-4"></div>
                <input type="text" id="q" oninput="doSearch()" placeholder="FILTER CRATE..." class="w-full bg-black border border-white/10 p-3 text-[10px] outline-none focus:border-cyan-500/50">
            </div>
            <div class="track-list-container"><ul id="list"></ul></div>
            <div class="p-4 border-t border-white/5"><p id="ai-text" class="text-[9px] text-cyan-600/50 font-mono italic uppercase">System Ready</p></div>
        </aside>
    </main>

    <audio id="player" crossorigin="anonymous"></audio>

    <script>
        const G = { user: 'zhangzhanhang855', repo: 'musiconly' };
        let playlists = {}; 
        let currentPlaylist = "Root";
        let filteredTracks = [], curIdx = 0;
        const audio = document.getElementById('player');

        // VU表初始化
        (function() {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<2; i++) {
                const bar = document.createElement('div'); bar.className='vu-bar';
                for(let j=0; j<18; j++) { bar.appendChild(document.createElement('div')).className='vu-dot'; }
                vu.appendChild(bar);
            }
        })();

        function bootSystem() {
            document.getElementById('boot-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-overlay').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
                loadAllData();
            }, 800);
        }

        async function loadAllData() {
            try {
                const res = await fetch(`https://api.github.com/repos/${G.user}/${G.repo}/contents/`);
                const items = await res.json();
                
                // 加载根目录
                playlists["Root"] = filterAudio(items);
                
                // 加载文件夹
                const folders = items.filter(i => i.type === "dir");
                for (let f of folders) {
                    const subRes = await fetch(f.url);
                    const subData = await subRes.json();
                    playlists[f.name] = filterAudio(subData);
                }

                renderNav();
                switchPlaylist("Root");
            } catch (e) {
                document.getElementById('title').innerText = "API ERROR";
            }
        }

        function filterAudio(items) {
            return items.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name)).map(f => ({
                t: f.name.replace(/\.[^/.]+$/, ""), u: f.download_url
            }));
        }

        function renderNav() {
            const nav = document.getElementById('playlist-nav');
            nav.innerHTML = Object.keys(playlists).map(name => `
                <button onclick="switchPlaylist('${name}')" class="text-[9px] px-3 py-1 border border-white/10 hover:bg-white/10 uppercase">
                    ${name}
                </button>
            `).join('');
        }

        function switchPlaylist(name) {
            currentPlaylist = name;
            filteredTracks = [...playlists[name]];
            document.getElementById('folder-name').innerText = name;
            renderList();
            if(filteredTracks.length > 0) executeLoad(0, false);
        }

        function renderList() {
            const listEl = document.getElementById('list');
            listEl.innerHTML = filteredTracks.map((s, i) => `
                <li class="track-item ${curIdx === i ? 'active' : ''}" onclick="executeLoad(${i}, true)">
                    ${String(i+1).padStart(2,'0')} . ${s.t}
                </li>
            `).join('');
        }

        function executeLoad(idx, auto) {
            curIdx = idx;
            const song = filteredTracks[curIdx];
            audio.src = song.u;
            document.getElementById('title').innerText = song.t;
            
            const art = document.getElementById('cover-art');
            const emj = document.getElementById('cover-emoji');
            art.style.backgroundImage = 'none'; emj.style.display = 'block';

            new jsmediatags.Reader(song.u).read({
                onSuccess: (tag) => {
                    const p = tag.tags.picture;
                    if (p) {
                        let b64 = "";
                        for (let i = 0; i < p.data.length; i++) b64 += String.fromCharCode(p.data[i]);
                        art.style.backgroundImage = `url(data:${p.format};base64,${window.btoa(b64)})`;
                        emj.style.display = 'none';
                    }
                }
            });

            renderList();
            if (auto) audio.play();
        }

        function playToggle() { audio.paused ? audio.play() : audio.pause(); }
        audio.onplay = () => { document.body.classList.replace('is-paused', 'is-playing'); document.getElementById('play-icon').style.borderLeftColor = "#00f2ff"; };
        audio.onpause = () => { document.body.classList.replace('is-playing', 'is-paused'); document.getElementById('play-icon').style.borderLeftColor = "#fff"; };
        audio.ontimeupdate = () => {
            document.getElementById('cur-time').innerText = fmt(audio.currentTime);
            if(!audio.paused) {
                document.querySelectorAll('.vu-dot').forEach((dot, idx) => {
                    dot.className = (idx % 18 < Math.random() * 14) ? 'vu-dot lit' : 'vu-dot';
                });
            }
        };

        function fmt(s) {
            if (isNaN(s)) return "00:00:00";
            let m = Math.floor(s/60), sec = Math.floor(s%60), ms = Math.floor((s%1)*100);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}:${ms.toString().padStart(2,'0')}`;
        }

        function step(d) { executeLoad((curIdx + d + filteredTracks.length) % filteredTracks.length, true); }
        function doSearch() {
            const val = document.getElementById('q').value.toLowerCase();
            filteredTracks = playlists[currentPlaylist].filter(s => s.t.toLowerCase().includes(val));
            renderList();
        }
    </script>
</body>
</html>
